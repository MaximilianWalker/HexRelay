openapi: 3.1.0
paths:
  /v1/friends/requests/direct:
    post:
      security:
        - CookieAuth: []
        - BearerAuth: []
      parameters:
        - $ref: '#/components/parameters/CsrfTokenHeader'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/FriendRequestCreate'
      responses:
        '201':
          description: Friend request created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/FriendRequestRecord'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '409':
          $ref: '#/components/responses/Conflict'
        '500':
          $ref: '#/components/responses/InternalServerError'
components:
  parameters:
    CsrfTokenHeader:
      in: header
      name: x-csrf-token
      schema:
        type: string
  responses:
    BadRequest:
      description: Bad request
    Unauthorized:
      description: Unauthorized
    Forbidden:
      description: Forbidden
    Conflict:
      description: Conflict
    InternalServerError:
      description: Internal server error
  schemas:
    ApiError:
      type: object
      properties:
        code:
          type: string
          enum:
            - friend_request_exists
            - identity_invalid
            - storage_unavailable
    FriendRequestCreate:
      type: object
    FriendRequestCreateRequest:
      type: object
    FriendRequestRecord:
      type: object
