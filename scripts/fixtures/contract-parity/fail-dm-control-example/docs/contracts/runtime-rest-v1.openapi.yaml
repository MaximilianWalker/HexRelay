openapi: 3.1.0
paths:
  /v1/dm/privacy-policy:
    post:
      security:
        - CookieAuth: []
        - BearerAuth: []
      parameters:
        - $ref: '#/components/parameters/CsrfTokenHeader'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/DmPolicyUpdate'
      responses:
        '200':
          description: DM policy updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DmPolicy'
        '400':
          description: Invalid DM policy
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiError'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '500':
          $ref: '#/components/responses/InternalServerError'
components:
  parameters:
    CsrfTokenHeader:
      in: header
      name: x-csrf-token
      schema:
        type: string
  responses:
    Unauthorized:
      description: Unauthorized
    InternalServerError:
      description: Internal server error
  schemas:
    ApiError:
      type: object
      properties:
        code:
          type: string
          enum:
            - dm_policy_invalid
            - csrf_invalid
            - storage_unavailable
    DmPolicy:
      type: object
    DmPolicyUpdate:
      type: object
