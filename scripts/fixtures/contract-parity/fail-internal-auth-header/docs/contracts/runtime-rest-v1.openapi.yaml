openapi: 3.1.0
paths:
  /v1/internal/presence/watchers/{identity_id}:
    get:
      parameters:
        - in: path
          name: identity_id
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Authorized presence watchers
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PresenceWatcherListResponse'
        '401':
          description: Internal token is missing or invalid
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiError'
              examples:
                internalTokenInvalid:
                  value:
                    code: internal_token_invalid
                    message: presence watcher lookup requires a valid internal token
components:
  schemas:
    ApiError:
      type: object
    PresenceWatcherListResponse:
      type: object
