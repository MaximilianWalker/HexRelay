openapi: 3.1.0
paths:
  /v1/internal/presence/watchers/{identity_id}:
    get:
      parameters:
        - in: header
          name: x-hexrelay-internal-token
          required: true
          schema:
            type: string
        - in: path
          name: identity_id
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Authorized presence watchers
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PresenceWatcherListResponse'
components:
  schemas:
    ApiError:
      type: object
    PresenceWatcherListResponse:
      type: object
