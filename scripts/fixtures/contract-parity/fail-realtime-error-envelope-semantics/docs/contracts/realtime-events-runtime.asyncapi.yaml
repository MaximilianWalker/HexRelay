asyncapi: 3.0.0
channels:
  error:
    address: error
components:
  messages:
    Error:
      payload:
        $ref: '#/components/schemas/ErrorEvent'
  schemas:
    EventEnvelope:
      type: object
      additionalProperties: false
      required: [event_id, event_type, occurred_at, correlation_id, producer, data]
      properties:
        event_id: { type: string }
        event_type: { type: string }
        occurred_at: { type: string, format: date-time }
        correlation_id: { type: string }
        producer: { type: string, enum: [realtime-gateway] }
    ErrorData:
      type: object
      additionalProperties: false
      required: [code]
      properties:
        code:
          type: string
          enum:
            - event_invalid
        message: { type: string }
    ErrorEvent:
      allOf:
        - $ref: '#/components/schemas/EventEnvelope'
        - type: object
          properties:
            event_type: { const: error }
            data: { $ref: '#/components/schemas/ErrorData' }
