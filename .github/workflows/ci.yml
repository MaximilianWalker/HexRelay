name: CI

on:
  push:
    branches:
      - master
      - main
  pull_request:

permissions:
  contents: read

env:
  API_HOST: 127.0.0.1
  API_PORT: 18080
  REALTIME_PORT: 18081
  WEB_ORIGIN: http://127.0.0.1:3002
  CARGO_AUDIT_VERSION: 0.22.0

jobs:
  security-audit:
    name: security-audit
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install pinned cargo-audit
        run: bash scripts/ensure-cargo-audit.sh

      - name: Validate cargo-audit ignore expiry
        run: bash scripts/validate-cargo-audit-ignore.sh

      - name: Rust dependency audit
        run: cargo audit --deny warnings --ignore RUSTSEC-2023-0071 --ignore RUSTSEC-2026-0049

      - name: Install web dependencies
        working-directory: apps/web
        run: npm ci

      - name: Node dependency audit (high+)
        working-directory: apps/web
        run: npm audit --omit=dev --audit-level=high

      - name: Install Semgrep
        run: python -m pip install semgrep

      - name: Semgrep scan
        run: semgrep scan --config p/security-audit --error --exclude node_modules --exclude target

  rust-check:
    name: rust-check (${{ matrix.service }})
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: hexrelay
          POSTGRES_PASSWORD: hexrelay_dev_password
          POSTGRES_DB: hexrelay
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U hexrelay -d hexrelay"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      API_DATABASE_URL: postgres://hexrelay:hexrelay_dev_password@127.0.0.1:5432/hexrelay
      API_PRESENCE_INTERNAL_TOKEN: ci-presence-internal-token-12345
      API_PRESENCE_REDIS_URL: redis://127.0.0.1:6379/0
      API_SESSION_SIGNING_KEYS: v1:ci-signing-key-hexrelay-12345
      API_SESSION_SIGNING_KEY_ID: v1
      REALTIME_PRESENCE_INTERNAL_TOKEN: ci-presence-internal-token-12345
      REALTIME_PRESENCE_REDIS_URL: redis://127.0.0.1:6379/0
    strategy:
      fail-fast: false
      matrix:
        service:
          - services/api-rs
          - services/realtime-rs
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Cargo fmt (check)
        working-directory: ${{ matrix.service }}
        run: cargo fmt --all -- --check

      - name: Cargo clippy
        working-directory: ${{ matrix.service }}
        run: cargo clippy --all-targets --all-features -- -D warnings

      - name: Cargo test
        working-directory: ${{ matrix.service }}
        run: cargo test --all-features

  migration-evidence-check:
    name: migration-evidence-check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Validate migration evidence updates
        run: |
          BASE_SHA="${{ github.event.pull_request.base.sha }}"
          if [ -z "${BASE_SHA}" ]; then
            BASE_SHA="${{ github.event.before }}"
          fi
          HEAD_SHA="${{ github.sha }}"

          chmod +x scripts/validate-migration-evidence.sh
          ./scripts/validate-migration-evidence.sh "${BASE_SHA}" "${HEAD_SHA}"

  evidence-provenance-check:
    name: evidence-provenance-check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Validate evidence provenance updates
        run: |
          BASE_SHA="${{ github.event.pull_request.base.sha }}"
          if [ -z "${BASE_SHA}" ]; then
            BASE_SHA="${{ github.event.before }}"
          fi
          HEAD_SHA="${{ github.sha }}"

          chmod +x scripts/validate-evidence-provenance.sh
          ./scripts/validate-evidence-provenance.sh "${BASE_SHA}" "${HEAD_SHA}"

  contract-parity-check:
    name: contract-parity-check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Validate runtime contract parity updates
        run: |
          BASE_SHA="${{ github.event.pull_request.base.sha }}"
          if [ -z "${BASE_SHA}" ]; then
            BASE_SHA="${{ github.event.before }}"
          fi
          HEAD_SHA="${{ github.sha }}"

          chmod +x scripts/validate-contract-parity.sh
          ./scripts/validate-contract-parity.sh "${BASE_SHA}" "${HEAD_SHA}"

  docs-index-freshness-check:
    name: docs-index-freshness-check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Validate docs index freshness
        run: |
          BASE_SHA="${{ github.event.pull_request.base.sha }}"
          if [ -z "${BASE_SHA}" ]; then
            BASE_SHA="${{ github.event.before }}"
          fi
          HEAD_SHA="${{ github.sha }}"

          chmod +x scripts/validate-docs-index-freshness.sh
          ./scripts/validate-docs-index-freshness.sh "${BASE_SHA}" "${HEAD_SHA}"

  dm-transport-policy-check:
    name: dm-transport-policy-check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate direct-only DM transport policy guardrails
        run: |
          chmod +x scripts/validate-dm-transport-policy.sh
          ./scripts/validate-dm-transport-policy.sh

  web-check:
    name: web-check (apps/web)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Validate package manager lockfile and scripts
        working-directory: apps/web
        run: |
          if [ ! -f package-lock.json ] && [ ! -f pnpm-lock.yaml ] && [ ! -f yarn.lock ]; then
            echo "::error::No supported lockfile found in apps/web. Add one of: package-lock.json, pnpm-lock.yaml, or yarn.lock."
            exit 1
          fi

          node -e "const fs=require('fs');const p=JSON.parse(fs.readFileSync('package.json','utf8'));const s=p.scripts||{};const missing=['lint','test:coverage','build'].filter((k)=>!s[k]);if(missing.length){console.error('::error::Missing required scripts in apps/web/package.json: '+missing.join(', ')+'. Add these scripts to enable CI gates.');process.exit(1);}"

      - name: Install dependencies
        working-directory: apps/web
        run: |
          if [ -f pnpm-lock.yaml ]; then
            corepack enable
            corepack prepare pnpm@latest --activate
            pnpm install --frozen-lockfile
          elif [ -f yarn.lock ]; then
            corepack enable
            yarn install --immutable
          else
            npm ci
          fi

      - name: Lint
        working-directory: apps/web
        run: |
          if [ -f pnpm-lock.yaml ]; then
            pnpm run lint
          elif [ -f yarn.lock ]; then
            yarn lint
          else
            npm run lint
          fi

      - name: Test
        working-directory: apps/web
        run: |
          if [ -f pnpm-lock.yaml ]; then
            pnpm run test:coverage
          elif [ -f yarn.lock ]; then
            yarn test:coverage
          else
            npm run test:coverage
          fi

      - name: Build
        working-directory: apps/web
        run: |
          if [ -f pnpm-lock.yaml ]; then
            pnpm run build
          elif [ -f yarn.lock ]; then
            yarn build
          else
            npm run build
          fi

  rust-coverage-gate:
    name: rust-coverage-gate
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: hexrelay
          POSTGRES_PASSWORD: hexrelay_dev_password
          POSTGRES_DB: hexrelay
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U hexrelay -d hexrelay"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      API_DATABASE_URL: postgres://hexrelay:hexrelay_dev_password@127.0.0.1:5432/hexrelay
      API_PRESENCE_INTERNAL_TOKEN: ci-presence-internal-token-12345
      API_PRESENCE_REDIS_URL: redis://127.0.0.1:6379/0
      API_SESSION_SIGNING_KEYS: v1:ci-signing-key-hexrelay-12345
      API_SESSION_SIGNING_KEY_ID: v1
      REALTIME_PRESENCE_INTERNAL_TOKEN: ci-presence-internal-token-12345
      REALTIME_PRESENCE_REDIS_URL: redis://127.0.0.1:6379/0
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Install cargo-llvm-cov
        uses: taiki-e/install-action@cargo-llvm-cov

      - name: Rust coverage threshold
        run: cargo llvm-cov --workspace --all-features --fail-under-lines 80

  integration-smoke:
    name: integration-smoke (web->api->realtime)
    runs-on: ubuntu-latest
    needs: [security-audit, rust-check, web-check, rust-coverage-gate, migration-evidence-check, evidence-provenance-check, contract-parity-check, docs-index-freshness-check, dm-transport-policy-check]
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: hexrelay
          POSTGRES_PASSWORD: hexrelay_dev_password
          POSTGRES_DB: hexrelay
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U hexrelay -d hexrelay"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      API_DATABASE_URL: postgres://hexrelay:hexrelay_dev_password@127.0.0.1:5432/hexrelay
      API_NODE_FINGERPRINT: hexrelay-local-fingerprint
      API_PRESENCE_INTERNAL_TOKEN: ci-presence-internal-token-12345
      API_PRESENCE_REDIS_URL: redis://127.0.0.1:6379/0
      API_SESSION_SIGNING_KEYS: v1:ci-signing-key-hexrelay-12345
      API_SESSION_SIGNING_KEY_ID: v1
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install web dependencies
        working-directory: apps/web
        run: npm ci

      - name: Start services and run smoke e2e
        run: |
          set -euo pipefail

          export API_BIND="${API_HOST}:${API_PORT}"
          export API_ALLOWED_ORIGINS="${WEB_ORIGIN}"
          export REALTIME_BIND="${API_HOST}:${REALTIME_PORT}"
          export REALTIME_API_BASE_URL="http://${API_HOST}:${API_PORT}"
          export REALTIME_ALLOWED_ORIGINS="${WEB_ORIGIN}"
          export SMOKE_WEB_ORIGIN="${WEB_ORIGIN}"
          export NEXT_PUBLIC_API_BASE_URL="http://${API_HOST}:${API_PORT}"
          export NEXT_PUBLIC_REALTIME_WS_URL="ws://${API_HOST}:${REALTIME_PORT}/ws"

          cargo build --locked --manifest-path services/api-rs/Cargo.toml
          cargo build --locked --manifest-path services/realtime-rs/Cargo.toml

          ./target/debug/api-rs > api.log 2>&1 &
          API_PID=$!
          ./target/debug/realtime-rs > realtime.log 2>&1 &
          REALTIME_PID=$!

          cleanup() {
            kill $API_PID $REALTIME_PID || true
          }
          trap cleanup EXIT

          wait_for_http() {
            local name="$1" url="$2" pid="$3" log_file="$4" attempts="${5:-180}"

            for i in $(seq 1 "$attempts"); do
              if ! kill -0 "$pid" 2>/dev/null; then
                echo "${name} process exited before health check passed"
                [ -f "$log_file" ] && tail -n 200 "$log_file" || true
                return 1
              fi

              if curl -fsS "$url" > /dev/null; then
                echo "${name} health ok on attempt ${i}" >> health-checks.log
                return 0
              fi

              sleep 1
            done

            echo "${name} health timeout after ${attempts}s: ${url}"
            [ -f "$log_file" ] && tail -n 200 "$log_file" || true
            return 1
          }

          wait_for_http "api" "http://${API_HOST}:${API_PORT}/health" "$API_PID" "api.log" 180
          wait_for_http "realtime" "http://${API_HOST}:${REALTIME_PORT}/health" "$REALTIME_PID" "realtime.log" 180

          export SMOKE_HEALTH_TIMEOUT_MS=60000
          npm --prefix apps/web run e2e:smoke | tee smoke-e2e.log

      - name: Collect CI evidence
        if: always()
        run: |
          chmod +x scripts/collect-ci-evidence.sh
          ./scripts/collect-ci-evidence.sh

      - name: Upload CI evidence artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ci-evidence-${{ github.run_id }}
          path: evidence/ci/${{ github.run_id }}
