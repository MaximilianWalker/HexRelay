name: CI

on:
  push:
    branches:
      - master
      - main
  pull_request:

permissions:
  contents: read

jobs:
  rust-check:
    name: rust-check (${{ matrix.service }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        service:
          - services/api-rs
          - services/realtime-rs
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Cargo fmt (check)
        working-directory: ${{ matrix.service }}
        run: cargo fmt --all -- --check

      - name: Cargo clippy
        working-directory: ${{ matrix.service }}
        run: cargo clippy --all-targets --all-features -- -D warnings

      - name: Cargo test
        working-directory: ${{ matrix.service }}
        run: cargo test --all-features

  web-check:
    name: web-check (apps/web)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Validate package manager lockfile and scripts
        working-directory: apps/web
        run: |
          if [ ! -f package-lock.json ] && [ ! -f pnpm-lock.yaml ] && [ ! -f yarn.lock ]; then
            echo "::error::No supported lockfile found in apps/web. Add one of: package-lock.json, pnpm-lock.yaml, or yarn.lock."
            exit 1
          fi

          node -e "const fs=require('fs');const p=JSON.parse(fs.readFileSync('package.json','utf8'));const s=p.scripts||{};const missing=['lint','test','build'].filter((k)=>!s[k]);if(missing.length){console.error('::error::Missing required scripts in apps/web/package.json: '+missing.join(', ')+'. Add these scripts to enable CI gates.');process.exit(1);}"

      - name: Install dependencies
        working-directory: apps/web
        run: |
          if [ -f pnpm-lock.yaml ]; then
            corepack enable
            corepack prepare pnpm@latest --activate
            pnpm install --frozen-lockfile
          elif [ -f yarn.lock ]; then
            corepack enable
            yarn install --immutable
          else
            npm ci
          fi

      - name: Lint
        working-directory: apps/web
        run: |
          if [ -f pnpm-lock.yaml ]; then
            pnpm run lint
          elif [ -f yarn.lock ]; then
            yarn lint
          else
            npm run lint
          fi

      - name: Test
        working-directory: apps/web
        run: |
          if [ -f pnpm-lock.yaml ]; then
            pnpm run test
          elif [ -f yarn.lock ]; then
            yarn test
          else
            npm run test
          fi

      - name: Build
        working-directory: apps/web
        run: |
          if [ -f pnpm-lock.yaml ]; then
            pnpm run build
          elif [ -f yarn.lock ]; then
            yarn build
          else
            npm run build
          fi
