name: CI

on:
  push:
    branches:
      - master
      - main
  pull_request:

permissions:
  contents: read

jobs:
  security-audit:
    name: security-audit
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install cargo-audit
        run: cargo install cargo-audit --locked

      - name: Rust dependency audit
        run: cargo audit --deny warnings

      - name: Install web dependencies
        working-directory: apps/web
        run: npm ci

      - name: Node dependency audit (high+)
        working-directory: apps/web
        run: npm audit --omit=dev --audit-level=high

      - name: Install Semgrep
        run: python -m pip install semgrep

      - name: Semgrep scan
        run: semgrep scan --config p/security-audit --error --exclude node_modules --exclude target

  rust-check:
    name: rust-check (${{ matrix.service }})
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: hexrelay
          POSTGRES_PASSWORD: hexrelay_dev_password
          POSTGRES_DB: hexrelay
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U hexrelay -d hexrelay"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      API_DATABASE_URL: postgres://hexrelay:hexrelay_dev_password@127.0.0.1:5432/hexrelay
      API_SESSION_SIGNING_KEYS: v1:ci-signing-key-hexrelay-12345
      API_SESSION_SIGNING_KEY_ID: v1
    strategy:
      fail-fast: false
      matrix:
        service:
          - services/api-rs
          - services/realtime-rs
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Cargo fmt (check)
        working-directory: ${{ matrix.service }}
        run: cargo fmt --all -- --check

      - name: Cargo clippy
        working-directory: ${{ matrix.service }}
        run: cargo clippy --all-targets --all-features -- -D warnings

      - name: Cargo test
        working-directory: ${{ matrix.service }}
        run: cargo test --all-features

  web-check:
    name: web-check (apps/web)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Validate package manager lockfile and scripts
        working-directory: apps/web
        run: |
          if [ ! -f package-lock.json ] && [ ! -f pnpm-lock.yaml ] && [ ! -f yarn.lock ]; then
            echo "::error::No supported lockfile found in apps/web. Add one of: package-lock.json, pnpm-lock.yaml, or yarn.lock."
            exit 1
          fi

          node -e "const fs=require('fs');const p=JSON.parse(fs.readFileSync('package.json','utf8'));const s=p.scripts||{};const missing=['lint','test','build'].filter((k)=>!s[k]);if(missing.length){console.error('::error::Missing required scripts in apps/web/package.json: '+missing.join(', ')+'. Add these scripts to enable CI gates.');process.exit(1);}"

      - name: Install dependencies
        working-directory: apps/web
        run: |
          if [ -f pnpm-lock.yaml ]; then
            corepack enable
            corepack prepare pnpm@latest --activate
            pnpm install --frozen-lockfile
          elif [ -f yarn.lock ]; then
            corepack enable
            yarn install --immutable
          else
            npm ci
          fi

      - name: Lint
        working-directory: apps/web
        run: |
          if [ -f pnpm-lock.yaml ]; then
            pnpm run lint
          elif [ -f yarn.lock ]; then
            yarn lint
          else
            npm run lint
          fi

      - name: Test
        working-directory: apps/web
        run: |
          if [ -f pnpm-lock.yaml ]; then
            pnpm run test:coverage
          elif [ -f yarn.lock ]; then
            yarn test:coverage
          else
            npm run test:coverage
          fi

      - name: Build
        working-directory: apps/web
        run: |
          if [ -f pnpm-lock.yaml ]; then
            pnpm run build
          elif [ -f yarn.lock ]; then
            yarn build
          else
            npm run build
          fi

  rust-coverage-gate:
    name: rust-coverage-gate
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: hexrelay
          POSTGRES_PASSWORD: hexrelay_dev_password
          POSTGRES_DB: hexrelay
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U hexrelay -d hexrelay"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      API_DATABASE_URL: postgres://hexrelay:hexrelay_dev_password@127.0.0.1:5432/hexrelay
      API_SESSION_SIGNING_KEYS: v1:ci-signing-key-hexrelay-12345
      API_SESSION_SIGNING_KEY_ID: v1
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Install cargo-llvm-cov
        uses: taiki-e/install-action@cargo-llvm-cov

      - name: Rust coverage threshold
        run: cargo llvm-cov --workspace --all-features --fail-under-lines 55

  integration-smoke:
    name: integration-smoke (web->api->realtime)
    runs-on: ubuntu-latest
    needs: [security-audit, rust-check, web-check, rust-coverage-gate]
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: hexrelay
          POSTGRES_PASSWORD: hexrelay_dev_password
          POSTGRES_DB: hexrelay
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U hexrelay -d hexrelay"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      API_BIND: 127.0.0.1:18080
      API_DATABASE_URL: postgres://hexrelay:hexrelay_dev_password@127.0.0.1:5432/hexrelay
      API_NODE_FINGERPRINT: hexrelay-local-fingerprint
      API_ALLOWED_ORIGINS: http://127.0.0.1:3002
      API_SESSION_SIGNING_KEYS: v1:ci-signing-key-hexrelay-12345
      API_SESSION_SIGNING_KEY_ID: v1
      REALTIME_BIND: 127.0.0.1:18081
      REALTIME_API_BASE_URL: http://127.0.0.1:18080
      NEXT_PUBLIC_API_BASE_URL: http://127.0.0.1:18080
      NEXT_PUBLIC_REALTIME_WS_URL: ws://127.0.0.1:18081/ws
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install web dependencies
        working-directory: apps/web
        run: npm ci

      - name: Start services and run smoke e2e
        run: |
          set -euo pipefail

          cargo run --manifest-path services/api-rs/Cargo.toml > api.log 2>&1 &
          API_PID=$!
          cargo run --manifest-path services/realtime-rs/Cargo.toml > realtime.log 2>&1 &
          REALTIME_PID=$!

          cleanup() {
            kill $API_PID $REALTIME_PID || true
          }
          trap cleanup EXIT

          for i in {1..60}; do
            if curl -fsS http://127.0.0.1:18080/health > /dev/null; then
              echo "api health ok on attempt ${i}" >> health-checks.log
              break
            fi
            sleep 1
          done

          for i in {1..60}; do
            if curl -fsS http://127.0.0.1:18081/health > /dev/null; then
              echo "realtime health ok on attempt ${i}" >> health-checks.log
              break
            fi
            sleep 1
          done

          npm --prefix apps/web run e2e:smoke | tee smoke-e2e.log

      - name: Collect CI evidence
        if: always()
        run: |
          chmod +x scripts/collect-ci-evidence.sh
          ./scripts/collect-ci-evidence.sh

      - name: Upload CI evidence artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ci-evidence-${{ github.run_id }}
          path: evidence/ci/${{ github.run_id }}
