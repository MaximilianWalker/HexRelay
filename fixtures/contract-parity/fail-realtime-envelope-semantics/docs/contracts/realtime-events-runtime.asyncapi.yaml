asyncapi: 3.0.0
channels:
  realtimeConnected:
    address: realtime.connected
    messages:
      realtimeConnected:
        $ref: '#/components/messages/RealtimeConnected'
components:
  messages:
    RealtimeConnected:
      payload:
        $ref: '#/components/schemas/RealtimeConnectedEvent'
  schemas:
    EventEnvelope:
      type: object
      additionalProperties: false
      required: [event_id, event_type, occurred_at, correlation_id, producer, data]
      properties:
        event_id: { type: string }
        event_type: { type: string }
        occurred_at: { type: string }
        correlation_id: { type: string }
        producer: { type: string, enum: [realtime-gateway] }
    RealtimeConnectedData:
      type: object
      additionalProperties: false
      required: [status]
      properties:
        status: { type: string, enum: [ok] }
    RealtimeConnectedEvent:
      allOf:
        - $ref: '#/components/schemas/EventEnvelope'
        - type: object
          properties:
            event_type: { const: realtime.connected }
            data: { $ref: '#/components/schemas/RealtimeConnectedData' }
