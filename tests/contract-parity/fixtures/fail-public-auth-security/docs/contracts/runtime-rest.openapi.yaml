openapi: 3.1.0
paths:
  /health:
    get:
      security:
        - CookieAuth: []
        - BearerAuth: []
      responses:
        '200':
          description: Service is healthy
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HealthResponse'
components:
  schemas:
    HealthResponse:
      type: object
