    DmMessageReadData:
      type: object
      additionalProperties: false
      oneOf:
        - properties:
            receipt_scope:
              const: participants
            fanout_scope:
              const: thread_participants
        - properties:
            receipt_scope:
              const: self_devices
            fanout_scope:
              const: reader_profile_devices
      required:
        - message_id
        - thread_id
        - reader_identity_id
        - reader_device_id
        - read_cursor
        - read_at
        - receipt_scope
        - fanout_scope
      properties:
        message_id: { type: string, minLength: 3, maxLength: 128 }
        thread_id: { type: string, minLength: 3, maxLength: 128 }
        reader_identity_id: { type: string, minLength: 3, maxLength: 64 }
        reader_device_id: { type: string, minLength: 1, maxLength: 64 }
        read_cursor:
          type: string
          minLength: 1
          description: Reader-visible thread cursor advanced by the explicit read action.
        read_at: { type: string, format: date-time }
        receipt_scope:
          type: string
          enum: [participants, self_devices]
          description: Participant-visible receipts require reader privacy consent; self-device scope must not fan out to other participants.
        fanout_scope:
          type: string
          enum: [thread_participants, reader_profile_devices]
          description: Target audience selected after applying thread membership and reader read-receipt privacy policy.
    DmMessageReadEvent:
      allOf:
