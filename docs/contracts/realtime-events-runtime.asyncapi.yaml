asyncapi: 3.0.0
id: urn:hexrelay:contracts:realtime-events-runtime
info:
  title: HexRelay Realtime Runtime Contract
  version: unversioned
  description: |
    Runtime realtime contract currently implemented by `services/realtime-rs`.
    This contract only includes event types supported in live websocket routing.
    The realtime HTTP `/health` and `/ready` probes are operational liveness
    and readiness surfaces outside this AsyncAPI event schema; `/ready` checks
    optional Redis replay/presence reachability plus API `/ready` and
    `/auth/sessions/validate` upstream reachability.
    Current signaling operations support authenticated sender validation plus
    recipient-targeted live delivery to active websocket sessions for an accepted
    contact target identity. Sender-visible success remains a realtime-gateway
    envelope echo, recipient-bound peer signals use `producer:
    realtime-signaling`, and signaling delivery is not durable/offline-queued.
    Recipient-targeted signaling fails closed with `event_forbidden` when the
    target is not an accepted contact, and uses a sender/recipient limiter that
    reports `event_rate_limited` independently from the general inbound message
    limiter.
    Realtime websocket limiter and auth-cache key derivation uses deterministic hashing
    so limiter/cache behavior remains stable across process restarts and instances.
    When outage-grace auth fallback is enabled, cached websocket session reuse remains
    bounded by both cache age and the upstream session expiry returned by
    `/auth/sessions/validate`.
    Persisted server-channel message create, edit, and delete mutations in
    `services/api-rs` now bridge into this runtime surface through protected
    internal realtime publish routes, so successful REST mutations attempt to
    emit `channel.message.created`, `channel.message.updated`, and
    `channel.message.deleted` to current server members. That bridge is
    best-effort: REST mutation success is not transactional with downstream
    realtime delivery, downstream dispatch failures are logged, and no durable
    retry/outbox guarantee exists in the current runtime.
    Clients may optionally send `x-hexrelay-device-id` during websocket upgrade,
    or the `device_id` query parameter for browser websocket clients that cannot
    set custom upgrade headers, to enable per-device replay/hydration for
    `presence.updated`, `channel.message.created`, `channel.message.updated`, and
    `channel.message.deleted`; the same device binding is required for
    device-targeted DM envelope dispatch and `dm.envelope.ack` validation. Native
    clients may provide `x-hexrelay-device-secret` during websocket upgrade;
    browser clients must send `dm.device.proof` after `realtime.connected` because
    long-lived `device_secret` values are not accepted in websocket URLs. DM live
    dispatch and ack persistence require a verified websocket device proof matching
    the profile-device secret registered through `/dm/profile-devices/heartbeat`;
    the secret is never echoed in public realtime events.
    API-accepted encrypted DM envelopes now bridge into realtime through a protected
    internal dispatch route. Connected recipient profile devices receive
    `dm.envelope.dispatched`; clients ack receipt with `dm.envelope.ack`, which the
    gateway persists through the API internal ack route before echoing a successful ack.
    The protected internal dispatch route returns a non-public target-device summary
    to the API bridge with target counts plus queued, pending, no-connection,
    unverified, saturated, and stale-connection buckets; websocket clients still
    receive only their own verified-device `dm.envelope.dispatched` payloads.
    For non-presence replay streams, when present, late-joining profile devices receive
    missed supported events before new live transitions only for recipients that had an
    active profiled connection when the original event was published.
    Per-device replay semantics are domain-specific. Presence replay is
    persisted for each resolved watcher identity, so a later-active profile
    device can hydrate missed presence transitions by per-device cursor even
    when no other local profile device for that watcher was connected at
    publish time. Presence replay stream keys expire on the same window as
    presence device cursors.
defaultContentType: application/json
channels:
  callSignalOffer:
    address: call.signal.offer
    messages:
      callSignalOffer:
        $ref: '#/components/messages/CallSignalOffer'
  callSignalAnswer:
    address: call.signal.answer
    messages:
      callSignalAnswer:
        $ref: '#/components/messages/CallSignalAnswer'
  callSignalIceCandidate:
    address: call.signal.ice_candidate
    messages:
      callSignalIceCandidate:
        $ref: '#/components/messages/CallSignalIceCandidate'
  realtimeConnected:
    address: realtime.connected
    messages:
      realtimeConnected:
        $ref: '#/components/messages/RealtimeConnected'
  presenceUpdated:
    address: presence.updated
    messages:
      presenceUpdated:
        $ref: '#/components/messages/PresenceUpdated'
  channelMessageCreated:
    address: channel.message.created
    messages:
      channelMessageCreated:
        $ref: '#/components/messages/ChannelMessageCreated'
  channelMessageUpdated:
    address: channel.message.updated
    messages:
      channelMessageUpdated:
        $ref: '#/components/messages/ChannelMessageUpdated'
  channelMessageDeleted:
    address: channel.message.deleted
    messages:
      channelMessageDeleted:
        $ref: '#/components/messages/ChannelMessageDeleted'
  dmEnvelopeDispatched:
    address: dm.envelope.dispatched
    messages:
      dmEnvelopeDispatched:
        $ref: '#/components/messages/DmEnvelopeDispatched'
  dmDeviceProof:
    address: dm.device.proof
    messages:
      dmDeviceProof:
        $ref: '#/components/messages/DmDeviceProof'
  dmDeviceVerified:
    address: dm.device.verified
    messages:
      dmDeviceVerified:
        $ref: '#/components/messages/DmDeviceVerified'
  dmEnvelopeAck:
    address: dm.envelope.ack
    messages:
      dmEnvelopeAck:
        $ref: '#/components/messages/DmEnvelopeAck'
  error:
    address: error
    messages:
      error:
        $ref: '#/components/messages/Error'
operations:
  sendCallSignalOffer:
    action: send
    channel:
      $ref: '#/channels/callSignalOffer'
    messages:
      - $ref: '#/channels/callSignalOffer/messages/callSignalOffer'
    x-hexrelay-signaling-semantics:
      requires_session_identity_from_match: true
      supported_targeting:
        - recipient_delivery
      rejection_codes:
        - event_invalid
        - event_identity_mismatch
  sendCallSignalAnswer:
    action: send
    channel:
      $ref: '#/channels/callSignalAnswer'
    messages:
      - $ref: '#/channels/callSignalAnswer/messages/callSignalAnswer'
    x-hexrelay-signaling-semantics:
      requires_session_identity_from_match: true
      supported_targeting:
        - recipient_delivery
      rejection_codes:
        - event_invalid
        - event_identity_mismatch
  sendCallSignalIceCandidate:
    action: send
    channel:
      $ref: '#/channels/callSignalIceCandidate'
    messages:
      - $ref: '#/channels/callSignalIceCandidate/messages/callSignalIceCandidate'
    x-hexrelay-signaling-semantics:
      requires_session_identity_from_match: true
      supported_targeting:
        - recipient_delivery
      rejection_codes:
        - event_invalid
        - event_identity_mismatch
  receiveRealtimeConnected:
    action: receive
    channel:
      $ref: '#/channels/realtimeConnected'
    messages:
      - $ref: '#/channels/realtimeConnected/messages/realtimeConnected'
  receivePresenceUpdated:
    action: receive
    channel:
      $ref: '#/channels/presenceUpdated'
    messages:
      - $ref: '#/channels/presenceUpdated/messages/presenceUpdated'
  receiveChannelMessageCreated:
    action: receive
    channel:
      $ref: '#/channels/channelMessageCreated'
    messages:
      - $ref: '#/channels/channelMessageCreated/messages/channelMessageCreated'
  receiveChannelMessageUpdated:
    action: receive
    channel:
      $ref: '#/channels/channelMessageUpdated'
    messages:
      - $ref: '#/channels/channelMessageUpdated/messages/channelMessageUpdated'
  receiveChannelMessageDeleted:
    action: receive
    channel:
      $ref: '#/channels/channelMessageDeleted'
    messages:
      - $ref: '#/channels/channelMessageDeleted/messages/channelMessageDeleted'
  receiveDmEnvelopeDispatched:
    action: receive
    channel:
      $ref: '#/channels/dmEnvelopeDispatched'
    messages:
      - $ref: '#/channels/dmEnvelopeDispatched/messages/dmEnvelopeDispatched'
  sendDmDeviceProof:
    action: send
    channel:
      $ref: '#/channels/dmDeviceProof'
    messages:
      - $ref: '#/channels/dmDeviceProof/messages/dmDeviceProof'
    x-hexrelay-dm-device-proof-semantics:
      requires_session_identity_match: true
      requires_websocket_device_match: true
      verifies_profile_device_secret_before_dm_dispatch: true
      device_secret_transport: websocket_message_or_native_upgrade_header
      rejects_device_secret_query_parameter: true
      rejection_codes:
        - event_invalid
        - event_device_mismatch
        - dm_device_proof_failed
  receiveDmDeviceVerified:
    action: receive
    channel:
      $ref: '#/channels/dmDeviceVerified'
    messages:
      - $ref: '#/channels/dmDeviceVerified/messages/dmDeviceVerified'
  sendDmEnvelopeAck:
    action: send
    channel:
      $ref: '#/channels/dmEnvelopeAck'
    messages:
      - $ref: '#/channels/dmEnvelopeAck/messages/dmEnvelopeAck'
    x-hexrelay-dm-ack-semantics:
      requires_session_identity_match: true
      requires_websocket_device_match: true
      requires_verified_websocket_device_proof: true
      persists_ack_before_success_echo: true
      rejection_codes:
        - event_invalid
        - event_identity_mismatch
        - event_device_mismatch
        - dm_ack_failed
  receiveError:
    action: receive
    channel:
      $ref: '#/channels/error'
    messages:
      - $ref: '#/channels/error/messages/error'
components:
  messages:
    CallSignalOffer:
      payload:
        $ref: '#/components/schemas/CallSignalOfferEvent'
    CallSignalAnswer:
      payload:
        $ref: '#/components/schemas/CallSignalAnswerEvent'
    CallSignalIceCandidate:
      payload:
        $ref: '#/components/schemas/CallSignalIceCandidateEvent'
    RealtimeConnected:
      payload:
        $ref: '#/components/schemas/RealtimeConnectedEvent'
    PresenceUpdated:
      payload:
        $ref: '#/components/schemas/PresenceUpdatedEvent'
    ChannelMessageCreated:
      payload:
        $ref: '#/components/schemas/ChannelMessageCreatedEvent'
    ChannelMessageUpdated:
      payload:
        $ref: '#/components/schemas/ChannelMessageUpdatedEvent'
    ChannelMessageDeleted:
      payload:
        $ref: '#/components/schemas/ChannelMessageDeletedEvent'
    DmEnvelopeDispatched:
      payload:
        $ref: '#/components/schemas/DmEnvelopeDispatchedEvent'
    DmDeviceProof:
      payload:
        $ref: '#/components/schemas/DmDeviceProofEvent'
    DmDeviceVerified:
      payload:
        $ref: '#/components/schemas/DmDeviceVerifiedEvent'
    DmEnvelopeAck:
      payload:
        $ref: '#/components/schemas/DmEnvelopeAckEvent'
    Error:
      payload:
        $ref: '#/components/schemas/ErrorEvent'
  schemas:
    EventEnvelope:
      type: object
      additionalProperties: false
      required: [event_id, event_type, occurred_at, correlation_id, producer, data]
      properties:
        event_id: { type: string }
        event_type: { type: string }
        occurred_at: { type: string, format: date-time }
        correlation_id: { type: string }
        producer: { type: string, enum: [realtime-gateway, realtime-signaling, realtime-presence, realtime-channel, dm-message-node] }
    CallSignalOfferData:
      type: object
      additionalProperties: false
      required: [call_id, from_identity_id, to_identity_id, sdp_offer]
      properties:
        call_id: { type: string }
        from_identity_id: { type: string }
        to_identity_id: { type: string }
        sdp_offer: { type: string }
    CallSignalAnswerData:
      type: object
      additionalProperties: false
      required: [call_id, from_identity_id, to_identity_id, sdp_answer]
      properties:
        call_id: { type: string }
        from_identity_id: { type: string }
        to_identity_id: { type: string }
        sdp_answer: { type: string }
    CallSignalIceCandidateData:
      type: object
      additionalProperties: false
      required: [call_id, from_identity_id, to_identity_id, candidate, sdp_mid, sdp_mline_index]
      properties:
        call_id: { type: string }
        from_identity_id: { type: string }
        to_identity_id: { type: string }
        candidate: { type: string }
        sdp_mid: { type: string, nullable: true }
        sdp_mline_index: { type: integer, nullable: true }
    CallSignalOfferEvent:
      allOf:
        - $ref: '#/components/schemas/EventEnvelope'
        - type: object
          properties:
            event_type: { const: call.signal.offer }
            data: { $ref: '#/components/schemas/CallSignalOfferData' }
    CallSignalAnswerEvent:
      allOf:
        - $ref: '#/components/schemas/EventEnvelope'
        - type: object
          properties:
            event_type: { const: call.signal.answer }
            data: { $ref: '#/components/schemas/CallSignalAnswerData' }
    CallSignalIceCandidateEvent:
      allOf:
        - $ref: '#/components/schemas/EventEnvelope'
        - type: object
          properties:
            event_type: { const: call.signal.ice_candidate }
            data: { $ref: '#/components/schemas/CallSignalIceCandidateData' }
    RealtimeConnectedData:
      type: object
      additionalProperties: false
      required: [status]
      properties:
        status: { type: string, enum: [ok] }
    ErrorData:
      type: object
      additionalProperties: false
      required: [code, message]
      properties:
        code:
          type: string
          enum:
            - origin_disallowed
            - rate_limited
            - session_invalid
            - connection_cap_reached
            - dev_fault_disconnect
            - dev_fault_drop
            - event_invalid
            - event_identity_mismatch
            - event_forbidden
            - event_device_mismatch
            - event_unsupported
            - event_serialize_failed
            - event_too_large
            - event_rate_limited
            - dm_ack_failed
            - dm_device_proof_failed
        message: { type: string }
    PresenceUpdatedData:
      type: object
      additionalProperties: false
      required: [identity_id, status, updated_at, presence_seq]
      properties:
        identity_id: { type: string }
        status: { type: string, enum: [online, offline] }
        updated_at: { type: string, format: date-time }
        presence_seq:
          type: integer
          minimum: 1
    ChannelMessageCreatedData:
      type: object
      additionalProperties: false
      required: [message_id, server_id, channel_id, sender_identity_id, created_at, channel_seq]
      properties:
        message_id: { type: string }
        server_id: { type: string }
        channel_id: { type: string }
        sender_identity_id: { type: string }
        created_at: { type: string, format: date-time }
        channel_seq:
          type: integer
          minimum: 1
    ChannelMessageUpdatedData:
      type: object
      additionalProperties: false
      required: [message_id, server_id, channel_id, editor_identity_id, edited_at, channel_seq]
      properties:
        message_id: { type: string }
        server_id: { type: string }
        channel_id: { type: string }
        editor_identity_id: { type: string }
        edited_at: { type: string, format: date-time }
        channel_seq:
          type: integer
          minimum: 1
    ChannelMessageDeletedData:
      type: object
      additionalProperties: false
      required: [message_id, server_id, channel_id, deleter_identity_id, deleted_at, channel_seq]
      properties:
        message_id: { type: string }
        server_id: { type: string }
        channel_id: { type: string }
        deleter_identity_id: { type: string }
        deleted_at: { type: string, format: date-time }
        channel_seq:
          type: integer
          minimum: 1
    DmEnvelopeDispatchedData:
      type: object
      additionalProperties: false
      required:
        - envelope_id
        - message_id
        - thread_id
        - sender_identity_id
        - recipient_identity_id
        - target_device_id
        - ciphertext
        - accepted_at
        - dispatched_at
        - delivery_cursor
        - transport_scope
      properties:
        envelope_id: { type: string, minLength: 8, maxLength: 128 }
        message_id: { type: string, minLength: 1, maxLength: 128 }
        thread_id: { type: string, minLength: 1, maxLength: 128 }
        sender_identity_id: { type: string, minLength: 3, maxLength: 64 }
        recipient_identity_id: { type: string, minLength: 3, maxLength: 64 }
        target_device_id: { type: string, minLength: 1, maxLength: 64 }
        ciphertext: { type: string, minLength: 1 }
        accepted_at: { type: string, format: date-time }
        dispatched_at: { type: string, format: date-time }
        delivery_cursor: { type: string, minLength: 1 }
        transport_scope:
          type: string
          enum: [encrypted_envelope_node]
    DmEnvelopeAckData:
      type: object
      additionalProperties: false
      required:
        - envelope_id
        - message_id
        - thread_id
        - recipient_identity_id
        - device_id
        - delivery_cursor
        - ack_status
        - received_at
      properties:
        envelope_id: { type: string, minLength: 8, maxLength: 128 }
        message_id: { type: string, minLength: 1, maxLength: 128 }
        thread_id: { type: string, minLength: 1, maxLength: 128 }
        recipient_identity_id: { type: string, minLength: 3, maxLength: 64 }
        device_id: { type: string, minLength: 1, maxLength: 64 }
        delivery_cursor: { type: string, minLength: 1 }
        ack_status:
          type: string
          enum: [received]
        received_at: { type: string, format: date-time }
    DmDeviceProofData:
      type: object
      additionalProperties: false
      required:
        - device_id
        - device_secret
      properties:
        device_id: { type: string, minLength: 1, maxLength: 64 }
        device_secret:
          type: string
          minLength: 16
          maxLength: 128
          description: Raw profile-device proof sent over the established websocket or native upgrade header; never placed in websocket URLs or echoed in public events.
    DmDeviceVerifiedData:
      type: object
      additionalProperties: false
      required:
        - device_id
        - verified_at
      properties:
        device_id: { type: string, minLength: 1, maxLength: 64 }
        verified_at: { type: string, format: date-time }
    RealtimeConnectedEvent:
      allOf:
        - $ref: '#/components/schemas/EventEnvelope'
        - type: object
          properties:
            event_type: { const: realtime.connected }
            data: { $ref: '#/components/schemas/RealtimeConnectedData' }
    ErrorEvent:
      allOf:
        - $ref: '#/components/schemas/EventEnvelope'
        - type: object
          properties:
            event_type: { const: error }
            data: { $ref: '#/components/schemas/ErrorData' }
    PresenceUpdatedEvent:
      allOf:
        - $ref: '#/components/schemas/EventEnvelope'
        - type: object
          properties:
            event_type: { const: presence.updated }
            data: { $ref: '#/components/schemas/PresenceUpdatedData' }
    ChannelMessageCreatedEvent:
      allOf:
        - $ref: '#/components/schemas/EventEnvelope'
        - type: object
          properties:
            event_type: { const: channel.message.created }
            data: { $ref: '#/components/schemas/ChannelMessageCreatedData' }
    ChannelMessageUpdatedEvent:
      allOf:
        - $ref: '#/components/schemas/EventEnvelope'
        - type: object
          properties:
            event_type: { const: channel.message.updated }
            data: { $ref: '#/components/schemas/ChannelMessageUpdatedData' }
    ChannelMessageDeletedEvent:
      allOf:
        - $ref: '#/components/schemas/EventEnvelope'
        - type: object
          properties:
            event_type: { const: channel.message.deleted }
            data: { $ref: '#/components/schemas/ChannelMessageDeletedData' }
    DmEnvelopeDispatchedEvent:
      allOf:
        - $ref: '#/components/schemas/EventEnvelope'
        - type: object
          properties:
            event_type: { const: dm.envelope.dispatched }
            data: { $ref: '#/components/schemas/DmEnvelopeDispatchedData' }
    DmDeviceProofEvent:
      allOf:
        - $ref: '#/components/schemas/EventEnvelope'
        - type: object
          properties:
            event_type: { const: dm.device.proof }
            data: { $ref: '#/components/schemas/DmDeviceProofData' }
    DmDeviceVerifiedEvent:
      allOf:
        - $ref: '#/components/schemas/EventEnvelope'
        - type: object
          properties:
            event_type: { const: dm.device.verified }
            data: { $ref: '#/components/schemas/DmDeviceVerifiedData' }
    DmEnvelopeAckEvent:
      allOf:
        - $ref: '#/components/schemas/EventEnvelope'
        - type: object
          properties:
            event_type: { const: dm.envelope.ack }
            data: { $ref: '#/components/schemas/DmEnvelopeAckData' }
