asyncapi: 3.0.0
id: urn:hexrelay:contracts:realtime-events-runtime:v1
info:
  title: HexRelay Realtime Runtime Contract
  version: 1.0.0
  description: |
    Runtime realtime contract currently implemented by `services/realtime-rs`.
    This contract only includes event types supported in live websocket routing.
    Current signaling operations support authenticated loopback/self-targeted
    envelope validation on the active websocket session only; they do not yet
    imply recipient-targeted delivery/fanout.
    Cross-identity recipient targeting is currently rejected as unsupported,
    and recipient delivery remains an open readiness watch in
    `docs/operations/readiness-corrections-log.md`.
    Realtime websocket limiter and auth-cache key derivation uses deterministic hashing
    so limiter/cache behavior remains stable across process restarts and instances.
    When outage-grace auth fallback is enabled, cached websocket session reuse remains
    bounded by both cache age and the upstream session expiry returned by
    `/v1/auth/sessions/validate`.
    Persisted server-channel message create, edit, and delete mutations in
    `services/api-rs` now bridge into this runtime surface through protected
    internal realtime publish routes, so successful REST mutations attempt to
    emit `channel.message.created`, `channel.message.updated`, and
    `channel.message.deleted` to current server members. That bridge is
    best-effort: REST mutation success is not transactional with downstream
    realtime delivery, downstream dispatch failures are logged, and no durable
    retry/outbox guarantee exists in the current runtime.
    Clients may optionally send `x-hexrelay-device-id` during websocket upgrade,
    or the `device_id` query parameter for browser websocket clients that cannot
    set custom upgrade headers, to enable per-device replay/hydration for
    `presence.updated`, `channel.message.created`, `channel.message.updated`, and
    `channel.message.deleted`; the same device binding is required for
    device-targeted DM envelope dispatch and `dm.envelope.ack` validation. Native
    clients may provide `x-hexrelay-device-secret` during websocket upgrade;
    browser clients must send `dm.device.proof` after `realtime.connected` because
    long-lived `device_secret` values are not accepted in websocket URLs. DM live
    dispatch and ack persistence require a verified websocket device proof matching
    the profile-device secret registered through `/v1/dm/profile-devices/heartbeat`;
    the secret is never echoed in public realtime events.
    API-accepted encrypted DM envelopes now bridge into realtime through a protected
    internal dispatch route. Connected recipient profile devices receive
    `dm.envelope.dispatched`; clients ack receipt with `dm.envelope.ack`, which the
    gateway persists through the API internal ack route before echoing a successful ack.
    When present, late-joining profile devices receive missed supported events before new
    live transitions only for recipients that had an active profiled connection when the
    original event was published.
defaultContentType: application/json
channels:
  callSignalOffer:
    address: call.signal.offer
    messages:
      callSignalOfferV1:
        $ref: '#/components/messages/CallSignalOfferV1'
  callSignalAnswer:
    address: call.signal.answer
    messages:
      callSignalAnswerV1:
        $ref: '#/components/messages/CallSignalAnswerV1'
  callSignalIceCandidate:
    address: call.signal.ice_candidate
    messages:
      callSignalIceCandidateV1:
        $ref: '#/components/messages/CallSignalIceCandidateV1'
  realtimeConnected:
    address: realtime.connected
    messages:
      realtimeConnectedV1:
        $ref: '#/components/messages/RealtimeConnectedV1'
  presenceUpdated:
    address: presence.updated
    messages:
      presenceUpdatedV1:
        $ref: '#/components/messages/PresenceUpdatedV1'
  channelMessageCreated:
    address: channel.message.created
    messages:
      channelMessageCreatedV1:
        $ref: '#/components/messages/ChannelMessageCreatedV1'
  channelMessageUpdated:
    address: channel.message.updated
    messages:
      channelMessageUpdatedV1:
        $ref: '#/components/messages/ChannelMessageUpdatedV1'
  channelMessageDeleted:
    address: channel.message.deleted
    messages:
      channelMessageDeletedV1:
        $ref: '#/components/messages/ChannelMessageDeletedV1'
  dmEnvelopeDispatched:
    address: dm.envelope.dispatched
    messages:
      dmEnvelopeDispatchedV1:
        $ref: '#/components/messages/DmEnvelopeDispatchedV1'
  dmDeviceProof:
    address: dm.device.proof
    messages:
      dmDeviceProofV1:
        $ref: '#/components/messages/DmDeviceProofV1'
  dmDeviceVerified:
    address: dm.device.verified
    messages:
      dmDeviceVerifiedV1:
        $ref: '#/components/messages/DmDeviceVerifiedV1'
  dmEnvelopeAck:
    address: dm.envelope.ack
    messages:
      dmEnvelopeAckV1:
        $ref: '#/components/messages/DmEnvelopeAckV1'
  error:
    address: error
    messages:
      errorV1:
        $ref: '#/components/messages/ErrorV1'
operations:
  sendCallSignalOffer:
    action: send
    channel:
      $ref: '#/channels/callSignalOffer'
    messages:
      - $ref: '#/channels/callSignalOffer/messages/callSignalOfferV1'
    x-hexrelay-signaling-semantics:
      requires_session_identity_from_match: true
      supported_targeting:
        - self_only
      rejection_codes:
        - event_invalid
        - event_identity_mismatch
        - event_unsupported
  sendCallSignalAnswer:
    action: send
    channel:
      $ref: '#/channels/callSignalAnswer'
    messages:
      - $ref: '#/channels/callSignalAnswer/messages/callSignalAnswerV1'
    x-hexrelay-signaling-semantics:
      requires_session_identity_from_match: true
      supported_targeting:
        - self_only
      rejection_codes:
        - event_invalid
        - event_identity_mismatch
        - event_unsupported
  sendCallSignalIceCandidate:
    action: send
    channel:
      $ref: '#/channels/callSignalIceCandidate'
    messages:
      - $ref: '#/channels/callSignalIceCandidate/messages/callSignalIceCandidateV1'
    x-hexrelay-signaling-semantics:
      requires_session_identity_from_match: true
      supported_targeting:
        - self_only
      rejection_codes:
        - event_invalid
        - event_identity_mismatch
        - event_unsupported
  receiveRealtimeConnected:
    action: receive
    channel:
      $ref: '#/channels/realtimeConnected'
    messages:
      - $ref: '#/channels/realtimeConnected/messages/realtimeConnectedV1'
  receivePresenceUpdated:
    action: receive
    channel:
      $ref: '#/channels/presenceUpdated'
    messages:
      - $ref: '#/channels/presenceUpdated/messages/presenceUpdatedV1'
  receiveChannelMessageCreated:
    action: receive
    channel:
      $ref: '#/channels/channelMessageCreated'
    messages:
      - $ref: '#/channels/channelMessageCreated/messages/channelMessageCreatedV1'
  receiveChannelMessageUpdated:
    action: receive
    channel:
      $ref: '#/channels/channelMessageUpdated'
    messages:
      - $ref: '#/channels/channelMessageUpdated/messages/channelMessageUpdatedV1'
  receiveChannelMessageDeleted:
    action: receive
    channel:
      $ref: '#/channels/channelMessageDeleted'
    messages:
      - $ref: '#/channels/channelMessageDeleted/messages/channelMessageDeletedV1'
  receiveDmEnvelopeDispatched:
    action: receive
    channel:
      $ref: '#/channels/dmEnvelopeDispatched'
    messages:
      - $ref: '#/channels/dmEnvelopeDispatched/messages/dmEnvelopeDispatchedV1'
  sendDmDeviceProof:
    action: send
    channel:
      $ref: '#/channels/dmDeviceProof'
    messages:
      - $ref: '#/channels/dmDeviceProof/messages/dmDeviceProofV1'
    x-hexrelay-dm-device-proof-semantics:
      requires_session_identity_match: true
      requires_websocket_device_match: true
      verifies_profile_device_secret_before_dm_dispatch: true
      device_secret_transport: websocket_message_or_native_upgrade_header
      rejects_device_secret_query_parameter: true
      rejection_codes:
        - event_invalid
        - event_device_mismatch
        - dm_device_proof_failed
  receiveDmDeviceVerified:
    action: receive
    channel:
      $ref: '#/channels/dmDeviceVerified'
    messages:
      - $ref: '#/channels/dmDeviceVerified/messages/dmDeviceVerifiedV1'
  sendDmEnvelopeAck:
    action: send
    channel:
      $ref: '#/channels/dmEnvelopeAck'
    messages:
      - $ref: '#/channels/dmEnvelopeAck/messages/dmEnvelopeAckV1'
    x-hexrelay-dm-ack-semantics:
      requires_session_identity_match: true
      requires_websocket_device_match: true
      requires_verified_websocket_device_proof: true
      persists_ack_before_success_echo: true
      rejection_codes:
        - event_invalid
        - event_identity_mismatch
        - event_device_mismatch
        - dm_ack_failed
  receiveError:
    action: receive
    channel:
      $ref: '#/channels/error'
    messages:
      - $ref: '#/channels/error/messages/errorV1'
components:
  messages:
    CallSignalOfferV1:
      payload:
        $ref: '#/components/schemas/CallSignalOfferEventV1'
    CallSignalAnswerV1:
      payload:
        $ref: '#/components/schemas/CallSignalAnswerEventV1'
    CallSignalIceCandidateV1:
      payload:
        $ref: '#/components/schemas/CallSignalIceCandidateEventV1'
    RealtimeConnectedV1:
      payload:
        $ref: '#/components/schemas/RealtimeConnectedEventV1'
    PresenceUpdatedV1:
      payload:
        $ref: '#/components/schemas/PresenceUpdatedEventV1'
    ChannelMessageCreatedV1:
      payload:
        $ref: '#/components/schemas/ChannelMessageCreatedEventV1'
    ChannelMessageUpdatedV1:
      payload:
        $ref: '#/components/schemas/ChannelMessageUpdatedEventV1'
    ChannelMessageDeletedV1:
      payload:
        $ref: '#/components/schemas/ChannelMessageDeletedEventV1'
    DmEnvelopeDispatchedV1:
      payload:
        $ref: '#/components/schemas/DmEnvelopeDispatchedEventV1'
    DmDeviceProofV1:
      payload:
        $ref: '#/components/schemas/DmDeviceProofEventV1'
    DmDeviceVerifiedV1:
      payload:
        $ref: '#/components/schemas/DmDeviceVerifiedEventV1'
    DmEnvelopeAckV1:
      payload:
        $ref: '#/components/schemas/DmEnvelopeAckEventV1'
    ErrorV1:
      payload:
        $ref: '#/components/schemas/ErrorEventV1'
  schemas:
    EventEnvelopeV1:
      type: object
      additionalProperties: false
      required: [event_id, event_type, event_version, occurred_at, correlation_id, producer, data]
      properties:
        event_id: { type: string }
        event_type: { type: string }
        event_version: { type: integer, enum: [1] }
        occurred_at: { type: string, format: date-time }
        correlation_id: { type: string }
        producer: { type: string, enum: [realtime-gateway, realtime-presence, realtime-channel, dm-message-node] }
    CallSignalOfferDataV1:
      type: object
      additionalProperties: false
      required: [call_id, from_identity_id, to_identity_id, sdp_offer]
      properties:
        call_id: { type: string }
        from_identity_id: { type: string }
        to_identity_id: { type: string }
        sdp_offer: { type: string }
    CallSignalAnswerDataV1:
      type: object
      additionalProperties: false
      required: [call_id, from_identity_id, to_identity_id, sdp_answer]
      properties:
        call_id: { type: string }
        from_identity_id: { type: string }
        to_identity_id: { type: string }
        sdp_answer: { type: string }
    CallSignalIceCandidateDataV1:
      type: object
      additionalProperties: false
      required: [call_id, from_identity_id, to_identity_id, candidate, sdp_mid, sdp_mline_index]
      properties:
        call_id: { type: string }
        from_identity_id: { type: string }
        to_identity_id: { type: string }
        candidate: { type: string }
        sdp_mid: { type: string, nullable: true }
        sdp_mline_index: { type: integer, nullable: true }
    CallSignalOfferEventV1:
      allOf:
        - $ref: '#/components/schemas/EventEnvelopeV1'
        - type: object
          properties:
            event_type: { const: call.signal.offer }
            data: { $ref: '#/components/schemas/CallSignalOfferDataV1' }
    CallSignalAnswerEventV1:
      allOf:
        - $ref: '#/components/schemas/EventEnvelopeV1'
        - type: object
          properties:
            event_type: { const: call.signal.answer }
            data: { $ref: '#/components/schemas/CallSignalAnswerDataV1' }
    CallSignalIceCandidateEventV1:
      allOf:
        - $ref: '#/components/schemas/EventEnvelopeV1'
        - type: object
          properties:
            event_type: { const: call.signal.ice_candidate }
            data: { $ref: '#/components/schemas/CallSignalIceCandidateDataV1' }
    RealtimeConnectedDataV1:
      type: object
      additionalProperties: false
      required: [status]
      properties:
        status: { type: string, enum: [ok] }
    ErrorDataV1:
      type: object
      additionalProperties: false
      required: [code, message]
      properties:
        code:
          type: string
          enum:
            - origin_disallowed
            - rate_limited
            - session_invalid
            - connection_cap_reached
            - dev_fault_disconnect
            - dev_fault_drop
            - event_invalid
            - event_version_unsupported
            - event_identity_mismatch
            - event_device_mismatch
            - event_unsupported
            - event_serialize_failed
            - event_too_large
            - event_rate_limited
            - dm_ack_failed
            - dm_device_proof_failed
        message: { type: string }
    PresenceUpdatedDataV1:
      type: object
      additionalProperties: false
      required: [identity_id, status, updated_at, presence_seq]
      properties:
        identity_id: { type: string }
        status: { type: string, enum: [online, offline] }
        updated_at: { type: string, format: date-time }
        presence_seq:
          type: integer
          minimum: 1
    ChannelMessageCreatedDataV1:
      type: object
      additionalProperties: false
      required: [message_id, server_id, channel_id, sender_identity_id, created_at, channel_seq]
      properties:
        message_id: { type: string }
        server_id: { type: string }
        channel_id: { type: string }
        sender_identity_id: { type: string }
        created_at: { type: string, format: date-time }
        channel_seq:
          type: integer
          minimum: 1
    ChannelMessageUpdatedDataV1:
      type: object
      additionalProperties: false
      required: [message_id, server_id, channel_id, editor_identity_id, edited_at, channel_seq]
      properties:
        message_id: { type: string }
        server_id: { type: string }
        channel_id: { type: string }
        editor_identity_id: { type: string }
        edited_at: { type: string, format: date-time }
        channel_seq:
          type: integer
          minimum: 1
    ChannelMessageDeletedDataV1:
      type: object
      additionalProperties: false
      required: [message_id, server_id, channel_id, deleter_identity_id, deleted_at, channel_seq]
      properties:
        message_id: { type: string }
        server_id: { type: string }
        channel_id: { type: string }
        deleter_identity_id: { type: string }
        deleted_at: { type: string, format: date-time }
        channel_seq:
          type: integer
          minimum: 1
    DmEnvelopeDispatchedDataV1:
      type: object
      additionalProperties: false
      required:
        - envelope_id
        - message_id
        - thread_id
        - sender_identity_id
        - recipient_identity_id
        - target_device_id
        - ciphertext
        - accepted_at
        - dispatched_at
        - delivery_cursor
        - transport_scope
      properties:
        envelope_id: { type: string, minLength: 8, maxLength: 128 }
        message_id: { type: string, minLength: 1, maxLength: 128 }
        thread_id: { type: string, minLength: 1, maxLength: 128 }
        sender_identity_id: { type: string, minLength: 3, maxLength: 64 }
        recipient_identity_id: { type: string, minLength: 3, maxLength: 64 }
        target_device_id: { type: string, minLength: 1, maxLength: 64 }
        ciphertext: { type: string, minLength: 1 }
        accepted_at: { type: string, format: date-time }
        dispatched_at: { type: string, format: date-time }
        delivery_cursor: { type: string, minLength: 1 }
        transport_scope:
          type: string
          enum: [encrypted_envelope_node]
    DmEnvelopeAckDataV1:
      type: object
      additionalProperties: false
      required:
        - envelope_id
        - message_id
        - thread_id
        - recipient_identity_id
        - device_id
        - delivery_cursor
        - ack_status
        - received_at
      properties:
        envelope_id: { type: string, minLength: 8, maxLength: 128 }
        message_id: { type: string, minLength: 1, maxLength: 128 }
        thread_id: { type: string, minLength: 1, maxLength: 128 }
        recipient_identity_id: { type: string, minLength: 3, maxLength: 64 }
        device_id: { type: string, minLength: 1, maxLength: 64 }
        delivery_cursor: { type: string, minLength: 1 }
        ack_status:
          type: string
          enum: [received]
        received_at: { type: string, format: date-time }
    DmDeviceProofDataV1:
      type: object
      additionalProperties: false
      required:
        - device_id
        - device_secret
      properties:
        device_id: { type: string, minLength: 1, maxLength: 64 }
        device_secret:
          type: string
          minLength: 16
          maxLength: 128
          description: Raw profile-device proof sent over the established websocket or native upgrade header; never placed in websocket URLs or echoed in public events.
    DmDeviceVerifiedDataV1:
      type: object
      additionalProperties: false
      required:
        - device_id
        - verified_at
      properties:
        device_id: { type: string, minLength: 1, maxLength: 64 }
        verified_at: { type: string, format: date-time }
    RealtimeConnectedEventV1:
      allOf:
        - $ref: '#/components/schemas/EventEnvelopeV1'
        - type: object
          properties:
            event_type: { const: realtime.connected }
            data: { $ref: '#/components/schemas/RealtimeConnectedDataV1' }
    ErrorEventV1:
      allOf:
        - $ref: '#/components/schemas/EventEnvelopeV1'
        - type: object
          properties:
            event_type: { const: error }
            data: { $ref: '#/components/schemas/ErrorDataV1' }
    PresenceUpdatedEventV1:
      allOf:
        - $ref: '#/components/schemas/EventEnvelopeV1'
        - type: object
          properties:
            event_type: { const: presence.updated }
            data: { $ref: '#/components/schemas/PresenceUpdatedDataV1' }
    ChannelMessageCreatedEventV1:
      allOf:
        - $ref: '#/components/schemas/EventEnvelopeV1'
        - type: object
          properties:
            event_type: { const: channel.message.created }
            data: { $ref: '#/components/schemas/ChannelMessageCreatedDataV1' }
    ChannelMessageUpdatedEventV1:
      allOf:
        - $ref: '#/components/schemas/EventEnvelopeV1'
        - type: object
          properties:
            event_type: { const: channel.message.updated }
            data: { $ref: '#/components/schemas/ChannelMessageUpdatedDataV1' }
    ChannelMessageDeletedEventV1:
      allOf:
        - $ref: '#/components/schemas/EventEnvelopeV1'
        - type: object
          properties:
            event_type: { const: channel.message.deleted }
            data: { $ref: '#/components/schemas/ChannelMessageDeletedDataV1' }
    DmEnvelopeDispatchedEventV1:
      allOf:
        - $ref: '#/components/schemas/EventEnvelopeV1'
        - type: object
          properties:
            event_type: { const: dm.envelope.dispatched }
            data: { $ref: '#/components/schemas/DmEnvelopeDispatchedDataV1' }
    DmDeviceProofEventV1:
      allOf:
        - $ref: '#/components/schemas/EventEnvelopeV1'
        - type: object
          properties:
            event_type: { const: dm.device.proof }
            data: { $ref: '#/components/schemas/DmDeviceProofDataV1' }
    DmDeviceVerifiedEventV1:
      allOf:
        - $ref: '#/components/schemas/EventEnvelopeV1'
        - type: object
          properties:
            event_type: { const: dm.device.verified }
            data: { $ref: '#/components/schemas/DmDeviceVerifiedDataV1' }
    DmEnvelopeAckEventV1:
      allOf:
        - $ref: '#/components/schemas/EventEnvelopeV1'
        - type: object
          properties:
            event_type: { const: dm.envelope.ack }
            data: { $ref: '#/components/schemas/DmEnvelopeAckDataV1' }
