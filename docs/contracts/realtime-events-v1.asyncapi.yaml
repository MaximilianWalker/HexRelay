asyncapi: 3.0.0
id: urn:hexrelay:contracts:realtime-events:v1
info:
  title: HexRelay Realtime Events Contract
  version: 0.2.0
  description: |
    Target-state realtime event contract baseline for Iteration 2 and Iteration 3.
    This file may include events not yet implemented in current runtime routing.
    Use `docs/contracts/realtime-events-runtime-v1.asyncapi.yaml` for current
    realtime runtime behavior.
    DM events are direct user-to-user transport events and are not relayed
    by guild/community servers.
    Versioned websocket payload migration is expected over time; current runtime
    uses opt-in `event_version=2` only for `presence.updated`, while channel and
    signaling vocabulary migration remains deferred.
defaultContentType: application/json
servers:
  staging:
    host: realtime.hexrelay.local
    protocol: wss
    description: Staging realtime gateway
channels:
  presenceUpdated:
    address: presence.updated
    description: User presence transition event.
    messages:
      presenceUpdatedV1:
        $ref: '#/components/messages/PresenceUpdatedV1'
      presenceUpdatedV2:
        $ref: '#/components/messages/PresenceUpdatedV2'
  dmMessageCreated:
    address: dm.message.created
    description: Direct peer DM message creation event.
    messages:
      dmMessageCreatedV1:
        $ref: '#/components/messages/DmMessageCreatedV1'
  callStateChanged:
    address: call.state.changed
    description: Voice/call lifecycle state transition event.
    messages:
      callStateChangedV1:
        $ref: '#/components/messages/CallStateChangedV1'
  callSignalOffer:
    address: call.signal.offer
    description: Offer signaling message for call/session establishment.
    messages:
      callSignalOfferV1:
        $ref: '#/components/messages/CallSignalOfferV1'
  callSignalAnswer:
    address: call.signal.answer
    description: Answer signaling message for call/session establishment.
    messages:
      callSignalAnswerV1:
        $ref: '#/components/messages/CallSignalAnswerV1'
  callSignalIceCandidate:
    address: call.signal.ice_candidate
    description: ICE candidate exchange event.
    messages:
      callSignalIceCandidateV1:
        $ref: '#/components/messages/CallSignalIceCandidateV1'
  screenshareStateChanged:
    address: screenshare.state.changed
    description: Screen-share lifecycle transition event.
    messages:
      screenshareStateChangedV1:
        $ref: '#/components/messages/ScreenShareStateChangedV1'
  channelMessageCreated:
    address: channel.message.created
    description: Server-channel message creation event for guild/community channels.
    messages:
      channelMessageCreatedV1:
        $ref: '#/components/messages/ChannelMessageCreatedV1'
  channelMessageUpdated:
    address: channel.message.updated
    description: Server-channel message edit event.
    messages:
      channelMessageUpdatedV1:
        $ref: '#/components/messages/ChannelMessageUpdatedV1'
  channelMessageDeleted:
    address: channel.message.deleted
    description: Server-channel message deletion event.
    messages:
      channelMessageDeletedV1:
        $ref: '#/components/messages/ChannelMessageDeletedV1'
operations:
  receivePresenceUpdated:
    action: receive
    channel:
      $ref: '#/channels/presenceUpdated'
    messages:
      - $ref: '#/channels/presenceUpdated/messages/presenceUpdatedV1'
      - $ref: '#/channels/presenceUpdated/messages/presenceUpdatedV2'
  receiveDmMessageCreated:
    action: receive
    channel:
      $ref: '#/channels/dmMessageCreated'
    messages:
      - $ref: '#/channels/dmMessageCreated/messages/dmMessageCreatedV1'
  receiveCallStateChanged:
    action: receive
    channel:
      $ref: '#/channels/callStateChanged'
    messages:
      - $ref: '#/channels/callStateChanged/messages/callStateChangedV1'
  receiveChannelMessageCreated:
    action: receive
    channel:
      $ref: '#/channels/channelMessageCreated'
    messages:
      - $ref: '#/channels/channelMessageCreated/messages/channelMessageCreatedV1'
  receiveChannelMessageUpdated:
    action: receive
    channel:
      $ref: '#/channels/channelMessageUpdated'
    messages:
      - $ref: '#/channels/channelMessageUpdated/messages/channelMessageUpdatedV1'
  receiveChannelMessageDeleted:
    action: receive
    channel:
      $ref: '#/channels/channelMessageDeleted'
    messages:
      - $ref: '#/channels/channelMessageDeleted/messages/channelMessageDeletedV1'
  receiveCallSignalOffer:
    action: receive
    channel:
      $ref: '#/channels/callSignalOffer'
    messages:
      - $ref: '#/channels/callSignalOffer/messages/callSignalOfferV1'
  receiveCallSignalAnswer:
    action: receive
    channel:
      $ref: '#/channels/callSignalAnswer'
    messages:
      - $ref: '#/channels/callSignalAnswer/messages/callSignalAnswerV1'
  receiveCallSignalIceCandidate:
    action: receive
    channel:
      $ref: '#/channels/callSignalIceCandidate'
    messages:
      - $ref: '#/channels/callSignalIceCandidate/messages/callSignalIceCandidateV1'
  receiveScreenShareStateChanged:
    action: receive
    channel:
      $ref: '#/channels/screenshareStateChanged'
    messages:
      - $ref: '#/channels/screenshareStateChanged/messages/screenshareStateChangedV1'
  sendCallSignalOffer:
    action: send
    channel:
      $ref: '#/channels/callSignalOffer'
    messages:
      - $ref: '#/channels/callSignalOffer/messages/callSignalOfferV1'
  sendCallSignalAnswer:
    action: send
    channel:
      $ref: '#/channels/callSignalAnswer'
    messages:
      - $ref: '#/channels/callSignalAnswer/messages/callSignalAnswerV1'
  sendCallSignalIceCandidate:
    action: send
    channel:
      $ref: '#/channels/callSignalIceCandidate'
    messages:
      - $ref: '#/channels/callSignalIceCandidate/messages/callSignalIceCandidateV1'
components:
  messages:
    PresenceUpdatedV1:
      name: PresenceUpdatedV1
      title: Presence Updated
      summary: Published when a user's presence changes.
      payload:
        $ref: '#/components/schemas/PresenceUpdatedEventV1'
      examples:
        - name: online
          payload:
            event_id: 8d08fdf4-8de6-4f8e-9dc6-64eb98508f6f
            event_type: presence.updated
            event_version: 1
            occurred_at: 2026-03-04T14:52:00Z
            correlation_id: 721be58b-65f0-43fd-bec8-3f8671b3d5c2
            producer: realtime-gateway
            data:
              user_id: 8a76fb90-4049-49de-9b8e-d1277f6c0ac4
              status: online
              updated_at: 2026-03-04T14:52:00Z
              presence_seq: 120
    DmMessageCreatedV1:
      name: DmMessageCreatedV1
      title: DM Message Created
      summary: Published when a new direct message is created.
      payload:
        $ref: '#/components/schemas/DmMessageCreatedEventV1'
      examples:
        - name: encrypted_direct_peer
          payload:
            event_id: be5468a6-bb4e-4e74-bec2-6f84e81226b1
            event_type: dm.message.created
            event_version: 1
            occurred_at: 2026-03-04T14:52:01Z
            correlation_id: adfd8d5c-3b7f-474f-8f02-8ba62f33f5c6
            producer: dm-direct-transport
            data:
              message_id: ad6b1131-e301-4b2e-a531-d6024f2f8ec4
              thread_id: 86588f8f-78f8-4234-b5fb-f53e90f8889d
              sender_id: d7cf2d6e-2905-43de-bf74-90b06ff5ed20
              created_at: 2026-03-04T14:52:01Z
              ciphertext: BASE64_CIPHERTEXT_PLACEHOLDER
              key_id: dm-key-018
              thread_seq: 401
              transport_scope: direct_peer
    CallStateChangedV1:
      name: CallStateChangedV1
      title: Call State Changed
      summary: Published when call state transitions.
      payload:
        $ref: '#/components/schemas/CallStateChangedEventV1'
      examples:
        - name: active
          payload:
            event_id: 4f4baf8e-2c17-42f7-bd67-650f3326d4bd
            event_type: call.state.changed
            event_version: 1
            occurred_at: 2026-03-04T14:52:05Z
            correlation_id: c4f08be4-2fe4-467b-9bf4-67e7a009f717
            producer: voice-signaling
            data:
              call_id: 8f415f6e-48df-4573-a225-88f3f6ab4029
              state: active
              updated_at: 2026-03-04T14:52:05Z
              call_seq: 16
    CallSignalOfferV1:
      name: CallSignalOfferV1
      title: Call Signal Offer
      summary: SDP offer exchange event.
      payload:
        $ref: '#/components/schemas/CallSignalOfferEventV1'
    CallSignalAnswerV1:
      name: CallSignalAnswerV1
      title: Call Signal Answer
      summary: SDP answer exchange event.
      payload:
        $ref: '#/components/schemas/CallSignalAnswerEventV1'
    CallSignalIceCandidateV1:
      name: CallSignalIceCandidateV1
      title: Call Signal ICE Candidate
      summary: ICE candidate exchange event.
      payload:
        $ref: '#/components/schemas/CallSignalIceCandidateEventV1'
    ScreenShareStateChangedV1:
      name: ScreenShareStateChangedV1
      title: ScreenShare State Changed
      summary: Published when screenshare state transitions.
      payload:
        $ref: '#/components/schemas/ScreenShareStateChangedEventV1'
    ChannelMessageCreatedV1:
      name: ChannelMessageCreatedV1
      title: Channel Message Created
      summary: Published when a server-channel message is created.
      payload:
        $ref: '#/components/schemas/ChannelMessageCreatedEventV1'
      examples:
        - name: guild_channel_message
          payload:
            event_id: a7408485-73c0-48d1-b4ff-8794de5a6f84
            event_type: channel.message.created
            event_version: 1
            occurred_at: 2026-03-04T14:53:00Z
            correlation_id: 0202c016-b114-47c1-a45b-8e8ecf5408d2
            producer: guild-message-service
            data:
              message_id: 122c18f4-d02d-4d39-a751-f6ca0210d98f
              guild_id: 4706f568-0f95-4656-8d39-a8f5817845d5
              channel_id: c9e4eda6-d4f0-4a6f-9d44-0f25783d6a2c
              sender_id: 4d6f4d44-8a36-4c2f-9348-8681f9f7e2ad
              created_at: 2026-03-04T14:53:00Z
              channel_seq: 922
    ChannelMessageUpdatedV1:
      name: ChannelMessageUpdatedV1
      title: Channel Message Updated
      summary: Published when a server-channel message is edited.
      payload:
        $ref: '#/components/schemas/ChannelMessageUpdatedEventV1'
      examples:
        - name: guild_channel_edit
          payload:
            event_id: 93edaf67-a89e-4822-9685-69f8f8c50ea6
            event_type: channel.message.updated
            event_version: 1
            occurred_at: 2026-03-04T14:54:00Z
            correlation_id: e4f22b4a-0f80-4b7e-964c-2902f6ef4a3a
            producer: guild-message-service
            data:
              message_id: 122c18f4-d02d-4d39-a751-f6ca0210d98f
              guild_id: 4706f568-0f95-4656-8d39-a8f5817845d5
              channel_id: c9e4eda6-d4f0-4a6f-9d44-0f25783d6a2c
              editor_id: 4d6f4d44-8a36-4c2f-9348-8681f9f7e2ad
              edited_at: 2026-03-04T14:54:00Z
              channel_seq: 923
    ChannelMessageDeletedV1:
      name: ChannelMessageDeletedV1
      title: Channel Message Deleted
      summary: Published when a server-channel message is deleted.
      payload:
        $ref: '#/components/schemas/ChannelMessageDeletedEventV1'
      examples:
        - name: guild_channel_delete
          payload:
            event_id: 31dbed6a-1865-473f-a194-c23f8fe5b163
            event_type: channel.message.deleted
            event_version: 1
            occurred_at: 2026-03-04T14:55:00Z
            correlation_id: e4f22b4a-0f80-4b7e-964c-2902f6ef4a3a
            producer: guild-message-service
            data:
              message_id: 122c18f4-d02d-4d39-a751-f6ca0210d98f
              guild_id: 4706f568-0f95-4656-8d39-a8f5817845d5
              channel_id: c9e4eda6-d4f0-4a6f-9d44-0f25783d6a2c
              deleted_by: 4d6f4d44-8a36-4c2f-9348-8681f9f7e2ad
              deleted_at: 2026-03-04T14:55:00Z
              channel_seq: 924
  schemas:
    EventEnvelopeV1:
      type: object
      additionalProperties: false
      required:
        - event_id
        - event_type
        - event_version
        - occurred_at
        - correlation_id
        - producer
      properties:
        event_id:
          type: string
          format: uuid
        event_type:
          type: string
          minLength: 3
          maxLength: 128
        event_version:
          type: integer
          minimum: 1
        occurred_at:
          type: string
          format: date-time
        correlation_id:
          type: string
          format: uuid
        producer:
          type: string
          minLength: 2
          maxLength: 64
    EventEnvelopeV2:
      type: object
      additionalProperties: false
      required:
        - event_id
        - event_type
        - event_version
        - occurred_at
        - correlation_id
        - producer
      properties:
        event_id:
          type: string
          format: uuid
        event_type:
          type: string
          minLength: 3
          maxLength: 128
        event_version:
          type: integer
          enum: [2]
        occurred_at:
          type: string
          format: date-time
        correlation_id:
          type: string
          format: uuid
        producer:
          type: string
          minLength: 2
          maxLength: 64
    PresenceUpdatedDataV1:
      type: object
      additionalProperties: false
      required:
        - user_id
        - status
        - updated_at
        - presence_seq
      properties:
        user_id:
          type: string
          format: uuid
        status:
          type: string
          enum: [online, idle, dnd, offline]
        updated_at:
          type: string
          format: date-time
        presence_seq:
          type: integer
          minimum: 1
    PresenceUpdatedEventV1:
      allOf:
        - $ref: '#/components/schemas/EventEnvelopeV1'
        - type: object
          additionalProperties: false
          required: [data]
          properties:
            event_type:
              const: presence.updated
            data:
              $ref: '#/components/schemas/PresenceUpdatedDataV1'
    PresenceUpdatedDataV2:
      type: object
      additionalProperties: false
      required:
        - identity_id
        - status
        - updated_at
        - presence_seq
      properties:
        identity_id:
          type: string
          format: uuid
        status:
          type: string
          enum: [online, idle, dnd, offline]
        updated_at:
          type: string
          format: date-time
        presence_seq:
          type: integer
          minimum: 1
    PresenceUpdatedEventV2:
      allOf:
        - $ref: '#/components/schemas/EventEnvelopeV2'
        - type: object
          additionalProperties: false
          required: [data]
          properties:
            event_type:
              const: presence.updated
            data:
              $ref: '#/components/schemas/PresenceUpdatedDataV2'
    DmMessageCreatedDataV1:
      type: object
      additionalProperties: false
      required:
        - message_id
        - thread_id
        - sender_id
        - created_at
        - ciphertext
        - key_id
        - thread_seq
        - transport_scope
      properties:
        message_id:
          type: string
          format: uuid
        thread_id:
          type: string
          format: uuid
        sender_id:
          type: string
          format: uuid
        created_at:
          type: string
          format: date-time
        ciphertext:
          type: string
          minLength: 24
        key_id:
          type: string
          minLength: 4
          maxLength: 64
        thread_seq:
          type: integer
          minimum: 1
        transport_scope:
          type: string
          enum: [direct_peer]
    DmMessageCreatedEventV1:
      allOf:
        - $ref: '#/components/schemas/EventEnvelopeV1'
        - type: object
          additionalProperties: false
          required: [data]
          properties:
            event_type:
              const: dm.message.created
            data:
              $ref: '#/components/schemas/DmMessageCreatedDataV1'
    CallStateChangedDataV1:
      type: object
      additionalProperties: false
      required:
        - call_id
        - state
        - updated_at
        - call_seq
      properties:
        call_id:
          type: string
          format: uuid
        state:
          type: string
          enum: [ringing, active, ended, failed]
        updated_at:
          type: string
          format: date-time
        call_seq:
          type: integer
          minimum: 1
        reason:
          type: string
          maxLength: 128
    CallStateChangedEventV1:
      allOf:
        - $ref: '#/components/schemas/EventEnvelopeV1'
        - type: object
          additionalProperties: false
          required: [data]
          properties:
            event_type:
              const: call.state.changed
            data:
              $ref: '#/components/schemas/CallStateChangedDataV1'
    CallSignalOfferDataV1:
      type: object
      additionalProperties: false
      required: [call_id, from_user_id, to_user_id, sdp_offer]
      properties:
        call_id: { type: string, format: uuid }
        from_user_id: { type: string, format: uuid }
        to_user_id: { type: string, format: uuid }
        sdp_offer: { type: string, minLength: 16 }
    CallSignalOfferEventV1:
      allOf:
        - $ref: '#/components/schemas/EventEnvelopeV1'
        - type: object
          additionalProperties: false
          required: [data]
          properties:
            event_type:
              const: call.signal.offer
            data:
              $ref: '#/components/schemas/CallSignalOfferDataV1'
    CallSignalAnswerDataV1:
      type: object
      additionalProperties: false
      required: [call_id, from_user_id, to_user_id, sdp_answer]
      properties:
        call_id: { type: string, format: uuid }
        from_user_id: { type: string, format: uuid }
        to_user_id: { type: string, format: uuid }
        sdp_answer: { type: string, minLength: 16 }
    CallSignalAnswerEventV1:
      allOf:
        - $ref: '#/components/schemas/EventEnvelopeV1'
        - type: object
          additionalProperties: false
          required: [data]
          properties:
            event_type:
              const: call.signal.answer
            data:
              $ref: '#/components/schemas/CallSignalAnswerDataV1'
    CallSignalIceCandidateDataV1:
      type: object
      additionalProperties: false
      required: [call_id, from_user_id, to_user_id, candidate]
      properties:
        call_id: { type: string, format: uuid }
        from_user_id: { type: string, format: uuid }
        to_user_id: { type: string, format: uuid }
        candidate: { type: string, minLength: 8 }
        sdp_mid: { type: string, nullable: true }
        sdp_mline_index: { type: integer, nullable: true }
    CallSignalIceCandidateEventV1:
      allOf:
        - $ref: '#/components/schemas/EventEnvelopeV1'
        - type: object
          additionalProperties: false
          required: [data]
          properties:
            event_type:
              const: call.signal.ice_candidate
            data:
              $ref: '#/components/schemas/CallSignalIceCandidateDataV1'
    ScreenShareStateChangedDataV1:
      type: object
      additionalProperties: false
      required: [call_id, state, updated_at, screenshare_seq]
      properties:
        call_id: { type: string, format: uuid }
        state:
          type: string
          enum: [started, paused, resumed, stopped, failed]
        updated_at: { type: string, format: date-time }
        screenshare_seq: { type: integer, minimum: 1 }
    ScreenShareStateChangedEventV1:
      allOf:
        - $ref: '#/components/schemas/EventEnvelopeV1'
        - type: object
          additionalProperties: false
          required: [data]
          properties:
            event_type:
              const: screenshare.state.changed
            data:
              $ref: '#/components/schemas/ScreenShareStateChangedDataV1'
    ChannelMessageCreatedDataV1:
      type: object
      additionalProperties: false
      required:
        - message_id
        - guild_id
        - channel_id
        - sender_id
        - created_at
        - channel_seq
      properties:
        message_id:
          type: string
          format: uuid
        guild_id:
          type: string
          format: uuid
        channel_id:
          type: string
          format: uuid
        sender_id:
          type: string
          format: uuid
        created_at:
          type: string
          format: date-time
        channel_seq:
          type: integer
          minimum: 1
    ChannelMessageCreatedEventV1:
      allOf:
        - $ref: '#/components/schemas/EventEnvelopeV1'
        - type: object
          additionalProperties: false
          required: [data]
          properties:
            event_type:
              const: channel.message.created
            data:
              $ref: '#/components/schemas/ChannelMessageCreatedDataV1'
    ChannelMessageUpdatedDataV1:
      type: object
      additionalProperties: false
      required:
        - message_id
        - guild_id
        - channel_id
        - editor_id
        - edited_at
        - channel_seq
      properties:
        message_id:
          type: string
          format: uuid
        guild_id:
          type: string
          format: uuid
        channel_id:
          type: string
          format: uuid
        editor_id:
          type: string
          format: uuid
        edited_at:
          type: string
          format: date-time
        channel_seq:
          type: integer
          minimum: 1
    ChannelMessageUpdatedEventV1:
      allOf:
        - $ref: '#/components/schemas/EventEnvelopeV1'
        - type: object
          additionalProperties: false
          required: [data]
          properties:
            event_type:
              const: channel.message.updated
            data:
              $ref: '#/components/schemas/ChannelMessageUpdatedDataV1'
    ChannelMessageDeletedDataV1:
      type: object
      additionalProperties: false
      required:
        - message_id
        - guild_id
        - channel_id
        - deleted_by
        - deleted_at
        - channel_seq
      properties:
        message_id:
          type: string
          format: uuid
        guild_id:
          type: string
          format: uuid
        channel_id:
          type: string
          format: uuid
        deleted_by:
          type: string
          format: uuid
        deleted_at:
          type: string
          format: date-time
        channel_seq:
          type: integer
          minimum: 1
    ChannelMessageDeletedEventV1:
      allOf:
        - $ref: '#/components/schemas/EventEnvelopeV1'
        - type: object
          additionalProperties: false
          required: [data]
          properties:
            event_type:
              const: channel.message.deleted
            data:
              $ref: '#/components/schemas/ChannelMessageDeletedDataV1'
