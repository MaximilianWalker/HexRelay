asyncapi: 3.0.0
id: urn:hexrelay:contracts:realtime-events:v1
info:
  title: HexRelay Realtime Events Contract
  version: 0.3.0
  description: |
    Target-state realtime event contract baseline for Iteration 2 and Iteration 3.
    This file may include events not yet implemented in current runtime routing.
    Use `docs/contracts/realtime-events-runtime-v1.asyncapi.yaml` for current
    realtime runtime behavior.
    Target-state DM events carry E2EE envelopes only. Shared servers/message
    nodes fan out ciphertext envelopes and minimal delivery metadata, while DM
    plaintext and private keys remain client/device-only.
defaultContentType: application/json
servers:
  staging:
    host: realtime.hexrelay.local
    protocol: wss
    description: Staging realtime gateway
channels:
  presenceUpdated:
    address: presence.updated
    description: User presence transition event.
    messages:
      presenceUpdatedV1:
        $ref: '#/components/messages/PresenceUpdatedV1'
  dmMessageCreated:
    address: dm.message.created
    description: Node/server-routed E2EE DM envelope creation event.
    messages:
      dmMessageCreatedV1:
        $ref: '#/components/messages/DmMessageCreatedV1'
  dmEnvelopeDispatched:
    address: dm.envelope.dispatched
    description: Message-node dispatch of a ciphertext DM envelope to one target profile device.
    messages:
      dmEnvelopeDispatchedV1:
        $ref: '#/components/messages/DmEnvelopeDispatchedV1'
  dmEnvelopeAck:
    address: dm.envelope.ack
    description: Recipient profile-device acknowledgement for a ciphertext DM envelope.
    messages:
      dmEnvelopeAckV1:
        $ref: '#/components/messages/DmEnvelopeAckV1'
  dmDeliveryUpdated:
    address: dm.delivery.updated
    description: Delivery-state update derived from durable acceptance, dispatch attempts, and device acknowledgements.
    messages:
      dmDeliveryUpdatedV1:
        $ref: '#/components/messages/DmDeliveryUpdatedV1'
  callStateChanged:
    address: call.state.changed
    description: Voice/call lifecycle state transition event.
    messages:
      callStateChangedV1:
        $ref: '#/components/messages/CallStateChangedV1'
  callSignalOffer:
    address: call.signal.offer
    description: Offer signaling message for call/session establishment.
    messages:
      callSignalOfferV1:
        $ref: '#/components/messages/CallSignalOfferV1'
  callSignalAnswer:
    address: call.signal.answer
    description: Answer signaling message for call/session establishment.
    messages:
      callSignalAnswerV1:
        $ref: '#/components/messages/CallSignalAnswerV1'
  callSignalIceCandidate:
    address: call.signal.ice_candidate
    description: ICE candidate exchange event.
    messages:
      callSignalIceCandidateV1:
        $ref: '#/components/messages/CallSignalIceCandidateV1'
  screenshareStateChanged:
    address: screenshare.state.changed
    description: Screen-share lifecycle transition event.
    messages:
      screenshareStateChangedV1:
        $ref: '#/components/messages/ScreenShareStateChangedV1'
  channelMessageCreated:
    address: channel.message.created
    description: Server-channel message creation event for guild/community channels.
    messages:
      channelMessageCreatedV1:
        $ref: '#/components/messages/ChannelMessageCreatedV1'
  channelMessageUpdated:
    address: channel.message.updated
    description: Server-channel message edit event.
    messages:
      channelMessageUpdatedV1:
        $ref: '#/components/messages/ChannelMessageUpdatedV1'
  channelMessageDeleted:
    address: channel.message.deleted
    description: Server-channel message deletion event.
    messages:
      channelMessageDeletedV1:
        $ref: '#/components/messages/ChannelMessageDeletedV1'
operations:
  receivePresenceUpdated:
    action: receive
    channel:
      $ref: '#/channels/presenceUpdated'
    messages:
      - $ref: '#/channels/presenceUpdated/messages/presenceUpdatedV1'
  receiveDmMessageCreated:
    action: receive
    channel:
      $ref: '#/channels/dmMessageCreated'
    messages:
      - $ref: '#/channels/dmMessageCreated/messages/dmMessageCreatedV1'
  receiveDmEnvelopeDispatched:
    action: receive
    channel:
      $ref: '#/channels/dmEnvelopeDispatched'
    messages:
      - $ref: '#/channels/dmEnvelopeDispatched/messages/dmEnvelopeDispatchedV1'
  sendDmEnvelopeAck:
    action: send
    channel:
      $ref: '#/channels/dmEnvelopeAck'
    messages:
      - $ref: '#/channels/dmEnvelopeAck/messages/dmEnvelopeAckV1'
  receiveDmDeliveryUpdated:
    action: receive
    channel:
      $ref: '#/channels/dmDeliveryUpdated'
    messages:
      - $ref: '#/channels/dmDeliveryUpdated/messages/dmDeliveryUpdatedV1'
  receiveCallStateChanged:
    action: receive
    channel:
      $ref: '#/channels/callStateChanged'
    messages:
      - $ref: '#/channels/callStateChanged/messages/callStateChangedV1'
  receiveChannelMessageCreated:
    action: receive
    channel:
      $ref: '#/channels/channelMessageCreated'
    messages:
      - $ref: '#/channels/channelMessageCreated/messages/channelMessageCreatedV1'
  receiveChannelMessageUpdated:
    action: receive
    channel:
      $ref: '#/channels/channelMessageUpdated'
    messages:
      - $ref: '#/channels/channelMessageUpdated/messages/channelMessageUpdatedV1'
  receiveChannelMessageDeleted:
    action: receive
    channel:
      $ref: '#/channels/channelMessageDeleted'
    messages:
      - $ref: '#/channels/channelMessageDeleted/messages/channelMessageDeletedV1'
  receiveCallSignalOffer:
    action: receive
    channel:
      $ref: '#/channels/callSignalOffer'
    messages:
      - $ref: '#/channels/callSignalOffer/messages/callSignalOfferV1'
  receiveCallSignalAnswer:
    action: receive
    channel:
      $ref: '#/channels/callSignalAnswer'
    messages:
      - $ref: '#/channels/callSignalAnswer/messages/callSignalAnswerV1'
  receiveCallSignalIceCandidate:
    action: receive
    channel:
      $ref: '#/channels/callSignalIceCandidate'
    messages:
      - $ref: '#/channels/callSignalIceCandidate/messages/callSignalIceCandidateV1'
  receiveScreenShareStateChanged:
    action: receive
    channel:
      $ref: '#/channels/screenshareStateChanged'
    messages:
      - $ref: '#/channels/screenshareStateChanged/messages/screenshareStateChangedV1'
  sendCallSignalOffer:
    action: send
    channel:
      $ref: '#/channels/callSignalOffer'
    messages:
      - $ref: '#/channels/callSignalOffer/messages/callSignalOfferV1'
  sendCallSignalAnswer:
    action: send
    channel:
      $ref: '#/channels/callSignalAnswer'
    messages:
      - $ref: '#/channels/callSignalAnswer/messages/callSignalAnswerV1'
  sendCallSignalIceCandidate:
    action: send
    channel:
      $ref: '#/channels/callSignalIceCandidate'
    messages:
      - $ref: '#/channels/callSignalIceCandidate/messages/callSignalIceCandidateV1'
components:
  messages:
    PresenceUpdatedV1:
      name: PresenceUpdatedV1
      title: Presence Updated
      summary: Published when a user's presence changes.
      payload:
        $ref: '#/components/schemas/PresenceUpdatedEventV1'
      examples:
        - name: online
          payload:
            event_id: 8d08fdf4-8de6-4f8e-9dc6-64eb98508f6f
            event_type: presence.updated
            event_version: 1
            occurred_at: 2026-03-04T14:52:00Z
            correlation_id: 721be58b-65f0-43fd-bec8-3f8671b3d5c2
            producer: realtime-gateway
            data:
              identity_id: 8a76fb90-4049-49de-9b8e-d1277f6c0ac4
              status: online
              updated_at: 2026-03-04T14:52:00Z
              presence_seq: 120
    DmMessageCreatedV1:
      name: DmMessageCreatedV1
      title: DM Message Created
      summary: Published when a new node-routed DM envelope is created.
      payload:
        $ref: '#/components/schemas/DmMessageCreatedEventV1'
      examples:
        - name: encrypted_message_node
          payload:
            event_id: be5468a6-bb4e-4e74-bec2-6f84e81226b1
            event_type: dm.message.created
            event_version: 1
            occurred_at: 2026-03-04T14:52:01Z
            correlation_id: adfd8d5c-3b7f-474f-8f02-8ba62f33f5c6
            producer: dm-message-node
            data:
              message_id: ad6b1131-e301-4b2e-a531-d6024f2f8ec4
              thread_id: 86588f8f-78f8-4234-b5fb-f53e90f8889d
              sender_id: d7cf2d6e-2905-43de-bf74-90b06ff5ed20
              created_at: 2026-03-04T14:52:01Z
              ciphertext: BASE64_CIPHERTEXT_PLACEHOLDER
              key_id: dm-key-018
              thread_seq: 401
              transport_scope: encrypted_envelope_node
    DmEnvelopeDispatchedV1:
      name: DmEnvelopeDispatchedV1
      title: DM Envelope Dispatched
      summary: Published to a recipient device when a message node dispatches an accepted ciphertext envelope.
      payload:
        $ref: '#/components/schemas/DmEnvelopeDispatchedEventV1'
      examples:
        - name: dispatched_to_profile_device
          payload:
            event_id: 2a5e37f2-4d4c-48f7-a35a-3b5fe6eae91d
            event_type: dm.envelope.dispatched
            event_version: 1
            occurred_at: 2026-05-08T15:00:00Z
            correlation_id: 5f225368-8e8d-4a7a-a057-f5fd7177901a
            producer: dm-message-node
            data:
              envelope_id: env-01hx7k5c9q5r0x9f5d7s0v4a6c
              message_id: msg-01hx7k5c9q5r0x9f5d7s0v4a6c
              thread_id: dm-usr-sender-usr-recipient
              sender_identity_id: usr-sender
              recipient_identity_id: usr-recipient
              target_device_id: laptop-main
              ciphertext: BASE64_CIPHERTEXT_PLACEHOLDER
              accepted_at: 2026-05-08T14:59:59Z
              dispatched_at: 2026-05-08T15:00:00Z
              delivery_cursor: '42'
              transport_scope: encrypted_envelope_node
    DmEnvelopeAckV1:
      name: DmEnvelopeAckV1
      title: DM Envelope Ack
      summary: Sent by a recipient device after it receives a ciphertext envelope from the message node.
      payload:
        $ref: '#/components/schemas/DmEnvelopeAckEventV1'
      examples:
        - name: device_received_envelope
          payload:
            event_id: 16c7e139-03b1-4576-80eb-c52382fe9fe7
            event_type: dm.envelope.ack
            event_version: 1
            occurred_at: 2026-05-08T15:00:01Z
            correlation_id: 5f225368-8e8d-4a7a-a057-f5fd7177901a
            producer: web-client
            data:
              envelope_id: env-01hx7k5c9q5r0x9f5d7s0v4a6c
              message_id: msg-01hx7k5c9q5r0x9f5d7s0v4a6c
              thread_id: dm-usr-sender-usr-recipient
              recipient_identity_id: usr-recipient
              device_id: laptop-main
              delivery_cursor: '42'
              ack_status: received
              received_at: 2026-05-08T15:00:01Z
    DmDeliveryUpdatedV1:
      name: DmDeliveryUpdatedV1
      title: DM Delivery Updated
      summary: Published when delivery metadata changes after acceptance, dispatch, or device acknowledgement.
      payload:
        $ref: '#/components/schemas/DmDeliveryUpdatedEventV1'
      examples:
        - name: acked_by_device
          payload:
            event_id: e8d42369-5ad8-45da-8f7b-aeb22c7b1981
            event_type: dm.delivery.updated
            event_version: 1
            occurred_at: 2026-05-08T15:00:01Z
            correlation_id: 5f225368-8e8d-4a7a-a057-f5fd7177901a
            producer: dm-message-node
            data:
              message_id: msg-01hx7k5c9q5r0x9f5d7s0v4a6c
              thread_id: dm-usr-sender-usr-recipient
              sender_identity_id: usr-sender
              recipient_identity_id: usr-recipient
              delivery_state: acked
              delivery_cursor: '42'
              dispatched_device_ids: [laptop-main]
              acked_device_ids: [laptop-main]
              pending_device_ids: [phone-main]
              failed_device_ids: []
              updated_at: 2026-05-08T15:00:01Z
    CallStateChangedV1:
      name: CallStateChangedV1
      title: Call State Changed
      summary: Published when call state transitions.
      payload:
        $ref: '#/components/schemas/CallStateChangedEventV1'
      examples:
        - name: active
          payload:
            event_id: 4f4baf8e-2c17-42f7-bd67-650f3326d4bd
            event_type: call.state.changed
            event_version: 1
            occurred_at: 2026-03-04T14:52:05Z
            correlation_id: c4f08be4-2fe4-467b-9bf4-67e7a009f717
            producer: voice-signaling
            data:
              call_id: 8f415f6e-48df-4573-a225-88f3f6ab4029
              state: active
              updated_at: 2026-03-04T14:52:05Z
              call_seq: 16
    CallSignalOfferV1:
      name: CallSignalOfferV1
      title: Call Signal Offer
      summary: SDP offer exchange event.
      payload:
        $ref: '#/components/schemas/CallSignalOfferEventV1'
    CallSignalAnswerV1:
      name: CallSignalAnswerV1
      title: Call Signal Answer
      summary: SDP answer exchange event.
      payload:
        $ref: '#/components/schemas/CallSignalAnswerEventV1'
    CallSignalIceCandidateV1:
      name: CallSignalIceCandidateV1
      title: Call Signal ICE Candidate
      summary: ICE candidate exchange event.
      payload:
        $ref: '#/components/schemas/CallSignalIceCandidateEventV1'
    ScreenShareStateChangedV1:
      name: ScreenShareStateChangedV1
      title: ScreenShare State Changed
      summary: Published when screenshare state transitions.
      payload:
        $ref: '#/components/schemas/ScreenShareStateChangedEventV1'
    ChannelMessageCreatedV1:
      name: ChannelMessageCreatedV1
      title: Channel Message Created
      summary: Published when a server-channel message is created.
      payload:
        $ref: '#/components/schemas/ChannelMessageCreatedEventV1'
      examples:
        - name: guild_channel_message
          payload:
            event_id: a7408485-73c0-48d1-b4ff-8794de5a6f84
            event_type: channel.message.created
            event_version: 1
            occurred_at: 2026-03-04T14:53:00Z
            correlation_id: 0202c016-b114-47c1-a45b-8e8ecf5408d2
            producer: guild-message-service
            data:
              message_id: 122c18f4-d02d-4d39-a751-f6ca0210d98f
              server_id: 4706f568-0f95-4656-8d39-a8f5817845d5
              channel_id: c9e4eda6-d4f0-4a6f-9d44-0f25783d6a2c
              sender_identity_id: 4d6f4d44-8a36-4c2f-9348-8681f9f7e2ad
              created_at: 2026-03-04T14:53:00Z
              channel_seq: 922
    ChannelMessageUpdatedV1:
      name: ChannelMessageUpdatedV1
      title: Channel Message Updated
      summary: Published when a server-channel message is edited.
      payload:
        $ref: '#/components/schemas/ChannelMessageUpdatedEventV1'
      examples:
        - name: guild_channel_edit
          payload:
            event_id: 93edaf67-a89e-4822-9685-69f8f8c50ea6
            event_type: channel.message.updated
            event_version: 1
            occurred_at: 2026-03-04T14:54:00Z
            correlation_id: e4f22b4a-0f80-4b7e-964c-2902f6ef4a3a
            producer: guild-message-service
            data:
              message_id: 122c18f4-d02d-4d39-a751-f6ca0210d98f
              server_id: 4706f568-0f95-4656-8d39-a8f5817845d5
              channel_id: c9e4eda6-d4f0-4a6f-9d44-0f25783d6a2c
              editor_identity_id: 4d6f4d44-8a36-4c2f-9348-8681f9f7e2ad
              edited_at: 2026-03-04T14:54:00Z
              channel_seq: 923
    ChannelMessageDeletedV1:
      name: ChannelMessageDeletedV1
      title: Channel Message Deleted
      summary: Published when a server-channel message is deleted.
      payload:
        $ref: '#/components/schemas/ChannelMessageDeletedEventV1'
      examples:
        - name: guild_channel_delete
          payload:
            event_id: 31dbed6a-1865-473f-a194-c23f8fe5b163
            event_type: channel.message.deleted
            event_version: 1
            occurred_at: 2026-03-04T14:55:00Z
            correlation_id: e4f22b4a-0f80-4b7e-964c-2902f6ef4a3a
            producer: guild-message-service
            data:
              message_id: 122c18f4-d02d-4d39-a751-f6ca0210d98f
              server_id: 4706f568-0f95-4656-8d39-a8f5817845d5
              channel_id: c9e4eda6-d4f0-4a6f-9d44-0f25783d6a2c
              deleter_identity_id: 4d6f4d44-8a36-4c2f-9348-8681f9f7e2ad
              deleted_at: 2026-03-04T14:55:00Z
              channel_seq: 924
  schemas:
    EventEnvelopeV1:
      type: object
      additionalProperties: false
      required:
        - event_id
        - event_type
        - event_version
        - occurred_at
        - correlation_id
        - producer
      properties:
        event_id:
          type: string
          format: uuid
        event_type:
          type: string
          minLength: 3
          maxLength: 128
        event_version:
          type: integer
          minimum: 1
        occurred_at:
          type: string
          format: date-time
        correlation_id:
          type: string
          format: uuid
        producer:
          type: string
          minLength: 2
          maxLength: 64
    PresenceUpdatedDataV1:
      type: object
      additionalProperties: false
      required:
        - identity_id
        - status
        - updated_at
        - presence_seq
      properties:
        identity_id:
          type: string
          format: uuid
        status:
          type: string
          enum: [online, idle, dnd, offline]
        updated_at:
          type: string
          format: date-time
        presence_seq:
          type: integer
          minimum: 1
    PresenceUpdatedEventV1:
      allOf:
        - $ref: '#/components/schemas/EventEnvelopeV1'
        - type: object
          additionalProperties: false
          required: [data]
          properties:
            event_type:
              const: presence.updated
            data:
              $ref: '#/components/schemas/PresenceUpdatedDataV1'
    DmMessageCreatedDataV1:
      type: object
      additionalProperties: false
      required:
        - message_id
        - thread_id
        - sender_id
        - created_at
        - ciphertext
        - key_id
        - thread_seq
        - transport_scope
      properties:
        message_id:
          type: string
          format: uuid
        thread_id:
          type: string
          format: uuid
        sender_id:
          type: string
          format: uuid
        created_at:
          type: string
          format: date-time
        ciphertext:
          type: string
          minLength: 24
        key_id:
          type: string
          minLength: 4
          maxLength: 64
        thread_seq:
          type: integer
          minimum: 1
        transport_scope:
          type: string
          enum: [encrypted_envelope_node]
    DmMessageCreatedEventV1:
      allOf:
        - $ref: '#/components/schemas/EventEnvelopeV1'
        - type: object
          additionalProperties: false
          required: [data]
          properties:
            event_type:
              const: dm.message.created
            data:
              $ref: '#/components/schemas/DmMessageCreatedDataV1'
    DmEnvelopeDispatchedDataV1:
      type: object
      additionalProperties: false
      required:
        - envelope_id
        - message_id
        - thread_id
        - sender_identity_id
        - recipient_identity_id
        - target_device_id
        - ciphertext
        - accepted_at
        - dispatched_at
        - delivery_cursor
        - transport_scope
      properties:
        envelope_id: { type: string, minLength: 8, maxLength: 128 }
        message_id: { type: string, minLength: 3, maxLength: 128 }
        thread_id: { type: string, minLength: 3, maxLength: 128 }
        sender_identity_id: { type: string, minLength: 3, maxLength: 64 }
        recipient_identity_id: { type: string, minLength: 3, maxLength: 64 }
        target_device_id: { type: string, minLength: 1, maxLength: 64 }
        ciphertext: { type: string, minLength: 24 }
        accepted_at: { type: string, format: date-time }
        dispatched_at: { type: string, format: date-time }
        delivery_cursor: { type: string, minLength: 1 }
        transport_scope:
          type: string
          enum: [encrypted_envelope_node]
    DmEnvelopeDispatchedEventV1:
      allOf:
        - $ref: '#/components/schemas/EventEnvelopeV1'
        - type: object
          additionalProperties: false
          required: [data]
          properties:
            event_type:
              const: dm.envelope.dispatched
            data:
              $ref: '#/components/schemas/DmEnvelopeDispatchedDataV1'
    DmEnvelopeAckDataV1:
      type: object
      additionalProperties: false
      required:
        - envelope_id
        - message_id
        - thread_id
        - recipient_identity_id
        - device_id
        - delivery_cursor
        - ack_status
        - received_at
      properties:
        envelope_id: { type: string, minLength: 8, maxLength: 128 }
        message_id: { type: string, minLength: 3, maxLength: 128 }
        thread_id: { type: string, minLength: 3, maxLength: 128 }
        recipient_identity_id: { type: string, minLength: 3, maxLength: 64 }
        device_id: { type: string, minLength: 1, maxLength: 64 }
        delivery_cursor: { type: string, minLength: 1 }
        ack_status:
          type: string
          enum: [received]
        received_at: { type: string, format: date-time }
    DmEnvelopeAckEventV1:
      allOf:
        - $ref: '#/components/schemas/EventEnvelopeV1'
        - type: object
          additionalProperties: false
          required: [data]
          properties:
            event_type:
              const: dm.envelope.ack
            data:
              $ref: '#/components/schemas/DmEnvelopeAckDataV1'
    DmDeliveryUpdatedDataV1:
      type: object
      additionalProperties: false
      required:
        - message_id
        - thread_id
        - sender_identity_id
        - recipient_identity_id
        - delivery_state
        - delivery_cursor
        - dispatched_device_ids
        - acked_device_ids
        - pending_device_ids
        - failed_device_ids
        - updated_at
      properties:
        message_id: { type: string, minLength: 3, maxLength: 128 }
        thread_id: { type: string, minLength: 3, maxLength: 128 }
        sender_identity_id: { type: string, minLength: 3, maxLength: 64 }
        recipient_identity_id: { type: string, minLength: 3, maxLength: 64 }
        delivery_state:
          type: string
          enum: [pending_delivery, dispatched, acked, catch_up_required, failed]
        delivery_cursor: { type: string, minLength: 1 }
        dispatched_device_ids:
          type: array
          items: { type: string, minLength: 1, maxLength: 64 }
        acked_device_ids:
          type: array
          items: { type: string, minLength: 1, maxLength: 64 }
        pending_device_ids:
          type: array
          items: { type: string, minLength: 1, maxLength: 64 }
        failed_device_ids:
          type: array
          items: { type: string, minLength: 1, maxLength: 64 }
        updated_at: { type: string, format: date-time }
    DmDeliveryUpdatedEventV1:
      allOf:
        - $ref: '#/components/schemas/EventEnvelopeV1'
        - type: object
          additionalProperties: false
          required: [data]
          properties:
            event_type:
              const: dm.delivery.updated
            data:
              $ref: '#/components/schemas/DmDeliveryUpdatedDataV1'
    CallStateChangedDataV1:
      type: object
      additionalProperties: false
      required:
        - call_id
        - state
        - updated_at
        - call_seq
      properties:
        call_id:
          type: string
          format: uuid
        state:
          type: string
          enum: [ringing, active, ended, failed]
        updated_at:
          type: string
          format: date-time
        call_seq:
          type: integer
          minimum: 1
        reason:
          type: string
          maxLength: 128
    CallStateChangedEventV1:
      allOf:
        - $ref: '#/components/schemas/EventEnvelopeV1'
        - type: object
          additionalProperties: false
          required: [data]
