                        created_at: '2026-04-06T12:41:00Z'
                      - blocker_identity_id: usr-nora-k
                        blocked_identity_id: usr-jules-p
                        created_at: '2026-04-06T12:40:00Z'
                noBlockedUsers:
                  summary: Empty list is a successful response when no blocks exist
                  value:
                    items: []
        '401':
          $ref: '#/components/responses/Unauthorized'
        '500':
          $ref: '#/components/responses/InternalServerError'
  /v1/users/mute:
