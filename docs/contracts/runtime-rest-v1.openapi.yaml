                    message: friend request transition is not allowed from current state
        '500':
          $ref: '#/components/responses/InternalServerError'
  /v1/friends/requests/{request_id}/bootstrap:
    get:
      summary: Fetch peer identity bootstrap material after friend request acceptance
      description: >-
        Returns the other party's identity bundle (public key, endpoint cards,
        profile devices). Only accessible to the requester or target of an
        accepted friend request, and blocked pairs cannot retrieve bootstrap
        material.
      security:
        - CookieAuth: []
        - BearerAuth: []
      parameters:
        - in: path
          name: request_id
          required: true
          schema:
            type: string
      responses:
        '200':
          description: >-
            Peer identity bootstrap bundle for the other party in an accepted
            relationship. Returns the peer's current identity key, endpoint-card
            set, and profile-device snapshot rather than the caller's material.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/IdentityBootstrapBundle'
              examples:
                acceptedPeerBootstrap:
                  summary: Accepted relationship exposes the peer bootstrap snapshot
                  value:
                    identity_id: usr-jules-p
                    public_key: 1111111111111111111111111111111111111111111111111111111111111111
                    algorithm: ed25519
                    endpoint_cards:
                      - endpoint_id: ep-1
                        endpoint_hint: 192.168.1.10:4040
                        estimated_rtt_ms: 28
                        priority: 10
                        expires_at: '2026-04-06T13:00:00Z'
                        revoked: false
                    devices:
                      - device_id: desktop-main
                        active: true
                        last_seen_at: '2026-04-06T12:14:00Z'
        '400':
          description: Friend request is missing
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiError'
              examples:
                identityInvalid:
                  summary: Request is missing or inaccessible
                  value:
                    code: identity_invalid
                    message: friend request not found
        '401':
          description: Requester is not allowed to view this friend request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiError'
              examples:
                identityInvalid:
                  summary: Session identity is not one of the friend request participants
                  value:
                    code: identity_invalid
                    message: friend request cannot be accessed by this session
        '403':
          description: Bootstrap is unavailable for the current relationship state
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiError'
              examples:
                bootstrapNotAvailable:
                  summary: Request has not been accepted yet
                  value:
                    code: bootstrap_not_available
                    message: identity bootstrap material is only available after friend request acceptance
                blockedUser:
                  summary: A block relationship prevents bootstrap access
                  value:
                    code: blocked_user
                    message: identity bootstrap material is unavailable while a block relationship exists between these users
        '500':
          $ref: '#/components/responses/InternalServerError'
  /v1/users/block:
    post:
      summary: Block a user
      security:
        - CookieAuth: []
        - BearerAuth: []
      parameters:
        - $ref: '#/components/parameters/CsrfTokenHeader'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/BlockUserRequest'
      responses:
        '201':
          description: >-
            User blocked. Returns the canonical persisted block record with the
            caller as `blocker_identity_id`, the trimmed target identity, and the
            block creation timestamp.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BlockRecord'
              examples:
                blockRecord:
                  summary: Canonical block record returned after a new block
                  value:
                    blocker_identity_id: usr-nora-k
                    blocked_identity_id: usr-jules-p
                    created_at: '2026-04-06T12:40:00Z'
        '400':
          description: Invalid block request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiError'
              examples:
                identityInvalid:
                  summary: Target identity is invalid or matches the caller
                  value:
                    code: identity_invalid
                    message: target_identity_id must be 3-64 chars using letters, numbers, _ or -
        '401':
          $ref: '#/components/responses/Unauthorized'
        '409':
          description: User is already blocked
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiError'
              examples:
                alreadyBlocked:
                  summary: Duplicate block requests do not create a second record
                  value:
                    code: already_blocked
                    message: user is already blocked
        '500':
          $ref: '#/components/responses/InternalServerError'
  /v1/users/unblock:
    post:
      summary: Unblock a user
      security:
        - CookieAuth: []
        - BearerAuth: []
      parameters:
        - $ref: '#/components/parameters/CsrfTokenHeader'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/BlockUserRequest'
      responses:
        '204':
          description: User unblocked with no response body; removing an already-absent block is still a successful no-op.
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '500':
          $ref: '#/components/responses/InternalServerError'
  /v1/users/blocked:
    get:
      summary: List blocked users
      security:
        - CookieAuth: []
        - BearerAuth: []
      responses:
        '200':
          description: >-
            Caller-owned outbound block list, sorted by `blocked_identity_id`.
