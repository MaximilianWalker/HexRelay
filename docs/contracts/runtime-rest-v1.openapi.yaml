  /v1/friends/requests/{request_id}/decline:
    post:
      summary: Decline pending friend request
      security:
        - CookieAuth: []
        - BearerAuth: []
      parameters:
        - $ref: '#/components/parameters/CsrfTokenHeader'
        - in: path
          name: request_id
          required: true
          schema:
            type: string
      responses:
        '204':
          description: Friend request updated
        '400':
          description: Friend request is missing or not actionable by the current session
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiError'
              examples:
                identityInvalid:
                  summary: Request is missing or belongs to another actor
                  value:
                    code: identity_invalid
                    message: friend request not found or not actionable by current session
        '401':
          $ref: '#/components/responses/Unauthorized'
        '409':
          description: Friend request transition is no longer allowed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiError'
              examples:
                transitionInvalid:
                  summary: Request is no longer pending
                  value:
                    code: transition_invalid
                    message: friend request transition is not allowed from current state
        '500':
          $ref: '#/components/responses/InternalServerError'
  /v1/friends/requests/{request_id}/cancel:
    post:
      summary: Cancel pending friend request
      security:
        - CookieAuth: []
        - BearerAuth: []
      parameters:
        - $ref: '#/components/parameters/CsrfTokenHeader'
        - in: path
          name: request_id
          required: true
          schema:
            type: string
      responses:
        '204':
          description: Friend request updated
        '400':
          description: Friend request is missing or not actionable by the current session
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiError'
              examples:
                identityInvalid:
                  summary: Request is missing or belongs to another actor
                  value:
                    code: identity_invalid
                    message: friend request not found or not actionable by current session
        '401':
          $ref: '#/components/responses/Unauthorized'
        '409':
          description: Friend request transition is no longer allowed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiError'
              examples:
                transitionInvalid:
