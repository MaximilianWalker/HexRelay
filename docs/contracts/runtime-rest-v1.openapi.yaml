  /v1/dm/fanout/dispatch:
    post:
      summary: Fanout incoming DM payload to active devices of recipient profile
      description: Profile-device convergence primitive under direct-only DM policy; does not authorize relay fallback or persistent server-side DM payload storage.
      security:
        - CookieAuth: []
        - BearerAuth: []
      parameters:
        - $ref: '#/components/parameters/CsrfTokenHeader'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/DmFanoutDispatchRequest'
      responses:
        '200':
          description: >-
            DM active-device fanout result. Success means the message has already
            been durably accepted into canonical DM history and durable delivery
            metadata before active-device delivery is evaluated.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DmFanoutDispatchResponse'
              examples:
                readyFanout:
                  summary: Message is durably accepted and delivered immediately to currently reachable devices
                  value:
                    status: accepted
                    reason_code: fanout_ok
                    transport_profile: direct_only
                    delivery_state: delivered_to_active_devices
                    reachability_state: reachable
                    fanout_count: 2
                    delivered_device_ids: [desktop-main, phone-main]
                    skipped_device_ids: [tablet-idle]
                acceptedPendingDelivery:
                  summary: Message is durably accepted even when no devices are currently reachable
                  value:
                    status: accepted
                    reason_code: fanout_pending_delivery
                    transport_profile: direct_only
                    delivery_state: pending_delivery
                    reachability_state: unreachable
                    fanout_count: 0
                    delivered_device_ids: []
                    skipped_device_ids: []
                blockedBacklogFull:
                  summary: In-memory-only runtime rejects delivery when bounded replay storage is already full
                  value:
                    status: blocked
                    reason_code: fanout_backlog_full
                    transport_profile: direct_only
                    delivery_state: rejected
                    reachability_state: unknown
                    fanout_count: 0
                    delivered_device_ids: []
                    skipped_device_ids: [phone-main]
        '400':
          description: Invalid fanout dispatch request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiError'
              examples:
                fanoutInvalid:
                  summary: Fanout dispatch payload is invalid
                  value:
                    code: fanout_invalid
                    message: recipient_identity_id must be 3-64 chars using letters, numbers, _ or -
        '401':
          $ref: '#/components/responses/Unauthorized'
        '500':
          $ref: '#/components/responses/InternalServerError'
  /v1/dm/fanout/catch-up:
    post:
      summary: Replay missed DM payloads for a late-activated profile device
      description: >-
        Profile-device convergence replay under direct-only DM policy;
        canonical accepted DM history and delivery metadata persist when
        configured storage is available, while relay fallback stays disallowed.
      security:
        - CookieAuth: []
        - BearerAuth: []
      parameters:
        - $ref: '#/components/parameters/CsrfTokenHeader'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/DmFanoutCatchUpRequest'
      responses:
        '200':
          description: DM late-device catch-up replay result
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DmFanoutCatchUpResponse'
              examples:
                readyReplay:
                  summary: Late-activated device replays missed messages and advances cursor
                  value:
                    status: ready
                    reason_code: fanout_catch_up_ok
                    transport_profile: direct_only
                    device_id: phone-main
                    replay_count: 1
                    next_cursor: '1'
                    deduped_message_ids: []
                    items:
                      - cursor: '1'
                        message_id: msg-2001
                        ciphertext: enc:late-2001
                        source_device_id: null
                readyNoMissed:
                  summary: Device is current so replay remains a 200 response with no items and unchanged cursor
                  value:
                    status: ready
                    reason_code: fanout_catch_up_no_missed
                    transport_profile: direct_only
                    device_id: phone-main
                    replay_count: 0
                    next_cursor: '2'
                    deduped_message_ids: []
                    items: []
                blockedDeviceInactive:
                  summary: Inactive or unknown devices return a blocked branch with zero replay state
                  value:
                    status: blocked
                    reason_code: fanout_device_inactive
                    transport_profile: direct_only
                    device_id: desktop-main
                    replay_count: 0
                    next_cursor: '0'
                    deduped_message_ids: []
                    items: []
        '400':
          description: Invalid fanout catch-up request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiError'
              examples:
                fanoutInvalid:
                  summary: Fanout catch-up payload is invalid
                  value:
                    code: fanout_invalid
                    message: device_id must be non-empty and <= 64 chars
                cursorOutOfRange:
                  summary: Cursor is beyond the stored delivery tail
                  value:
                    code: cursor_out_of_range
                    message: cursor is beyond the current delivery tail
        '401':
          $ref: '#/components/responses/Unauthorized'
        '500':
          $ref: '#/components/responses/InternalServerError'
  /v1/dm/threads:
    get:
      summary: List DM and group DM threads for authenticated identity
      description: Returns only threads where the authenticated identity is a participant. Filtering (unread_only), cursor positioning, and limit are evaluated in SQL; cursor pagination uses the last returned `thread_id`.
      security:
        - CookieAuth: []
        - BearerAuth: []
      parameters:
        - in: query
          name: cursor
          description: Current runtime uses the last returned `thread_id` as the page cursor.
          schema:
            type: string
        - in: query
          name: limit
          schema:
            type: integer
            minimum: 1
            maximum: 100
        - in: query
          name: unread_only
          schema:
            type: boolean
      responses:
        '200':
          description: DM thread page response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DmThreadPage'
        '400':
          description: Invalid DM thread list cursor
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiError'
              examples:
                cursorInvalid:
                  summary: Cursor does not resolve to a known DM thread
                  value:
                    code: cursor_invalid
                    message: unknown dm thread cursor
        '401':
          $ref: '#/components/responses/Unauthorized'
        '500':
          $ref: '#/components/responses/InternalServerError'
  /v1/dm/threads/{thread_id}/messages:
    get:
      summary: List encrypted message history for a DM thread
      description: Returns message history only when the authenticated identity is a participant in the requested thread. Current runtime behavior is persistence-backed in the local runtime store, participant-scoped, ordered by descending `seq`, and paginated directly from SQL storage.
      security:
        - CookieAuth: []
        - BearerAuth: []
      parameters:
        - in: path
          name: thread_id
          required: true
          schema:
            type: string
        - in: query
          name: cursor
          description: Current runtime uses the last returned message `seq` encoded as a string cursor and returns only messages with `seq` strictly less than that value.
          schema:
            type: string
        - in: query
          name: limit
          schema:
            type: integer
            minimum: 1
            maximum: 100
      responses:
        '200':
          description: DM message history page
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DmMessagePage'
        '400':
          description: Invalid DM message history cursor
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiError'
              examples:
                cursorInvalid:
                  summary: Cursor is not a valid DM message sequence number
                  value:
                    code: cursor_invalid
                    message: message cursor must be numeric
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          description: Thread not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiError'
              examples:
                threadNotFound:
                  summary: Thread does not exist for this participant
                  value:
                    code: thread_not_found
                    message: dm thread was not found
        '500':
          $ref: '#/components/responses/InternalServerError'
  /v1/dm/threads/{thread_id}/read:
    post:
      summary: Mark a DM thread as read up to a given sequence number
      description: Monotonically advances the authenticated identity's `last_read_seq` for the specified thread. The server uses `GREATEST(current, requested)` so stale or duplicate requests are safe no-ops. Returns the effective `last_read_seq` and remaining `unread` count.
      security:
        - CookieAuth: []
        - BearerAuth: []
      parameters:
        - $ref: '#/components/parameters/CsrfTokenHeader'
        - in: path
          name: thread_id
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/DmThreadMarkReadRequest'
      responses:
        '200':
          description: Mark-read acknowledgement with updated read position and unread count
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DmThreadMarkReadResponse'
        '400':
          description: Invalid mark-read payload
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiError'
              examples:
                lastReadSeqInvalid:
                  summary: last_read_seq is outside the supported range
                  value:
                    code: last_read_seq_invalid
                    message: last_read_seq is out of range
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          description: Thread not found or identity is not a participant
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiError'
              examples:
                threadNotFound:
                  summary: Thread does not exist or caller is not a participant
                  value:
                    code: thread_not_found
                    message: dm thread was not found or identity is not a participant
        '500':
          $ref: '#/components/responses/InternalServerError'
