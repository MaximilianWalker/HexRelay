  /v1/servers/{server_id}/channels/{channel_id}/messages/{message_id}:
    patch:
      summary: Edit a server-channel message for an authorized author
      description: >-
        Updates the message content and replacement mention set for an existing
        server-channel message when the authenticated identity is both a member
        of the server, the requested `channel_id` belongs to that same server,
        and the caller is the original message author. Cross-server path
        mismatches fail with deterministic `403 server_access_denied`.
        Successful non-noop edits best-effort fan out `channel.message.updated`
        over realtime delivery to current server members, routed through the
        shared `NodeClientTransport` adapter path. REST success is not
        transactional with downstream realtime delivery: dispatch happens after
        persistence, downstream failures are logged, and no durable retry is
        guaranteed by this endpoint. Deleted messages cannot be edited.
        Cookie-authenticated requests require a matching CSRF header.
      security:
        - CookieAuth: []
        - BearerAuth: []
      parameters:
        - $ref: '#/components/parameters/CsrfTokenHeader'
        - in: path
          name: server_id
          required: true
          schema:
            type: string
        - in: path
          name: channel_id
          required: true
          schema:
            type: string
        - in: path
          name: message_id
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ServerChannelMessageEditRequest'
      responses:
        '200':
          description: >-
            Message updated. Returns the stored canonical message record for both
            changed edits and no-op edits; changed edits set `edited_at`, while
            no-op edits preserve the existing record and leave `edited_at` unset.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ServerChannelMessage'
              examples:
                editedMessage:
                  summary: Changed edit updates content, mentions, and edited timestamp
                  value:
                    message_id: scm-1
                    channel_id: chn-general
                    author_id: usr-nora-k
                    channel_seq: 1
                    content: edited content
                    reply_to_message_id: null
                    mentions: [usr-jules-p]
                    created_at: '2026-04-06T12:00:00Z'
                    edited_at: '2026-04-06T12:06:00Z'
                    deleted_at: null
                noOpEdit:
                  summary: No-op edit still returns success with unchanged stored record
                  value:
                    message_id: scm-2
                    channel_id: chn-general
                    author_id: usr-jules-p
                    channel_seq: 2
                    content: welcome aboard
                    reply_to_message_id: null
                    mentions: [usr-nora-k]
                    created_at: '2026-04-06T12:01:00Z'
                    edited_at: null
                    deleted_at: null
        '400':
          description: Invalid message payload
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiError'
              examples:
                replyTargetInvalid:
                  summary: Reply target is outside the channel
                  value:
                    code: reply_target_invalid
                    message: reply target must exist in the same server channel
                mentionInvalid:
                  summary: Mention target is invalid
                  value:
                    code: mention_invalid
                    message: mentioned identities must be members of the same server
                messageContentInvalid:
                  summary: Message content exceeds runtime limits
                  value:
                    code: message_content_invalid
                    message: message content must be between 1 and 4000 characters
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          description: Server membership and original authorship required
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiError'
              examples:
                serverAccessDenied:
                  summary: Caller is not a server member
                  value:
                    code: server_access_denied
                    message: server membership required
                messageEditForbidden:
                  summary: Caller is not the message author for edits
                  value:
                    code: message_edit_forbidden
                    message: only the author may edit this server channel message
        '404':
          description: Channel or message not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiError'
              examples:
                channelNotFound:
                  summary: Channel does not exist
                  value:
                    code: channel_not_found
                    message: server channel was not found
                messageNotFound:
                  summary: Message does not exist
                  value:
                    code: message_not_found
                    message: server channel message was not found
        '409':
          description: Message is already deleted
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiError'
              examples:
                messageDeleted:
                  summary: Message already deleted
                  value:
                    code: message_deleted
                    message: deleted server channel messages cannot be edited
        '500':
          $ref: '#/components/responses/InternalServerError'
    delete:
      summary: Soft-delete a server-channel message for an authorized author
      description: >-
        Soft-deletes a server-channel message when the authenticated identity is
        both a member of the server, the requested `channel_id` belongs to that
        same server, and the caller is the original author. Cross-server path
        mismatches fail with deterministic `403 server_access_denied`.
        First-time deletes best-effort fan out `channel.message.deleted` over
        realtime delivery to current server members, routed through the shared
        `NodeClientTransport` adapter path, while repeated deletes remain
        idempotent without duplicate fanout. REST success is not transactional
        with downstream realtime delivery: dispatch happens after persistence,
        downstream failures are logged, and no durable retry is guaranteed by
        this endpoint. Deleted messages remain visible in history as tombstones
        with scrubbed content and empty mentions. Cookie-authenticated requests
        require a matching CSRF header.
      security:
        - CookieAuth: []
        - BearerAuth: []
      parameters:
        - $ref: '#/components/parameters/CsrfTokenHeader'
        - in: path
          name: server_id
          required: true
          schema:
            type: string
        - in: path
          name: channel_id
          required: true
          schema:
            type: string
        - in: path
          name: message_id
          required: true
          schema:
            type: string
      responses:
        '200':
          description: >-
            Message tombstoned. Returns the canonical tombstone record rather than
            an ack: `content` is scrubbed to an empty string, `mentions` becomes
            empty, `deleted_at` is populated, and repeated deletes remain
            idempotent while returning the same tombstone-shaped success body.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ServerChannelMessage'
              examples:
                tombstoneRecord:
                  summary: First delete returns the scrubbed tombstone state kept in history
                  value:
                    message_id: scm-1
                    channel_id: chn-general
                    author_id: usr-nora-k
                    channel_seq: 1
                    content: ''
                    reply_to_message_id: null
                    mentions: []
                    created_at: '2026-04-06T12:00:00Z'
                    edited_at: null
                    deleted_at: '2026-04-06T12:07:00Z'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          description: Delete requires server membership and original authorship
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiError'
              examples:
                serverAccessDenied:
                  summary: Caller is not a server member
                  value:
                    code: server_access_denied
                    message: server membership required
                messageDeleteForbidden:
                  summary: Caller is not the message author
                  value:
                    code: message_delete_forbidden
                    message: only the author may delete this server channel message
        '404':
          description: Channel or message not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiError'
              examples:
                channelNotFound:
                  summary: Channel does not exist
                  value:
                    code: channel_not_found
                    message: server channel was not found
                messageNotFound:
                  summary: Message does not exist
                  value:
                    code: message_not_found
                    message: server channel message was not found
        '500':
          $ref: '#/components/responses/InternalServerError'
  /v1/contacts:
    get:
      summary: List contacts for authenticated identity
      description: Returns accepted and pending contact relationships for the authenticated identity. When Redis-backed presence snapshots are configured, accepted contacts surface the current `online` or `offline` presence snapshot from the realtime presence service.
      security:
        - CookieAuth: []
        - BearerAuth: []
      parameters:
        - in: query
          name: search
          schema:
            type: string
          x-hexrelay-query-semantics:
            - blank-means-omitted
            - case-insensitive
        - in: query
          name: online_only
          schema:
            type: boolean
        - in: query
          name: unread_only
          schema:
            type: boolean
        - in: query
          name: favorites_only
          schema:
            type: boolean
      responses:
        '200':
          description: >-
            Contact list response for the authenticated identity. Accepted and
            pending relationships share the same list surface; pending contacts
            remain `offline`, while accepted contacts may surface presence-backed
            status when available.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ContactListResponse'
              examples:
                mixedContacts:
                  summary: Accepted and pending relationships share one contact surface
                  value:
                    items:
                      - id: usr-nora-k
                        name: Nora K
                        status: online
                        unread: 1
                        favorite: true
                        inbound_request: false
                        pending_request: false
                      - id: usr-alex-r
                        name: Alex R
                        status: offline
                        unread: 0
                        favorite: false
                        inbound_request: false
                        pending_request: true
        '401':
          $ref: '#/components/responses/Unauthorized'
        '500':
          $ref: '#/components/responses/InternalServerError'
  /v1/internal/presence/watchers/{identity_id}:
