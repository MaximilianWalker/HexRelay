openapi: 3.1.0
info:
  title: HexRelay Runtime REST API
  version: 0.1.0
  description: |
    Current runtime REST contract authority.
    This artifact defines currently implemented REST behavior and must be
    updated when runtime endpoint payloads, auth semantics, or error codes change.
    Auth challenge/verify distributed rate-limit key derivation uses deterministic
    source fingerprint hashing so enforcement remains consistent across instances.
    Distributed counter cleanup runs at most once per process/window epoch to avoid
    per-request cleanup amplification while preserving stale-window pruning.
servers:
  - url: https://api.hexrelay.local
paths:
  /health:
    get:
      summary: Service health probe
      responses:
        '200':
          description: Service is healthy
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HealthResponse'
  /v1/identity/keys/register:
    post:
      summary: Register a public identity key
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/IdentityKeyRegistrationRequest'
      responses:
        '201':
          description: Identity key registered
        '400':
          $ref: '#/components/responses/BadRequest'
        '409':
          $ref: '#/components/responses/Conflict'
        '500':
          $ref: '#/components/responses/InternalServerError'
  /v1/auth/challenge:
    post:
      summary: Issue a nonce challenge
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AuthChallengeRequest'
      responses:
        '200':
          description: Challenge issued
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthChallengeResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '429':
          $ref: '#/components/responses/TooManyRequests'
        '500':
          $ref: '#/components/responses/InternalServerError'
  /v1/auth/verify:
    post:
      summary: Verify challenge signature and issue session cookies
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AuthVerifyRequest'
      responses:
        '200':
          description: Session issued via HttpOnly cookie
          headers:
            Set-Cookie:
              description: |
                Returns `hexrelay_session` (HttpOnly auth cookie) and
                `hexrelay_csrf` (double-submit CSRF cookie).
              schema:
                type: string
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthVerifyResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '429':
          $ref: '#/components/responses/TooManyRequests'
        '500':
          $ref: '#/components/responses/InternalServerError'
  /v1/auth/sessions/revoke:
    post:
      summary: Revoke an active session
      security:
        - CookieAuth: []
        - BearerAuth: []
      parameters:
        - $ref: '#/components/parameters/CsrfTokenHeader'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SessionRevokeRequest'
      responses:
        '204':
          description: Session revoked
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '500':
          $ref: '#/components/responses/InternalServerError'
  /v1/auth/sessions/validate:
    get:
      summary: Validate active session
      security:
        - CookieAuth: []
        - BearerAuth: []
      responses:
        '200':
          description: Session is active and valid
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SessionValidateResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
  /v1/invites:
    post:
      summary: Create an invite token
      security:
        - CookieAuth: []
        - BearerAuth: []
      parameters:
        - $ref: '#/components/parameters/CsrfTokenHeader'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/InviteCreateRequest'
      responses:
        '201':
          description: Invite created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/InviteCreateResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '429':
          $ref: '#/components/responses/TooManyRequests'
        '500':
          $ref: '#/components/responses/InternalServerError'
  /v1/invites/redeem:
    post:
      summary: Redeem an invite token
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/InviteRedeemRequest'
      responses:
        '200':
          description: Invite redeemed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/InviteRedeemResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '429':
          $ref: '#/components/responses/TooManyRequests'
        '500':
          $ref: '#/components/responses/InternalServerError'
  /v1/contact-invites:
    post:
      summary: Create a contact invite token
      security:
        - CookieAuth: []
        - BearerAuth: []
      parameters:
        - $ref: '#/components/parameters/CsrfTokenHeader'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/InviteCreateRequest'
      responses:
        '201':
          description: Contact invite created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/InviteCreateResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '429':
          $ref: '#/components/responses/TooManyRequests'
        '500':
          $ref: '#/components/responses/InternalServerError'
  /v1/contact-invites/redeem:
    post:
      summary: Redeem a contact invite token and create friend request
      security:
        - CookieAuth: []
        - BearerAuth: []
      parameters:
        - $ref: '#/components/parameters/CsrfTokenHeader'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ContactInviteRedeemRequest'
      responses:
        '200':
          description: Pending friend request created or returned
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/FriendRequestRecord'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '409':
          $ref: '#/components/responses/Conflict'
        '429':
          $ref: '#/components/responses/TooManyRequests'
        '500':
          $ref: '#/components/responses/InternalServerError'
  /v1/servers:
    get:
      summary: List servers for authenticated identity
      security:
        - CookieAuth: []
        - BearerAuth: []
      parameters:
        - in: query
          name: search
          schema:
            type: string
        - in: query
          name: favorites_only
          schema:
            type: boolean
        - in: query
          name: unread_only
          schema:
            type: boolean
        - in: query
          name: muted_only
          schema:
            type: boolean
      responses:
        '200':
          description: Server list response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ServerListResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
  /v1/contacts:
    get:
      summary: List contacts for authenticated identity
      security:
        - CookieAuth: []
        - BearerAuth: []
      parameters:
        - in: query
          name: search
          schema:
            type: string
        - in: query
          name: online_only
          schema:
            type: boolean
        - in: query
          name: unread_only
          schema:
            type: boolean
        - in: query
          name: favorites_only
          schema:
            type: boolean
      responses:
        '200':
          description: Contact list response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ContactListResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
  /v1/dm/privacy-policy:
    get:
      summary: Get DM inbound policy for authenticated identity
      security:
        - CookieAuth: []
        - BearerAuth: []
      responses:
        '200':
          description: DM policy response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DmPolicy'
        '401':
          $ref: '#/components/responses/Unauthorized'
    post:
      summary: Update DM inbound policy for authenticated identity
      security:
        - CookieAuth: []
        - BearerAuth: []
      parameters:
        - $ref: '#/components/parameters/CsrfTokenHeader'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/DmPolicyUpdate'
      responses:
        '200':
          description: DM policy updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DmPolicy'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
  /v1/dm/pairing-envelope:
    post:
      summary: Create signed out-of-band DM pairing envelope
      security:
        - CookieAuth: []
        - BearerAuth: []
      parameters:
        - $ref: '#/components/parameters/CsrfTokenHeader'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/DmPairingEnvelopeCreateRequest'
      responses:
        '201':
          description: DM pairing envelope created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DmPairingEnvelopeResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
  /v1/dm/pairing-envelope/import:
    post:
      summary: Import and verify signed out-of-band DM pairing envelope
      security:
        - CookieAuth: []
        - BearerAuth: []
      parameters:
        - $ref: '#/components/parameters/CsrfTokenHeader'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/DmPairingEnvelopeImportRequest'
      responses:
        '200':
          description: DM pairing envelope imported
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DmPairingImportResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
  /v1/dm/connectivity/preflight:
    post:
      summary: Run DM direct-connect preflight diagnostics and troubleshooting mapping
      security:
        - CookieAuth: []
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/DmConnectivityPreflightRequest'
      responses:
        '200':
          description: DM preflight diagnostics result
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DmConnectivityPreflightResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
  /v1/dm/connectivity/lan-discovery/announce:
    post:
      summary: Announce local-network endpoint hints for DM LAN fast path
      security:
        - CookieAuth: []
        - BearerAuth: []
      parameters:
        - $ref: '#/components/parameters/CsrfTokenHeader'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/DmLanDiscoveryAnnounceRequest'
      responses:
        '200':
          description: LAN discovery presence updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DmLanDiscoveryAnnounceResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
  /v1/dm/connectivity/lan-discovery/peers:
    get:
      summary: List recently discovered LAN peers for direct DM fast path
      security:
        - CookieAuth: []
        - BearerAuth: []
      responses:
        '200':
          description: LAN-discovered peer list
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DmLanPeerListResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
  /v1/dm/connectivity/wan-wizard:
    post:
      summary: Run WAN direct-connect setup wizard diagnostics
      security:
        - CookieAuth: []
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/DmWanWizardRequest'
      responses:
        '200':
          description: WAN direct-connect wizard result
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DmWanWizardResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
  /v1/dm/connectivity/endpoint-cards:
    post:
      summary: Register DM endpoint cards for multi-endpoint direct dialing
      security:
        - CookieAuth: []
        - BearerAuth: []
      parameters:
        - $ref: '#/components/parameters/CsrfTokenHeader'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/DmEndpointCardRegisterRequest'
      responses:
        '200':
          description: Endpoint cards registered
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DmEndpointCardRegisterResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
  /v1/dm/connectivity/endpoint-cards/revoke:
    post:
      summary: Revoke previously published DM endpoint cards
      security:
        - CookieAuth: []
        - BearerAuth: []
      parameters:
        - $ref: '#/components/parameters/CsrfTokenHeader'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/DmEndpointCardRevokeRequest'
      responses:
        '200':
          description: Endpoint cards revoked
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DmEndpointCardRevokeResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
  /v1/dm/connectivity/parallel-dial:
    post:
      summary: Run DM multi-endpoint parallel dial orchestration
      security:
        - CookieAuth: []
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/DmParallelDialRequest'
      responses:
        '200':
          description: Parallel dial orchestration result
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DmParallelDialResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
  /v1/dm/profile-devices/heartbeat:
    post:
      summary: Mark DM profile device activity state for multi-device fanout
      security:
        - CookieAuth: []
        - BearerAuth: []
      parameters:
        - $ref: '#/components/parameters/CsrfTokenHeader'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/DmProfileDeviceHeartbeatRequest'
      responses:
        '200':
          description: Profile device state updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DmProfileDeviceHeartbeatResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
  /v1/dm/fanout/dispatch:
    post:
      summary: Fanout incoming DM payload to active devices of recipient profile
      security:
        - CookieAuth: []
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/DmFanoutDispatchRequest'
      responses:
        '200':
          description: DM active-device fanout result
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DmFanoutDispatchResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
  /v1/dm/fanout/catch-up:
    post:
      summary: Replay missed DM payloads for a late-activated profile device
      security:
        - CookieAuth: []
        - BearerAuth: []
      parameters:
        - $ref: '#/components/parameters/CsrfTokenHeader'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/DmFanoutCatchUpRequest'
      responses:
        '200':
          description: DM late-device catch-up replay result
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DmFanoutCatchUpResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
  /v1/dm/threads:
    get:
      summary: List DM and group DM threads for authenticated identity
      security:
        - CookieAuth: []
        - BearerAuth: []
      parameters:
        - in: query
          name: cursor
          schema:
            type: string
        - in: query
          name: limit
          schema:
            type: integer
            minimum: 1
            maximum: 100
        - in: query
          name: unread_only
          schema:
            type: boolean
      responses:
        '200':
          description: DM thread page response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DmThreadPage'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
  /v1/dm/threads/{thread_id}/messages:
    get:
      summary: List encrypted message history for a DM thread
      security:
        - CookieAuth: []
        - BearerAuth: []
      parameters:
        - in: path
          name: thread_id
          required: true
          schema:
            type: string
        - in: query
          name: cursor
          schema:
            type: string
        - in: query
          name: limit
          schema:
            type: integer
            minimum: 1
            maximum: 100
      responses:
        '200':
          description: DM message history page
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DmMessagePage'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          description: Thread not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiError'
  /v1/friends/requests:
    get:
      summary: List inbound/outbound friend requests
      security:
        - CookieAuth: []
        - BearerAuth: []
      parameters:
        - in: query
          name: identity_id
          required: true
          schema:
            type: string
        - in: query
          name: direction
          schema:
            type: string
            enum: [inbound, outbound]
      responses:
        '200':
          description: Friend request list response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/FriendRequestPage'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
    post:
      summary: Create a friend request
      security:
        - CookieAuth: []
        - BearerAuth: []
      parameters:
        - $ref: '#/components/parameters/CsrfTokenHeader'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/FriendRequestCreateRequest'
      responses:
        '201':
          description: Friend request created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/FriendRequestRecord'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '409':
          $ref: '#/components/responses/Conflict'
        '500':
          $ref: '#/components/responses/InternalServerError'
  /v1/friends/requests/{request_id}/accept:
    post:
      summary: Accept pending friend request
      security:
        - CookieAuth: []
        - BearerAuth: []
      parameters:
        - $ref: '#/components/parameters/CsrfTokenHeader'
        - in: path
          name: request_id
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Friend request updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/FriendRequestRecord'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          description: Authentication or verification failure
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiError'
              examples:
                verifyFailed:
                  summary: Indistinguishable auth verify failure
                  value:
                    code: nonce_invalid
                    message: auth verification failed
        '409':
          $ref: '#/components/responses/Conflict'
        '500':
          $ref: '#/components/responses/InternalServerError'
  /v1/friends/requests/{request_id}/decline:
    post:
      summary: Decline pending friend request
      security:
        - CookieAuth: []
        - BearerAuth: []
      parameters:
        - $ref: '#/components/parameters/CsrfTokenHeader'
        - in: path
          name: request_id
          required: true
          schema:
            type: string
      responses:
        '204':
          description: Friend request updated
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '409':
          $ref: '#/components/responses/Conflict'
        '500':
          $ref: '#/components/responses/InternalServerError'
  /v1/friends/requests/{request_id}/cancel:
    post:
      summary: Cancel pending friend request
      security:
        - CookieAuth: []
        - BearerAuth: []
      parameters:
        - $ref: '#/components/parameters/CsrfTokenHeader'
        - in: path
          name: request_id
          required: true
          schema:
            type: string
      responses:
        '204':
          description: Friend request updated
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '409':
          $ref: '#/components/responses/Conflict'
        '500':
          $ref: '#/components/responses/InternalServerError'
components:
  schemas:
    HealthResponse:
      type: object
      required: [service, status]
      properties:
        service:
          type: string
        status:
          type: string
    ServerSummary:
      type: object
      required: [id, name, unread, favorite, muted]
      properties:
        id:
          type: string
        name:
          type: string
        unread:
          type: integer
          minimum: 0
        favorite:
          type: boolean
        muted:
          type: boolean
    ServerListResponse:
      type: object
      required: [items]
      properties:
        items:
          type: array
          items:
            $ref: '#/components/schemas/ServerSummary'
    ContactSummary:
      type: object
      required: [id, name, status, unread, favorite, inbound_request, pending_request]
      properties:
        id:
          type: string
        name:
          type: string
        status:
          type: string
        unread:
          type: integer
          minimum: 0
        favorite:
          type: boolean
        inbound_request:
          type: boolean
        pending_request:
          type: boolean
    ContactListResponse:
      type: object
      required: [items]
      properties:
        items:
          type: array
          items:
            $ref: '#/components/schemas/ContactSummary'
    DmPolicy:
      type: object
      required: [inbound_policy, offline_delivery_mode]
      properties:
        inbound_policy:
          type: string
          enum: [friends_only, same_server, anyone]
        offline_delivery_mode:
          type: string
          enum: [best_effort_online]
    DmPolicyUpdate:
      type: object
      required: [inbound_policy]
      properties:
        inbound_policy:
          type: string
          enum: [friends_only, same_server, anyone]
    DmPairingEnvelopeCreateRequest:
      type: object
      required: [endpoint_hints]
      properties:
        endpoint_hints:
          type: array
          maxItems: 8
          items:
            type: string
        expires_in_seconds:
          type: integer
          minimum: 1
          maximum: 3600
          nullable: true
    DmPairingEnvelopeResponse:
      type: object
      required: [envelope, short_code, expires_at, pairing_nonce]
      properties:
        envelope:
          type: string
          description: Base64url encoded signed pairing envelope payload
        short_code:
          type: string
        expires_at:
