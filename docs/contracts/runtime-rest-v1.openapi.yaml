openapi: 3.1.0
info:
  title: HexRelay Runtime REST API
  version: 0.1.0
  description: |
    Current runtime REST contract authority.
    This artifact defines currently implemented REST behavior and must be
    updated when runtime endpoint payloads, auth semantics, or error codes change.
    Auth challenge/verify distributed rate-limit key derivation uses deterministic
    source fingerprint hashing so enforcement remains consistent across instances.
    Distributed counter cleanup runs at most once per process/window epoch to avoid
    per-request cleanup amplification while preserving stale-window pruning.
    Server membership and server-channel authorization decisions emit structured
    allow/deny/failure logs for node-owner debugging without changing response
    contracts.
    Server-channel message edit/delete author-authorization decisions also emit
    structured allow/deny/failure logs for node-owner debugging without changing
    response contracts.
servers:
  - url: https://api.hexrelay.local
paths:
  /health:
    get:
      summary: Service health probe
      responses:
        '200':
          description: Service is healthy
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HealthResponse'
  /v1/identity/keys/register:
    post:
      summary: Register a public identity key
      description: |
        Public registration is disabled by default until a trusted identity-claim
        flow is configured. Local development/tests may explicitly enable it.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/IdentityKeyRegistrationRequest'
      responses:
        '201':
          description: Identity key registered
        '400':
          description: Invalid mark-read payload
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiError'
              examples:
                lastReadSeqInvalid:
                  summary: last_read_seq is outside the supported range
                  value:
                    code: last_read_seq_invalid
                    message: last_read_seq is out of range
        '403':
          $ref: '#/components/responses/Forbidden'
        '409':
          $ref: '#/components/responses/Conflict'
        '500':
          $ref: '#/components/responses/InternalServerError'
  /v1/auth/challenge:
    post:
      summary: Issue a nonce challenge
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AuthChallengeRequest'
      responses:
        '200':
          description: Challenge issued
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthChallengeResponse'
        '400':
          description: Invalid mark-read payload
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiError'
              examples:
                lastReadSeqInvalid:
                  summary: last_read_seq is outside the supported range
                  value:
                    code: last_read_seq_invalid
                    message: last_read_seq is out of range
        '429':
          $ref: '#/components/responses/TooManyRequests'
        '500':
          $ref: '#/components/responses/InternalServerError'
  /v1/auth/verify:
    post:
      summary: Verify challenge signature and issue session cookies
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AuthVerifyRequest'
      responses:
        '200':
          description: Session issued via HttpOnly cookie
          headers:
            Set-Cookie:
              description: |
                Returns `hexrelay_session` (HttpOnly auth cookie) and
                `hexrelay_csrf` (double-submit CSRF cookie).
              schema:
                type: string
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthVerifyResponse'
        '400':
          description: Invalid mark-read payload
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiError'
              examples:
                lastReadSeqInvalid:
                  summary: last_read_seq is outside the supported range
                  value:
                    code: last_read_seq_invalid
                    message: last_read_seq is out of range
        '401':
          $ref: '#/components/responses/Unauthorized'
        '429':
          $ref: '#/components/responses/TooManyRequests'
        '500':
          $ref: '#/components/responses/InternalServerError'
  /v1/auth/sessions/revoke:
    post:
      summary: Revoke an active session
      security:
        - CookieAuth: []
        - BearerAuth: []
      parameters:
        - $ref: '#/components/parameters/CsrfTokenHeader'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SessionRevokeRequest'
      responses:
        '204':
          description: Session revoked
          headers:
            Set-Cookie:
              description: |
                Clears both `hexrelay_session` and `hexrelay_csrf` cookies when the
                active session is revoked.
              schema:
                type: string
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '500':
          $ref: '#/components/responses/InternalServerError'
  /v1/auth/sessions/validate:
    get:
      summary: Validate active session
      security:
        - CookieAuth: []
        - BearerAuth: []
      responses:
        '200':
          description: Session is active and valid
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SessionValidateResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '500':
          $ref: '#/components/responses/InternalServerError'
  /v1/invites:
    post:
      summary: Create an invite token
      security:
        - CookieAuth: []
        - BearerAuth: []
      parameters:
        - $ref: '#/components/parameters/CsrfTokenHeader'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/InviteCreateRequest'
      responses:
        '201':
          description: Invite created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/InviteCreateResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '429':
          $ref: '#/components/responses/TooManyRequests'
        '500':
          $ref: '#/components/responses/InternalServerError'
  /v1/invites/redeem:
    post:
      summary: Redeem an invite token
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/InviteRedeemRequest'
      responses:
        '200':
          description: Invite redeemed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/InviteRedeemResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '429':
          $ref: '#/components/responses/TooManyRequests'
        '500':
          $ref: '#/components/responses/InternalServerError'
  /v1/contact-invites:
    post:
      summary: Create a contact invite token
      security:
        - CookieAuth: []
        - BearerAuth: []
      parameters:
        - $ref: '#/components/parameters/CsrfTokenHeader'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/InviteCreateRequest'
      responses:
        '201':
          description: Contact invite created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/InviteCreateResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '429':
          $ref: '#/components/responses/TooManyRequests'
        '500':
          $ref: '#/components/responses/InternalServerError'
  /v1/contact-invites/redeem:
    post:
      summary: Redeem a contact invite token and create friend request
      description: |
        Redemption fails when a block relationship exists between the authenticated
        redeemer and the invite creator.
      security:
        - CookieAuth: []
        - BearerAuth: []
      parameters:
        - $ref: '#/components/parameters/CsrfTokenHeader'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ContactInviteRedeemRequest'
      responses:
        '200':
          description: Pending friend request created or returned
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/FriendRequestRecord'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          description: Delete requires server membership and original authorship
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiError'
              examples:
                serverAccessDenied:
                  summary: Caller is not a server member
                  value:
                    code: server_access_denied
                    message: server membership required
                messageDeleteForbidden:
                  summary: Caller is not the message author
                  value:
                    code: message_delete_forbidden
                    message: only the author may delete this server channel message
        '409':
          $ref: '#/components/responses/Conflict'
        '429':
          $ref: '#/components/responses/TooManyRequests'
        '500':
          $ref: '#/components/responses/InternalServerError'
  /v1/servers:
    get:
      summary: List servers for authenticated identity
      description: Returns identity-scoped server summaries from persisted server membership records with deterministic filter/search behavior. Joined-server membership authority now backs this surface, while richer guild/channel authz semantics remain future work.
      security:
        - CookieAuth: []
        - BearerAuth: []
      parameters:
        - in: query
          name: search
          schema:
            type: string
        - in: query
          name: favorites_only
          schema:
            type: boolean
        - in: query
          name: unread_only
          schema:
            type: boolean
        - in: query
          name: muted_only
          schema:
            type: boolean
      responses:
        '200':
          description: Server list response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ServerListResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '500':
          $ref: '#/components/responses/InternalServerError'
  /v1/servers/{server_id}:
    get:
      summary: Get a single joined server for authenticated identity
      description: Returns the requested server summary only when the authenticated identity has persisted membership for that server. Non-members receive deterministic `403 server_access_denied` without exposing extra membership state.
      security:
        - CookieAuth: []
        - BearerAuth: []
      parameters:
        - in: path
          name: server_id
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Server detail response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ServerDetailResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          description: Delete requires server membership and original authorship
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiError'
              examples:
                serverAccessDenied:
                  summary: Caller is not a server member
                  value:
                    code: server_access_denied
                    message: server membership required
                messageDeleteForbidden:
                  summary: Caller is not the message author
                  value:
                    code: message_delete_forbidden
                    message: only the author may delete this server channel message
        '500':
          $ref: '#/components/responses/InternalServerError'
  /v1/servers/{server_id}/channels:
    get:
      summary: List channels for an authorized server member
      description: Returns persisted channels for the requested server only when the authenticated identity has membership in that server. Results use stable creation order and expose the current `last_message_seq` cursor baseline for each channel.
      security:
        - CookieAuth: []
        - BearerAuth: []
      parameters:
        - in: path
          name: server_id
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Server channel list response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ServerChannelListResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          description: Delete requires server membership and original authorship
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiError'
              examples:
                serverAccessDenied:
                  summary: Caller is not a server member
                  value:
                    code: server_access_denied
                    message: server membership required
                messageDeleteForbidden:
                  summary: Caller is not the message author
                  value:
                    code: message_delete_forbidden
                    message: only the author may delete this server channel message
        '500':
          $ref: '#/components/responses/InternalServerError'
  /v1/servers/{server_id}/channels/{channel_id}/messages:
    get:
      summary: List server-channel messages for an authorized member
      description: Returns persisted server-channel messages only when the authenticated identity has membership in the requested server and the requested `channel_id` belongs to that same server. Requests for unknown channel ids return `404 channel_not_found`, while cross-server path mismatches fail with deterministic `403 server_access_denied`. Results are ordered by descending `channel_seq` and use the last returned `channel_seq` as a strictly exclusive string cursor.
      security:
        - CookieAuth: []
        - BearerAuth: []
      parameters:
        - in: path
          name: server_id
          required: true
          schema:
            type: string
        - in: path
          name: channel_id
          required: true
          schema:
            type: string
        - in: query
          name: cursor
          description: Current runtime uses the last returned message `channel_seq` encoded as a string cursor and returns only messages with `channel_seq` strictly less than that value.
          schema:
            type: string
        - in: query
          name: limit
          schema:
            type: integer
            minimum: 1
            maximum: 100
      responses:
        '200':
          description: Server-channel message history page
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ServerChannelMessagePage'
        '400':
          description: Invalid message payload
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiError'
              examples:
                mentionInvalid:
                  summary: Mention target is invalid
                  value:
                    code: mention_invalid
                    message: mentioned identities must be members of the same server
                messageContentInvalid:
                  summary: Message content exceeds runtime limits
                  value:
                    code: message_content_invalid
                    message: message content must be between 1 and 4000 characters
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          description: Server membership and original authorship required
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiError'
              examples:
                serverAccessDenied:
                  summary: Caller is not a server member
                  value:
                    code: server_access_denied
                    message: server membership required
                messageEditForbidden:
                  summary: Caller is not the message author
                  value:
                    code: message_edit_forbidden
                    message: only the author may edit this server channel message
        '404':
          description: Channel not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiError'
              examples:
                channelNotFound:
                  summary: Channel does not exist
                  value:
                    code: channel_not_found
                    message: server channel was not found
        '500':
          $ref: '#/components/responses/InternalServerError'
    post:
      summary: Create a server-channel message for an authorized member
      description: >-
        Persists a new server-channel message for an authenticated server member
        when the requested `channel_id` belongs to the same server identified by
        the route, optionally linking a same-channel reply target and persisted
        mention identities. Cross-server path mismatches fail with deterministic
        `403 server_access_denied`. Successful writes best-effort fan out
        `channel.message.created` over realtime delivery to current server
        members, routed through the shared `NodeClientTransport` adapter path
        using borrowed request serialization on the API side. REST success is
        not transactional with downstream realtime delivery: dispatch happens
        after persistence, downstream failures are logged, and no durable retry
        is guaranteed by this endpoint. Cookie-authenticated requests require a
        matching CSRF header.
      security:
        - CookieAuth: []
        - BearerAuth: []
      parameters:
        - $ref: '#/components/parameters/CsrfTokenHeader'
        - in: path
          name: server_id
          required: true
          schema:
            type: string
        - in: path
          name: channel_id
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ServerChannelMessageCreateRequest'
      responses:
        '201':
          description: Message created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ServerChannelMessage'
        '400':
          description: Invalid message payload
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiError'
              examples:
                replyTargetInvalid:
                  summary: Reply target is outside the channel
                  value:
                    code: reply_target_invalid
                    message: reply target must exist in the same server channel
                mentionInvalid:
                  summary: Mention target is invalid
                  value:
                    code: mention_invalid
                    message: mentioned identities must be members of the same server
                messageContentInvalid:
                  summary: Message content exceeds runtime limits
                  value:
                    code: message_content_invalid
                    message: message content must be between 1 and 4000 characters
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          description: Server membership required
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiError'
              examples:
                serverAccessDenied:
                  summary: Caller is not a server member
                  value:
                    code: server_access_denied
                    message: server membership required
        '404':
          description: Channel not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiError'
              examples:
                channelNotFound:
                  summary: Channel does not exist
                  value:
                    code: channel_not_found
                    message: server channel was not found
        '500':
          $ref: '#/components/responses/InternalServerError'
  /v1/servers/{server_id}/channels/{channel_id}/messages/{message_id}:
    patch:
      summary: Edit a server-channel message for an authorized author
      description: >-
        Updates the message content and replacement mention set for an existing
        server-channel message when the authenticated identity is both a member
        of the server, the requested `channel_id` belongs to that same server,
        and the caller is the original message author. Cross-server path
        mismatches fail with deterministic `403 server_access_denied`.
        Successful non-noop edits best-effort fan out `channel.message.updated`
        over realtime delivery to current server members, routed through the
        shared `NodeClientTransport` adapter path. REST success is not
        transactional with downstream realtime delivery: dispatch happens after
        persistence, downstream failures are logged, and no durable retry is
        guaranteed by this endpoint. Deleted messages cannot be edited.
        Cookie-authenticated requests require a matching CSRF header.
      security:
        - CookieAuth: []
        - BearerAuth: []
      parameters:
        - $ref: '#/components/parameters/CsrfTokenHeader'
        - in: path
          name: server_id
          required: true
          schema:
            type: string
        - in: path
          name: channel_id
          required: true
          schema:
            type: string
        - in: path
          name: message_id
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ServerChannelMessageEditRequest'
      responses:
        '200':
          description: Message updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ServerChannelMessage'
        '400':
          description: Invalid message payload
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiError'
              examples:
                replyTargetInvalid:
                  summary: Reply target is outside the channel
                  value:
                    code: reply_target_invalid
                    message: reply target must exist in the same server channel
                mentionInvalid:
                  summary: Mention target is invalid
                  value:
                    code: mention_invalid
                    message: mentioned identities must be members of the same server
                messageContentInvalid:
                  summary: Message content exceeds runtime limits
                  value:
                    code: message_content_invalid
                    message: message content must be between 1 and 4000 characters
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          description: Server membership and original authorship required
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiError'
              examples:
                serverAccessDenied:
                  summary: Caller is not a server member
                  value:
                    code: server_access_denied
                    message: server membership required
                messageEditForbidden:
                  summary: Caller is not the message author for edits
                  value:
                    code: message_edit_forbidden
                    message: only the author may edit this server channel message
        '404':
          description: Channel or message not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiError'
              examples:
                channelNotFound:
                  summary: Channel does not exist
                  value:
                    code: channel_not_found
                    message: server channel was not found
                messageNotFound:
                  summary: Message does not exist
                  value:
                    code: message_not_found
                    message: server channel message was not found
        '409':
          description: Message is already deleted
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiError'
              examples:
                messageDeleted:
                  summary: Message already deleted
                  value:
                    code: message_deleted
                    message: deleted server channel messages cannot be edited
        '500':
          $ref: '#/components/responses/InternalServerError'
    delete:
      summary: Soft-delete a server-channel message for an authorized author
      description: >-
        Soft-deletes a server-channel message when the authenticated identity is
        both a member of the server, the requested `channel_id` belongs to that
        same server, and the caller is the original author. Cross-server path
        mismatches fail with deterministic `403 server_access_denied`.
        First-time deletes best-effort fan out `channel.message.deleted` over
        realtime delivery to current server members, routed through the shared
        `NodeClientTransport` adapter path, while repeated deletes remain
        idempotent without duplicate fanout. REST success is not transactional
        with downstream realtime delivery: dispatch happens after persistence,
        downstream failures are logged, and no durable retry is guaranteed by
        this endpoint. Deleted messages remain visible in history as tombstones
        with scrubbed content and empty mentions. Cookie-authenticated requests
        require a matching CSRF header.
      security:
        - CookieAuth: []
        - BearerAuth: []
      parameters:
        - $ref: '#/components/parameters/CsrfTokenHeader'
        - in: path
          name: server_id
          required: true
          schema:
            type: string
        - in: path
          name: channel_id
          required: true
          schema:
            type: string
        - in: path
          name: message_id
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Message tombstoned
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ServerChannelMessage'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          description: Delete requires server membership and original authorship
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiError'
              examples:
                serverAccessDenied:
                  summary: Caller is not a server member
                  value:
                    code: server_access_denied
                    message: server membership required
                messageDeleteForbidden:
                  summary: Caller is not the message author
                  value:
                    code: message_delete_forbidden
                    message: only the author may delete this server channel message
        '404':
          description: Channel or message not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiError'
              examples:
                channelNotFound:
                  summary: Channel does not exist
                  value:
                    code: channel_not_found
                    message: server channel was not found
                messageNotFound:
                  summary: Message does not exist
                  value:
                    code: message_not_found
                    message: server channel message was not found
        '500':
          $ref: '#/components/responses/InternalServerError'
  /v1/contacts:
    get:
      summary: List contacts for authenticated identity
      description: Returns accepted and pending contact relationships for the authenticated identity. When Redis-backed presence snapshots are configured, accepted contacts surface the current `online` or `offline` presence snapshot from the realtime presence service.
      security:
        - CookieAuth: []
        - BearerAuth: []
      parameters:
        - in: query
          name: search
          schema:
            type: string
        - in: query
          name: online_only
          schema:
            type: boolean
        - in: query
          name: unread_only
          schema:
            type: boolean
        - in: query
          name: favorites_only
          schema:
            type: boolean
      responses:
        '200':
          description: Contact list response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ContactListResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '500':
          $ref: '#/components/responses/InternalServerError'
  /v1/internal/presence/watchers/{identity_id}:
    get:
      summary: Resolve authorized presence watchers for an identity
      description: Internal service-to-service endpoint used by `services/realtime-rs` to resolve which identities may receive presence updates for the subject identity.
      parameters:
        - in: header
          name: x-hexrelay-internal-token
          required: true
          schema:
            type: string
          description: Presence-watcher scoped internal token configured separately from channel dispatch credentials.
        - in: path
          name: identity_id
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Authorized presence watchers
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PresenceWatcherListResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '500':
          $ref: '#/components/responses/InternalServerError'
  /v1/discovery/users:
    get:
      summary: List discoverable users for authenticated identity
      description: Returns privacy-safe discovery cards for users known in the current HexRelay environment. Supports `global` scope (all known discoverable users) and `shared_server` scope (only trusted shared-membership peers), excludes blocked and denylisted users, and enforces authenticated query rate limiting.
      security:
        - CookieAuth: []
        - BearerAuth: []
      parameters:
        - in: query
          name: scope
          schema:
            type: string
            enum: [global, shared_server]
        - in: query
          name: query
          schema:
            type: string
        - in: query
          name: limit
          schema:
            type: integer
            minimum: 1
            maximum: 50
      responses:
        '200':
          description: Discovery list response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DiscoveryUserListResponse'
        '400':
          description: Invalid mark-read payload
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiError'
              examples:
                lastReadSeqInvalid:
                  summary: last_read_seq is outside the supported range
                  value:
                    code: last_read_seq_invalid
                    message: last_read_seq is out of range
        '401':
          $ref: '#/components/responses/Unauthorized'
        '429':
          $ref: '#/components/responses/TooManyRequests'
        '500':
          $ref: '#/components/responses/InternalServerError'
