  /v1/users/muted:
    get:
      summary: List muted users
      security:
        - CookieAuth: []
        - BearerAuth: []
      responses:
        '200':
          description: List of muted users
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MuteListResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '500':
          $ref: '#/components/responses/InternalServerError'
components:
  schemas:
    HealthResponse:
      type: object
      required: [service, status]
      properties:
        service:
          type: string
        status:
          type: string
    ServerSummary:
      type: object
      required: [id, name, unread, favorite, muted]
      properties:
        id:
          type: string
        name:
          type: string
        unread:
          type: integer
          minimum: 0
        favorite:
          type: boolean
        muted:
          type: boolean
    ServerListResponse:
      type: object
      required: [items]
      properties:
        items:
          type: array
          items:
            $ref: '#/components/schemas/ServerSummary'
    ServerDetailResponse:
      type: object
      required: [item]
      properties:
        item:
          $ref: '#/components/schemas/ServerSummary'
    ServerChannelSummary:
      type: object
      required: [id, name, kind, last_message_seq]
      properties:
        id:
          type: string
        name:
          type: string
        kind:
          type: string
          enum: [text]
        last_message_seq:
          type: integer
          minimum: 0
    ServerChannelListResponse:
      type: object
      required: [items]
      properties:
        items:
          type: array
          items:
            $ref: '#/components/schemas/ServerChannelSummary'
    ServerChannelMessageCreateRequest:
      type: object
      required: [content]
      properties:
        content:
          type: string
          minLength: 1
          maxLength: 4000
        reply_to_message_id:
          type: string
          nullable: true
        mention_identity_ids:
          type: array
          items:
            type: string
          default: []
    ServerChannelMessageEditRequest:
      type: object
      required: [content, mention_identity_ids]
      properties:
        content:
          type: string
          minLength: 1
          maxLength: 4000
        mention_identity_ids:
          type: array
          items:
            type: string
          default: []
    ServerChannelMessage:
      type: object
      required:
        [message_id, channel_id, author_id, channel_seq, content, mentions, created_at]
      properties:
        message_id:
          type: string
        channel_id:
          type: string
        author_id:
          type: string
        channel_seq:
          type: integer
          minimum: 1
        content:
          type: string
        reply_to_message_id:
          type: string
          nullable: true
        mentions:
          type: array
          items:
            type: string
          default: []
        created_at:
          type: string
          format: date-time
        edited_at:
          type: string
          format: date-time
          nullable: true
        deleted_at:
          type: string
          format: date-time
          nullable: true
    ServerChannelMessagePage:
      type: object
      required: [items]
      properties:
        items:
          type: array
          items:
            $ref: '#/components/schemas/ServerChannelMessage'
        next_cursor:
          type: string
          nullable: true
    ContactSummary:
      type: object
      required: [id, name, status, unread, favorite, inbound_request, pending_request]
      properties:
        id:
          type: string
        name:
          type: string
        status:
          type: string
          enum: [online, offline, away]
        unread:
          type: integer
          minimum: 0
        favorite:
          type: boolean
        inbound_request:
          type: boolean
        pending_request:
          type: boolean
    ContactListResponse:
      type: object
      required: [items]
      properties:
        items:
          type: array
          items:
            $ref: '#/components/schemas/ContactSummary'
    PresenceWatcherListResponse:
      type: object
      required: [watchers]
      properties:
        watchers:
          type: array
          items:
            type: string
    DiscoveryUserSummary:
      type: object
      required:
        - identity_id
        - display_name
        - relationship_state
        - shared_server_count
        - can_send_friend_request
        - has_pending_inbound_request
        - has_pending_outbound_request
      properties:
        identity_id:
          type: string
        display_name:
          type: string
        avatar_url:
          type: string
          nullable: true
        relationship_state:
          type: string
          enum: [none, pending, accepted, declined, cancelled]
        shared_server_count:
          type: integer
          minimum: 0
        can_send_friend_request:
          type: boolean
        has_pending_inbound_request:
          type: boolean
        has_pending_outbound_request:
          type: boolean
    DiscoveryUserListResponse:
      type: object
      required: [items]
      properties:
        items:
          type: array
          items:
            $ref: '#/components/schemas/DiscoveryUserSummary'
    DmPolicy:
      type: object
      required: [inbound_policy, offline_delivery_mode]
      properties:
        inbound_policy:
          type: string
          enum: [friends_only, same_server, anyone]
        offline_delivery_mode:
          type: string
          enum: [best_effort_online]
    DmPolicyUpdate:
      type: object
      required: [inbound_policy]
      properties:
        inbound_policy:
          type: string
          enum: [friends_only, same_server, anyone]
    DmDirectEndpointHint:
      type: string
      minLength: 1
      maxLength: 200
      pattern: '^(tcp|udp|quic)://[^\s]+$'
      description: Direct peer endpoint hint only; relay-oriented schemes (stun://, turn://, relay://) are forbidden.
    DmPairingEnvelopeCreateRequest:
      type: object
      required: [endpoint_hints]
      properties:
        endpoint_hints:
          type: array
          maxItems: 8
          items:
            $ref: '#/components/schemas/DmDirectEndpointHint'
        expires_in_seconds:
          type: integer
          minimum: 1
          maximum: 3600
          nullable: true
    DmPairingEnvelopeResponse:
      type: object
      required: [envelope, short_code, expires_at, pairing_nonce]
      properties:
        envelope:
          type: string
          description: Base64url encoded signed pairing envelope payload
        short_code:
          type: string
        expires_at:
          type: string
          format: date-time
        pairing_nonce:
          type: string
    DmPairingEnvelopeImportRequest:
      type: object
      required: [envelope]
      properties:
        envelope:
          type: string
    DmPairingImportResponse:
      type: object
      required: [inviter_identity_id, endpoint_hints, imported_at, expires_at]
      properties:
        inviter_identity_id:
          type: string
        endpoint_hints:
          type: array
          items:
            $ref: '#/components/schemas/DmDirectEndpointHint'
        imported_at:
          type: string
          format: date-time
        expires_at:
          type: string
          format: date-time
    DmConnectivityPreflightRequest:
      type: object
      properties:
        peer_identity_id:
          type: string
          nullable: true
        pairing_envelope_present:
          type: boolean
          nullable: true
        local_bind_allowed:
          type: boolean
          nullable: true
        peer_reachable_hint:
          type: boolean
          nullable: true
    DmConnectivityPreflightResponse:
      type: object
      required: [status, reason_code, transport_profile, remediation]
      properties:
        status:
          type: string
          enum: [ready, blocked]
        reason_code:
          type: string
          description: For `policy_blocked`, friends-only checks use accepted friendship state from configured persistence when available.
          enum:
            - preflight_ok
            - preflight_ok_lan
            - preflight_blocked_user
            - pairing_missing
            - port_unavailable
            - policy_blocked
            - peer_unreachable
        transport_profile:
          type: string
          enum: [direct_only]
        remediation:
          type: array
          items:
            type: string
    DmLanDiscoveryAnnounceRequest:
      type: object
      required: [endpoint_hints]
      properties:
        endpoint_hints:
          type: array
          minItems: 1
          maxItems: 8
          items:
            $ref: '#/components/schemas/DmDirectEndpointHint'
    DmLanDiscoveryAnnounceResponse:
      type: object
      required: [identity_id, endpoint_hints, scope, last_seen_at]
      properties:
        identity_id:
          type: string
        endpoint_hints:
          type: array
          items:
            $ref: '#/components/schemas/DmDirectEndpointHint'
        scope:
          type: string
          enum: [lan_subnet]
        last_seen_at:
          type: string
          format: date-time
    DmLanPeerSummary:
      type: object
      required: [identity_id, endpoint_hints, last_seen_at]
      properties:
        identity_id:
          type: string
        endpoint_hints:
          type: array
          items:
            $ref: '#/components/schemas/DmDirectEndpointHint'
        last_seen_at:
          type: string
          format: date-time
    DmLanPeerListResponse:
      type: object
      required: [items]
      properties:
        items:
          type: array
          items:
            $ref: '#/components/schemas/DmLanPeerSummary'
    DmWanWizardRequest:
      type: object
      properties:
        preferred_port:
          type: integer
          minimum: 1
          maximum: 65535
          nullable: true
        upnp_available:
          type: boolean
          nullable: true
        nat_pmp_available:
          type: boolean
          nullable: true
        auto_mapping_succeeds:
          type: boolean
          nullable: true
        external_port_open:
          type: boolean
          nullable: true
        network_profile:
          type: string
          enum: [home_nat, symmetric_nat, carrier_nat, enterprise_restricted]
          nullable: true
    DmWanWizardResponse:
      type: object
      required: [outcome, method, reason_code, checklist]
      properties:
        outcome:
          type: string
          enum: [success, manual_required, network_incompatible]
        method:
          type: string
          enum: [upnp, nat_pmp, manual, none]
        reason_code:
          type: string
          enum: [wan_path_ready, wan_path_ready_manual, wan_manual_mapping_required, wan_path_unavailable]
        checklist:
          type: array
          items:
            type: string
    DmEndpointCardInput:
      type: object
      required: [endpoint_id, endpoint_hint]
      properties:
        endpoint_id:
          type: string
          minLength: 1
          maxLength: 64
        endpoint_hint:
          $ref: '#/components/schemas/DmDirectEndpointHint'
        estimated_rtt_ms:
          type: integer
          minimum: 1
          maximum: 5000
          nullable: true
        priority:
          type: integer
          minimum: 0
          maximum: 255
          nullable: true
        expires_in_seconds:
          type: integer
          minimum: 1
          maximum: 3600
          nullable: true
    DmEndpointCardRegisterRequest:
      type: object
      required: [cards]
      properties:
        cards:
          type: array
          minItems: 1
          maxItems: 8
          items:
            $ref: '#/components/schemas/DmEndpointCardInput'
    DmEndpointCard:
      type: object
      required: [endpoint_id, endpoint_hint, estimated_rtt_ms, priority, expires_at, revoked]
      properties:
        endpoint_id:
          type: string
        endpoint_hint:
          $ref: '#/components/schemas/DmDirectEndpointHint'
        estimated_rtt_ms:
          type: integer
        priority:
          type: integer
        expires_at:
          type: string
          format: date-time
        revoked:
          type: boolean
    DmEndpointCardRegisterResponse:
      type: object
      required: [identity_id, cards]
      properties:
        identity_id:
          type: string
        cards:
          type: array
          items:
            $ref: '#/components/schemas/DmEndpointCard'
    DmEndpointCardRevokeRequest:
      type: object
      required: [endpoint_ids]
      properties:
        endpoint_ids:
          type: array
          minItems: 1
          maxItems: 8
          items:
            type: string
    DmEndpointCardRevokeResponse:
      type: object
      required: [identity_id, revoked_endpoint_ids, remaining_cards]
      properties:
        identity_id:
          type: string
        revoked_endpoint_ids:
          type: array
          items:
            type: string
        remaining_cards:
          type: array
          items:
            $ref: '#/components/schemas/DmEndpointCard'
    DmParallelDialRequest:
      type: object
      required: [peer_identity_id]
      properties:
        peer_identity_id:
          type: string
        max_parallel_attempts:
          type: integer
          minimum: 1
          maximum: 8
          nullable: true
        unreachable_endpoint_ids:
          type: array
          nullable: true
          items:
            type: string
    DmParallelDialAttempt:
      type: object
      required: [endpoint_id, endpoint_hint, estimated_rtt_ms, status]
      properties:
        endpoint_id:
          type: string
        endpoint_hint:
          $ref: '#/components/schemas/DmDirectEndpointHint'
        estimated_rtt_ms:
          type: integer
        status:
          type: string
          enum: [connected, cancelled, failed]
        cancellation_reason:
          type: string
          nullable: true
    DmParallelDialResponse:
      type: object
      required:
        - status
        - reason_code
        - transport_profile
        - canceled_endpoint_ids
        - attempts
        - remediation
      properties:
        status:
          type: string
          enum: [ready, blocked]
        reason_code:
          type: string
          enum: [parallel_dial_connected, parallel_dial_exhausted, endpoint_cards_missing, parallel_dial_policy_blocked, parallel_dial_same_server_context_required, parallel_dial_blocked_user]
        transport_profile:
          type: string
          enum: [direct_only]
        winner_endpoint_id:
          type: string
          nullable: true
        canceled_endpoint_ids:
          type: array
          items:
            type: string
        attempts:
          type: array
          items:
            $ref: '#/components/schemas/DmParallelDialAttempt'
        remediation:
          type: array
          description: Human-readable guidance strings explaining why the dial was blocked and what actions the user can take. Message content may change across versions; clients should not match on exact text.
          items:
            type: string
    DmProfileDeviceHeartbeatRequest:
      type: object
      required: [device_id, active]
      properties:
        device_id:
          type: string
          minLength: 1
          maxLength: 64
        active:
          type: boolean
    DmProfileDeviceSummary:
      type: object
      required: [device_id, active, last_seen_at]
      properties:
        device_id:
          type: string
        active:
          type: boolean
        last_seen_at:
          type: string
          format: date-time
    DmProfileDeviceHeartbeatResponse:
      type: object
      required: [identity_id, devices]
      properties:
        identity_id:
          type: string
        devices:
          type: array
          items:
            $ref: '#/components/schemas/DmProfileDeviceSummary'
    DmFanoutDispatchRequest:
      type: object
      required: [recipient_identity_id, message_id, ciphertext]
      properties:
        recipient_identity_id:
          type: string
        message_id:
          type: string
          minLength: 1
          maxLength: 128
        ciphertext:
          type: string
          minLength: 1
          maxLength: 8192
        source_device_id:
          type: string
          minLength: 1
          maxLength: 64
          nullable: true
    DmFanoutDispatchResponse:
      type: object
      required:
        - status
        - reason_code
        - transport_profile
        - fanout_count
        - delivered_device_ids
        - skipped_device_ids
      properties:
        status:
          type: string
          enum: [ready, blocked]
        reason_code:
          type: string
          enum: [fanout_ok, fanout_no_active_devices, fanout_backlog_full, fanout_policy_blocked, fanout_same_server_context_required, fanout_blocked_user]
        transport_profile:
          type: string
          enum: [direct_only]
        fanout_count:
          type: integer
          minimum: 0
        delivered_device_ids:
          type: array
          items:
            type: string
        skipped_device_ids:
          type: array
          items:
            type: string
    DmFanoutCatchUpRequest:
      type: object
      required: [device_id]
      properties:
        device_id:
          type: string
          minLength: 1
          maxLength: 64
        cursor:
          type: string
          nullable: true
        limit:
          type: integer
          minimum: 1
          maximum: 100
          nullable: true
    DmFanoutCatchUpItem:
      type: object
      required: [cursor, message_id, ciphertext]
      properties:
        cursor:
          type: string
        message_id:
          type: string
        ciphertext:
          type: string
        source_device_id:
          type: string
          nullable: true
    DmFanoutCatchUpResponse:
      type: object
      required:
        - status
        - reason_code
        - transport_profile
        - device_id
        - replay_count
        - next_cursor
        - deduped_message_ids
        - items
      properties:
        status:
          type: string
          enum: [ready, blocked]
        reason_code:
          type: string
          enum:
            [fanout_catch_up_ok, fanout_catch_up_no_missed, fanout_device_unknown, fanout_device_inactive]
        transport_profile:
          type: string
          enum: [direct_only]
        device_id:
          type: string
        replay_count:
          type: integer
          minimum: 0
        next_cursor:
          type: string
        deduped_message_ids:
          type: array
          description: Message IDs skipped as duplicate replay entries using key `(message_id, sender_identity_id, source_device_id, ciphertext)`.
          items:
            type: string
        items:
          type: array
          items:
            $ref: '#/components/schemas/DmFanoutCatchUpItem'
    DmThreadSummary:
      type: object
      required:
        - thread_id
        - kind
        - title
        - participant_ids
        - unread
        - last_read_seq
        - last_message_seq
        - last_message_preview
        - last_message_at
      properties:
        thread_id:
          type: string
        kind:
          type: string
          enum: [dm, group_dm]
        title:
          type: string
        participant_ids:
          type: array
          items:
            type: string
        unread:
          type: integer
          minimum: 0
        last_read_seq:
          type: integer
          minimum: 0
        last_message_seq:
          type: integer
          minimum: 0
        last_message_preview:
          type: string
        last_message_at:
          type: string
          format: date-time
    DmThreadPage:
      type: object
      required: [items]
      properties:
        items:
          type: array
          items:
            $ref: '#/components/schemas/DmThreadSummary'
        next_cursor:
          type: string
          nullable: true
    DmMessageRecord:
      type: object
      required:
        - message_id
        - thread_id
        - author_id
        - seq
        - ciphertext
        - created_at
      properties:
        message_id:
          type: string
        thread_id:
          type: string
        author_id:
          type: string
        seq:
          type: integer
          minimum: 1
        ciphertext:
          type: string
        created_at:
          type: string
          format: date-time
        edited_at:
          type: string
          format: date-time
          nullable: true
    DmMessagePage:
      type: object
      required: [items]
      properties:
        items:
          type: array
          items:
            $ref: '#/components/schemas/DmMessageRecord'
        next_cursor:
          type: string
          nullable: true
          description: Present only when more messages remain; equals the `seq` of the last returned item.
    DmThreadMarkReadRequest:
      type: object
      required: [last_read_seq]
      properties:
        last_read_seq:
          type: integer
          minimum: 0
          description: The message sequence number the client has read up to. The server applies `GREATEST(current, requested)` so stale values are harmless.
    DmThreadMarkReadResponse:
      type: object
      required: [thread_id, last_read_seq, unread]
      properties:
        thread_id:
          type: string
        last_read_seq:
          type: integer
          minimum: 0
          description: The effective read position after the monotonic advance.
        unread:
          type: integer
          minimum: 0
          description: Remaining unread message count (max(seq) - last_read_seq, clamped to 0).
    FriendRequestRecord:
      type: object
      required: [request_id, requester_identity_id, target_identity_id, status, created_at]
      properties:
        request_id:
          type: string
        requester_identity_id:
          type: string
        target_identity_id:
          type: string
        status:
          type: string
        created_at:
          type: string
          format: date-time
    FriendRequestPage:
      type: object
      required: [items]
      properties:
        items:
          type: array
          items:
            $ref: '#/components/schemas/FriendRequestRecord'
    FriendRequestCreateRequest:
      type: object
      required: [requester_identity_id, target_identity_id]
      properties:
        requester_identity_id:
          type: string
        target_identity_id:
          type: string
    IdentityBootstrapBundle:
      type: object
      required: [identity_id, public_key, algorithm, endpoint_cards, devices]
      properties:
        identity_id:
          type: string
        public_key:
          type: string
        algorithm:
          type: string
          enum: [ed25519]
        endpoint_cards:
          type: array
          items:
            $ref: '#/components/schemas/DmEndpointCard'
        devices:
          type: array
          items:
            $ref: '#/components/schemas/DmProfileDeviceSummary'
    IdentityKeyRegistrationRequest:
      type: object
      required: [identity_id, public_key, algorithm]
      properties:
        identity_id:
          type: string
        public_key:
          type: string
        algorithm:
          type: string
          enum: [ed25519]
    AuthChallengeRequest:
      type: object
      required: [identity_id]
      properties:
        identity_id:
          type: string
    AuthVerifyRequest:
      type: object
      required: [identity_id, challenge_id, signature]
      properties:
        identity_id:
          type: string
        challenge_id:
          type: string
        signature:
          type: string
    AuthChallengeResponse:
      type: object
      required: [challenge_id, nonce, expires_at]
      properties:
        challenge_id:
          type: string
        nonce:
          type: string
        expires_at:
          type: string
          format: date-time
    AuthVerifyResponse:
      type: object
      required: [session_id, expires_at]
      properties:
        session_id:
          type: string
        expires_at:
          type: string
          format: date-time
    SessionRevokeRequest:
      type: object
      required: [session_id]
      properties:
        session_id:
          type: string
    SessionValidateResponse:
      type: object
      required: [session_id, identity_id, expires_at]
      properties:
        session_id:
          type: string
        identity_id:
          type: string
        expires_at:
          type: string
          format: date-time
    InviteCreateRequest:
      type: object
      required: [mode]
      properties:
        mode:
          type: string
          enum: [one_time, multi_use]
        expires_at:
          type: string
          format: date-time
          nullable: true
        max_uses:
          type: integer
          minimum: 1
          nullable: true
    InviteRedeemRequest:
      type: object
      required: [token, node_fingerprint]
      properties:
        token:
          type: string
        node_fingerprint:
          type: string
    InviteCreateResponse:
      type: object
      required: [invite_id, token, mode, created_at]
      properties:
        invite_id:
          type: string
        token:
          type: string
        mode:
          type: string
          enum: [one_time, multi_use]
        expires_at:
          type: string
          format: date-time
          nullable: true
        max_uses:
          type: integer
          minimum: 1
          nullable: true
        created_at:
          type: string
          format: date-time
    ContactInviteRedeemRequest:
      type: object
      required: [token]
      properties:
        token:
          type: string
    InviteRedeemResponse:
      type: object
      required: [accepted]
      properties:
        accepted:
          type: boolean
    BlockUserRequest:
      type: object
      required: [target_identity_id]
      properties:
        target_identity_id:
          type: string
    MuteUserRequest:
      type: object
      required: [target_identity_id]
      properties:
        target_identity_id:
          type: string
    BlockRecord:
      type: object
      required: [blocker_identity_id, blocked_identity_id, created_at]
      properties:
        blocker_identity_id:
          type: string
        blocked_identity_id:
          type: string
        created_at:
          type: string
          format: date-time
    MuteRecord:
      type: object
      required: [muter_identity_id, muted_identity_id, created_at]
      properties:
        muter_identity_id:
          type: string
        muted_identity_id:
          type: string
        created_at:
          type: string
          format: date-time
    BlockListResponse:
      type: object
      required: [items]
      properties:
        items:
          type: array
          items:
            $ref: '#/components/schemas/BlockRecord'
    MuteListResponse:
      type: object
      required: [items]
      properties:
        items:
          type: array
          items:
            $ref: '#/components/schemas/MuteRecord'
    ApiError:
      type: object
      required: [code, message]
      properties:
        code:
          type: string
          enum:
            - already_blocked
            - already_muted
            - blocked_user
            - bootstrap_incomplete
            - bootstrap_not_available
            - invite_invalid
            - internal_token_invalid
            - invite_expired
            - invite_exhausted
            - fingerprint_mismatch
            - identity_invalid
            - public_key_invalid
            - algorithm_invalid
            - nonce_invalid
            - signature_invalid
            - session_invalid
            - csrf_invalid
            - rate_limited
            - storage_unavailable
            - rate_limiter_unavailable
            - identity_registration_disabled
            - identity_exists
            - friend_request_exists
            - transition_invalid
            - storage_failure
            - cookie_invalid
            - cursor_invalid
            - cursor_out_of_range
            - limit_invalid
            - message_content_invalid
            - message_deleted
            - message_edit_forbidden
            - message_delete_forbidden
            - message_not_found
            - mention_invalid
            - scope_invalid
            - channel_not_found
            - reply_target_invalid
            - thread_not_found
            - dm_policy_invalid
            - pairing_invalid
            - pairing_expired
            - pairing_replayed
            - pairing_store_unavailable
            - preflight_invalid
            - lan_discovery_invalid
            - wan_wizard_invalid
            - endpoint_cards_invalid
            - parallel_dial_invalid
            - profile_device_invalid
            - fanout_invalid
            - friendship_lookup_failed
            - last_read_seq_invalid
            - server_access_denied
        message:
          type: string
  parameters:
    CsrfTokenHeader:
      name: x-csrf-token
      in: header
      required: false
      schema:
        type: string
      description: |
        Double-submit CSRF token associated with the `hexrelay_csrf` cookie.
        Required for cookie-authenticated mutation requests.
        Not required for bearer-authenticated requests.
  responses:
    BadRequest:
      description: Invalid request
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ApiError'
    Unauthorized:
      description: Authentication or verification failure
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ApiError'
    TooManyRequests:
      description: Request rate limit exceeded
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ApiError'
    Conflict:
      description: Request conflicts with existing resource state
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ApiError'
    Forbidden:
      description: Request understood but not permitted in current state
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ApiError'
    InternalServerError:
      description: Internal storage or runtime dependency failure
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ApiError'
  securitySchemes:
    CookieAuth:
      type: apiKey
      in: cookie
      name: hexrelay_session
    BearerAuth:
      type: http
      scheme: bearer
