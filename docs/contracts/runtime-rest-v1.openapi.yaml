          enum:
            - invite_invalid
            - invite_expired
            - invite_exhausted
            - fingerprint_mismatch
            - identity_invalid
            - public_key_invalid
            - algorithm_invalid
            - nonce_invalid
            - signature_invalid
            - session_invalid
            - csrf_invalid
            - rate_limited
            - storage_unavailable
            - rate_limiter_unavailable
            - identity_exists
            - friend_request_exists
            - transition_invalid
            - storage_failure
            - cookie_invalid
            - cursor_invalid
            - limit_invalid
            - thread_not_found
            - dm_policy_invalid
            - pairing_invalid
            - pairing_expired
            - pairing_replayed
            - preflight_invalid
            - lan_discovery_invalid
            - wan_wizard_invalid
        message:
          type: string
  parameters:
    CsrfTokenHeader:
      name: x-csrf-token
      in: header
      required: false
      schema:
        type: string
      description: |
        Double-submit CSRF token associated with the `hexrelay_csrf` cookie.
        Required for cookie-authenticated mutation requests.
        Not required for bearer-authenticated requests.
  responses:
    BadRequest:
      description: Invalid request
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ApiError'
    Unauthorized:
      description: Authentication or verification failure
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ApiError'
    TooManyRequests:
      description: Request rate limit exceeded
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ApiError'
    Conflict:
      description: Request conflicts with existing resource state
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ApiError'
    InternalServerError:
      description: Internal storage or runtime dependency failure
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ApiError'
  securitySchemes:
    CookieAuth:
      type: apiKey
      in: cookie
      name: hexrelay_session
    BearerAuth:
      type: http
      scheme: bearer
