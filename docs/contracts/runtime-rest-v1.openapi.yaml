                  value:
                    outcome: network_incompatible
                    method: none
                    reason_code: wan_path_unavailable
                    checklist:
                      - Current network profile blocks direct inbound WAN connectivity.
                      - Try connecting on a shared LAN or different home network.
        '400':
          description: Invalid WAN wizard request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiError'
              examples:
                wanWizardInvalid:
                  summary: WAN wizard input is invalid
                  value:
                    code: wan_wizard_invalid
                    message: "network_profile must be one of: home_nat, symmetric_nat, carrier_nat, enterprise_restricted"
        '401':
          $ref: '#/components/responses/Unauthorized'
        '500':
          $ref: '#/components/responses/InternalServerError'
  /v1/dm/connectivity/endpoint-cards:
    post:
      summary: Register DM endpoint cards for multi-endpoint direct dialing
      description: Persists endpoint-card control state when configured storage is available so direct-dial candidates survive restart without storing DM payload content. All cards in a single request are upserted within one database transaction to guarantee atomic registration.
      security:
        - CookieAuth: []
        - BearerAuth: []
      parameters:
        - $ref: '#/components/parameters/CsrfTokenHeader'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/DmEndpointCardRegisterRequest'
      responses:
        '200':
          description: >-
            Endpoint cards registered. Returns the canonical persisted card set for
            the identity after atomic upsert, including existing live cards that
            remain valid alongside the newly registered entries.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DmEndpointCardRegisterResponse'
              examples:
                upsertedCards:
                  summary: Runtime returns the full active card snapshot after upsert
                  value:
                    identity_id: usr-jules-p
                    cards:
                      - endpoint_id: lan-a
                        endpoint_hint: udp://192.168.1.20:4040
                        estimated_rtt_ms: 9
                        priority: 2
                        expires_at: '2026-04-06T12:40:00Z'
                        revoked: false
                      - endpoint_id: wan-a
                        endpoint_hint: tcp://198.51.100.20:4041
                        estimated_rtt_ms: 30
                        priority: 0
                        expires_at: '2026-04-06T12:40:00Z'
                        revoked: false
        '400':
          description: Invalid endpoint-card registration request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiError'
              examples:
                endpointCardsInvalid:
                  summary: Endpoint-card registration payload is invalid
                  value:
                    code: endpoint_cards_invalid
                    message: cards must include between 1 and 8 endpoint cards
        '401':
          $ref: '#/components/responses/Unauthorized'
        '500':
          $ref: '#/components/responses/InternalServerError'
  /v1/dm/connectivity/endpoint-cards/revoke:
    post:
      summary: Revoke previously published DM endpoint cards
      description: Persists endpoint-card revocation state when configured storage is available.
      security:
        - CookieAuth: []
        - BearerAuth: []
      parameters:
        - $ref: '#/components/parameters/CsrfTokenHeader'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/DmEndpointCardRevokeRequest'
      responses:
        '200':
          description: >-
            Endpoint cards revoked. The response is idempotent: `revoked_endpoint_ids`
            contains only newly revoked ids in request order, while
            `remaining_cards` shows the still-active card set after the update.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DmEndpointCardRevokeResponse'
              examples:
                revokeSubset:
                  summary: Only newly revoked ids are reported, in the same order as the request
                  value:
                    identity_id: usr-jules-p
                    revoked_endpoint_ids: [wan-b, lan-a]
                    remaining_cards:
                      - endpoint_id: wan-a
                        endpoint_hint: tcp://198.51.100.20:4041
                        estimated_rtt_ms: 30
                        priority: 0
                        expires_at: '2026-04-06T12:40:00Z'
                        revoked: false
                idempotentRevoke:
                  summary: Re-revoking already revoked ids succeeds with an empty newly-revoked set
                  value:
                    identity_id: usr-jules-p
                    revoked_endpoint_ids: []
                    remaining_cards:
                      - endpoint_id: wan-a
                        endpoint_hint: tcp://198.51.100.20:4041
                        estimated_rtt_ms: 30
                        priority: 0
                        expires_at: '2026-04-06T12:40:00Z'
                        revoked: false
        '400':
          description: Invalid endpoint-card revoke request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiError'
              examples:
                endpointCardsInvalid:
                  summary: Endpoint-card revoke payload is invalid
                  value:
                    code: endpoint_cards_invalid
                    message: endpoint_ids must include between 1 and 8 ids
        '401':
          $ref: '#/components/responses/Unauthorized'
        '500':
          $ref: '#/components/responses/InternalServerError'
  /v1/dm/connectivity/parallel-dial:
    post:
      summary: Run DM multi-endpoint parallel dial orchestration
      security:
        - CookieAuth: []
        - BearerAuth: []
      parameters:
        - $ref: '#/components/parameters/CsrfTokenHeader'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/DmParallelDialRequest'
      responses:
        '200':
          description: >-
            Parallel dial orchestration result. `ready` means the fastest reachable
            endpoint won and slower candidates were cancelled; `blocked` means no
            direct path could be attempted or all attempts failed, with remediation
            explaining the cause.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DmParallelDialResponse'
              examples:
                connectedWinner:
                  summary: Fastest reachable endpoint wins and slower attempts are cancelled
                  value:
                    status: ready
                    reason_code: parallel_dial_connected
                    transport_profile: direct_only
                    winner_endpoint_id: lan-a
                    canceled_endpoint_ids: [wan-b, wan-a]
                    attempts:
                      - endpoint_id: lan-a
                        endpoint_hint: udp://192.168.1.20:4040
                        estimated_rtt_ms: 9
                        status: connected
                        cancellation_reason: null
                      - endpoint_id: wan-b
                        endpoint_hint: tcp://198.51.100.20:4041
                        estimated_rtt_ms: 40
                        status: cancelled
                        cancellation_reason: winner_selected
                    remediation:
                      - Parallel dial selected the fastest reachable endpoint card.
                blockedExhausted:
                  summary: All candidate endpoints failed, so direct dial remains blocked
                  value:
                    status: blocked
                    reason_code: parallel_dial_exhausted
                    transport_profile: direct_only
                    winner_endpoint_id: null
                    canceled_endpoint_ids: []
                    attempts:
                      - endpoint_id: wan-a
                        endpoint_hint: udp://203.0.113.20:4040
                        estimated_rtt_ms: 70
                        status: failed
                        cancellation_reason: dial_unreachable
                    remediation:
                      - All attempted endpoint cards were unreachable.
                      - Refresh endpoint cards and retry direct connection.
        '400':
          description: Invalid parallel-dial request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiError'
              examples:
                parallelDialInvalid:
                  summary: Parallel-dial payload is invalid
                  value:
                    code: parallel_dial_invalid
                    message: peer_identity_id must be 3-64 chars using letters, numbers, _ or -
        '401':
          $ref: '#/components/responses/Unauthorized'
        '500':
          $ref: '#/components/responses/InternalServerError'
