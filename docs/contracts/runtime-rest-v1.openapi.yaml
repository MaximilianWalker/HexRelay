  /v1/dm/connectivity/preflight:
    post:
      summary: Run DM direct-connect preflight diagnostics and troubleshooting mapping
      description: Runs direct-connect diagnostics using trusted runtime state only. If a peer identity is supplied, the preflight evaluates that peer's current DM inbound policy for the authenticated requester; `same_server` authorization is verified from persisted server membership records rather than client-declared context.
      security:
        - CookieAuth: []
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/DmConnectivityPreflightRequest'
      responses:
        '200':
          description: >-
            DM preflight diagnostics result. Returns either a `ready` branch for
            direct dialing or a `blocked` branch with deterministic remediation
            guidance explaining the first failing prerequisite.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DmConnectivityPreflightResponse'
              examples:
                readyLan:
                  summary: Peer was discovered on LAN so the fast path is ready
                  value:
                    status: ready
                    reason_code: preflight_ok_lan
                    transport_profile: direct_only
                    remediation:
                      - Peer discovered on local network; prioritize LAN direct path.
                blockedPolicy:
                  summary: Recipient policy blocks direct connectivity until relationship state changes
                  value:
                    status: blocked
                    reason_code: policy_blocked
                    transport_profile: direct_only
                    remediation:
                      - Send and accept a friend request before starting this DM.
                      - Or ask your contact to change their DM inbound policy.
        '400':
          description: Invalid connectivity preflight request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiError'
              examples:
                preflightInvalid:
                  summary: Preflight request is invalid
                  value:
                    code: preflight_invalid
                    message: peer_identity_id must not be empty when provided
        '401':
          $ref: '#/components/responses/Unauthorized'
        '500':
          $ref: '#/components/responses/InternalServerError'
