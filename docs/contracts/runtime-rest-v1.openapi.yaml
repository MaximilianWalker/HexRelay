openapi: 3.1.0
info:
  title: HexRelay Runtime REST API
  version: 0.1.0
  description: |
    Current runtime REST contract authority.
    This artifact defines currently implemented REST behavior and must be
    updated when runtime endpoint payloads, auth semantics, or error codes change.
servers:
  - url: https://api.hexrelay.local
paths:
  /health:
    get:
      summary: Service health probe
      responses:
        '200':
          description: Service is healthy
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HealthResponse'
  /v1/identity/keys/register:
    post:
      summary: Register a public identity key
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/IdentityKeyRegistrationRequest'
      responses:
        '201':
          description: Identity key registered
        '400':
          $ref: '#/components/responses/BadRequest'
        '409':
          $ref: '#/components/responses/Conflict'
        '500':
          $ref: '#/components/responses/InternalServerError'
  /v1/auth/challenge:
    post:
      summary: Issue a nonce challenge
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AuthChallengeRequest'
      responses:
        '200':
          description: Challenge issued
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthChallengeResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '429':
          $ref: '#/components/responses/TooManyRequests'
        '500':
          $ref: '#/components/responses/InternalServerError'
  /v1/auth/verify:
    post:
      summary: Verify challenge signature and issue session cookies
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AuthVerifyRequest'
      responses:
        '200':
          description: Session issued via HttpOnly cookie
          headers:
            Set-Cookie:
              description: |
                Returns `hexrelay_session` (HttpOnly auth cookie) and
                `hexrelay_csrf` (double-submit CSRF cookie).
              schema:
                type: string
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthVerifyResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '429':
          $ref: '#/components/responses/TooManyRequests'
        '500':
          $ref: '#/components/responses/InternalServerError'
  /v1/auth/sessions/revoke:
    post:
      summary: Revoke an active session
      security:
        - CookieAuth: []
        - BearerAuth: []
      parameters:
        - $ref: '#/components/parameters/CsrfTokenHeader'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SessionRevokeRequest'
      responses:
        '204':
          description: Session revoked
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '500':
          $ref: '#/components/responses/InternalServerError'
  /v1/auth/sessions/validate:
    get:
      summary: Validate active session
      security:
        - CookieAuth: []
        - BearerAuth: []
      responses:
        '200':
          description: Session is active and valid
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SessionValidateResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
  /v1/invites:
    post:
      summary: Create an invite token
      security:
        - CookieAuth: []
        - BearerAuth: []
      parameters:
        - $ref: '#/components/parameters/CsrfTokenHeader'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/InviteCreateRequest'
      responses:
        '201':
          description: Invite created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/InviteCreateResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '429':
          $ref: '#/components/responses/TooManyRequests'
        '500':
          $ref: '#/components/responses/InternalServerError'
  /v1/invites/redeem:
    post:
      summary: Redeem an invite token
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/InviteRedeemRequest'
      responses:
        '200':
          description: Invite redeemed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/InviteRedeemResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '429':
          $ref: '#/components/responses/TooManyRequests'
        '500':
          $ref: '#/components/responses/InternalServerError'
  /v1/servers:
    get:
      summary: List servers for authenticated identity
      security:
        - CookieAuth: []
        - BearerAuth: []
      parameters:
        - in: query
          name: search
          schema:
            type: string
        - in: query
          name: favorites_only
          schema:
            type: boolean
        - in: query
          name: unread_only
          schema:
            type: boolean
        - in: query
          name: muted_only
          schema:
            type: boolean
      responses:
        '200':
          description: Server list response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ServerListResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
  /v1/contacts:
    get:
      summary: List contacts for authenticated identity
      security:
        - CookieAuth: []
        - BearerAuth: []
      parameters:
        - in: query
          name: search
          schema:
            type: string
        - in: query
          name: online_only
          schema:
            type: boolean
        - in: query
          name: unread_only
          schema:
            type: boolean
        - in: query
          name: favorites_only
          schema:
            type: boolean
      responses:
        '200':
          description: Contact list response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ContactListResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
  /v1/friends/requests:
    get:
      summary: List inbound/outbound friend requests
      security:
        - CookieAuth: []
        - BearerAuth: []
      parameters:
        - in: query
          name: identity_id
          required: true
          schema:
            type: string
        - in: query
          name: direction
          schema:
            type: string
            enum: [inbound, outbound]
      responses:
        '200':
          description: Friend request list response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/FriendRequestPage'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
    post:
      summary: Create a friend request
      security:
        - CookieAuth: []
        - BearerAuth: []
      parameters:
        - $ref: '#/components/parameters/CsrfTokenHeader'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/FriendRequestCreateRequest'
      responses:
        '201':
          description: Friend request created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/FriendRequestRecord'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '409':
          $ref: '#/components/responses/Conflict'
        '500':
          $ref: '#/components/responses/InternalServerError'
  /v1/friends/requests/{request_id}/accept:
    post:
      summary: Accept pending friend request
      security:
        - CookieAuth: []
        - BearerAuth: []
      parameters:
        - $ref: '#/components/parameters/CsrfTokenHeader'
        - in: path
          name: request_id
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Friend request updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/FriendRequestRecord'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '409':
          $ref: '#/components/responses/Conflict'
        '500':
          $ref: '#/components/responses/InternalServerError'
  /v1/friends/requests/{request_id}/decline:
    post:
      summary: Decline pending friend request
      security:
        - CookieAuth: []
        - BearerAuth: []
      parameters:
        - $ref: '#/components/parameters/CsrfTokenHeader'
        - in: path
          name: request_id
          required: true
          schema:
            type: string
      responses:
        '204':
          description: Friend request updated
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '409':
          $ref: '#/components/responses/Conflict'
        '500':
          $ref: '#/components/responses/InternalServerError'
  /v1/friends/requests/{request_id}/cancel:
    post:
      summary: Cancel pending friend request
      security:
        - CookieAuth: []
        - BearerAuth: []
      parameters:
        - $ref: '#/components/parameters/CsrfTokenHeader'
        - in: path
          name: request_id
          required: true
          schema:
            type: string
      responses:
        '204':
          description: Friend request updated
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '409':
          $ref: '#/components/responses/Conflict'
        '500':
          $ref: '#/components/responses/InternalServerError'
components:
  schemas:
    HealthResponse:
      type: object
      required: [service, status]
      properties:
        service:
          type: string
        status:
          type: string
    ServerSummary:
      type: object
      required: [id, name, unread, favorite, muted]
      properties:
        id:
          type: string
        name:
          type: string
        unread:
          type: integer
          minimum: 0
        favorite:
          type: boolean
        muted:
          type: boolean
    ServerListResponse:
      type: object
      required: [items]
      properties:
        items:
          type: array
          items:
            $ref: '#/components/schemas/ServerSummary'
    ContactSummary:
      type: object
      required: [id, name, status, unread, favorite, inbound_request, pending_request]
      properties:
        id:
          type: string
        name:
          type: string
        status:
          type: string
        unread:
          type: integer
          minimum: 0
        favorite:
          type: boolean
        inbound_request:
          type: boolean
        pending_request:
          type: boolean
    ContactListResponse:
      type: object
      required: [items]
      properties:
        items:
          type: array
          items:
            $ref: '#/components/schemas/ContactSummary'
    FriendRequestRecord:
      type: object
      required: [request_id, requester_identity_id, target_identity_id, status, created_at]
      properties:
        request_id:
          type: string
        requester_identity_id:
          type: string
        target_identity_id:
          type: string
        status:
          type: string
        created_at:
          type: string
          format: date-time
    FriendRequestPage:
      type: object
      required: [items]
      properties:
        items:
          type: array
          items:
            $ref: '#/components/schemas/FriendRequestRecord'
    FriendRequestCreateRequest:
      type: object
      required: [requester_identity_id, target_identity_id]
      properties:
        requester_identity_id:
          type: string
        target_identity_id:
          type: string
    IdentityKeyRegistrationRequest:
      type: object
      required: [identity_id, public_key, algorithm]
      properties:
        identity_id:
          type: string
        public_key:
          type: string
        algorithm:
          type: string
          enum: [ed25519]
    AuthChallengeRequest:
      type: object
      required: [identity_id]
      properties:
        identity_id:
          type: string
    AuthVerifyRequest:
      type: object
      required: [identity_id, challenge_id, signature]
      properties:
        identity_id:
          type: string
        challenge_id:
          type: string
        signature:
          type: string
    AuthChallengeResponse:
      type: object
      required: [challenge_id, nonce, expires_at]
      properties:
        challenge_id:
          type: string
        nonce:
          type: string
        expires_at:
          type: string
          format: date-time
    AuthVerifyResponse:
      type: object
      required: [session_id, expires_at]
      properties:
        session_id:
          type: string
        expires_at:
          type: string
          format: date-time
    SessionRevokeRequest:
      type: object
      required: [session_id]
      properties:
        session_id:
          type: string
    SessionValidateResponse:
      type: object
      required: [session_id, identity_id, expires_at]
      properties:
        session_id:
          type: string
        identity_id:
          type: string
        expires_at:
          type: string
          format: date-time
    InviteCreateRequest:
      type: object
      required: [mode]
      properties:
        mode:
          type: string
          enum: [one_time, multi_use]
        expires_at:
          type: string
          format: date-time
          nullable: true
        max_uses:
          type: integer
          minimum: 1
          nullable: true
    InviteRedeemRequest:
      type: object
      required: [token, node_fingerprint]
      properties:
        token:
          type: string
        node_fingerprint:
          type: string
    InviteCreateResponse:
      type: object
      required: [token, mode]
      properties:
        token:
          type: string
        mode:
          type: string
          enum: [one_time, multi_use]
        expires_at:
          type: string
          format: date-time
          nullable: true
        max_uses:
          type: integer
          minimum: 1
          nullable: true
    InviteRedeemResponse:
      type: object
      required: [accepted]
      properties:
        accepted:
          type: boolean
    ApiError:
      type: object
      required: [code, message]
      properties:
        code:
          type: string
          enum:
            - invite_invalid
            - invite_expired
            - invite_exhausted
            - fingerprint_mismatch
            - identity_invalid
            - public_key_invalid
            - algorithm_invalid
            - nonce_invalid
            - signature_invalid
            - session_invalid
            - csrf_invalid
            - rate_limited
            - storage_unavailable
            - rate_limiter_unavailable
            - identity_exists
            - friend_request_exists
            - transition_invalid
            - storage_failure
            - cookie_invalid
        message:
          type: string
  parameters:
    CsrfTokenHeader:
      name: x-csrf-token
      in: header
      required: false
      schema:
        type: string
      description: |
        Double-submit CSRF token associated with the `hexrelay_csrf` cookie.
        Required for cookie-authenticated mutation requests.
        Not required for bearer-authenticated requests.
  responses:
    BadRequest:
      description: Invalid request
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ApiError'
    Unauthorized:
      description: Authentication or verification failure
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ApiError'
    TooManyRequests:
      description: Request rate limit exceeded
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ApiError'
    Conflict:
      description: Request conflicts with existing resource state
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ApiError'
    InternalServerError:
      description: Internal storage or runtime dependency failure
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ApiError'
  securitySchemes:
    CookieAuth:
      type: apiKey
      in: cookie
      name: hexrelay_session
    BearerAuth:
      type: http
      scheme: bearer
