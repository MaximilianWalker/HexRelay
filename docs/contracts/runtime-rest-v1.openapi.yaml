openapi: 3.1.0
info:
  title: HexRelay Runtime REST API
  version: 0.1.0
  description: |
    Current runtime REST contract authority.
    This artifact defines currently implemented REST behavior and must be
    updated when runtime endpoint payloads, auth semantics, or error codes change.
    Auth challenge/verify distributed rate-limit key derivation uses deterministic
    source fingerprint hashing so enforcement remains consistent across instances.
    Distributed counter cleanup runs at most once per process/window epoch to avoid
    per-request cleanup amplification while preserving stale-window pruning.
    Server membership and server-channel authorization decisions emit structured
    allow/deny/failure logs for node-owner debugging without changing response
    contracts.
    Server-channel message edit/delete author-authorization decisions also emit
    structured allow/deny/failure logs for node-owner debugging without changing
    response contracts.
servers:
  - url: https://api.hexrelay.local
paths:
  /health:
    get:
      summary: Service health probe
      responses:
        '200':
          description: Fixed liveness payload for the API service.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HealthResponse'
              examples:
                healthyApi:
                  summary: API service reports a healthy probe state
                  value:
                    service: api-rs
                    status: ok
  /v1/identity/keys/register:
    post:
      summary: Register a public identity key
      description: |
        Public registration is disabled by default until a trusted identity-claim
        flow is configured. Local development/tests may explicitly enable it.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/IdentityKeyRegistrationRequest'
      responses:
        '201':
          description: Identity key registered
        '400':
          description: Invalid identity registration payload
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiError'
              examples:
                algorithmInvalid:
                  summary: Only ed25519 identity keys are accepted
                  value:
                    code: algorithm_invalid
                    message: algorithm must be ed25519
                identityInvalid:
                  summary: Identity id violates the runtime format rules
                  value:
                    code: identity_invalid
                    message: identity_id must be 3-64 chars using letters, numbers, _ or -
                publicKeyInvalid:
                  summary: Public key is not a 32-byte ed25519 key in hex or base64
                  value:
                    code: public_key_invalid
                    message: public_key must be 32-byte ed25519 key in hex or base64
        '403':
          description: Public identity registration is disabled
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiError'
              examples:
                identityRegistrationDisabled:
                  summary: Runtime is still fail-closed for public identity claims
                  value:
                    code: identity_registration_disabled
                    message: public identity registration is disabled until a trusted claim flow is configured
        '409':
          description: Identity already has a registered key
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiError'
              examples:
                identityExists:
                  summary: Identity id is already claimed by an existing key
                  value:
                    code: identity_exists
                    message: identity_id already has a registered key
        '500':
          $ref: '#/components/responses/InternalServerError'
  /v1/auth/challenge:
    post:
      summary: Issue a nonce challenge
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AuthChallengeRequest'
      responses:
        '200':
          description: >-
            Challenge issued. Returns a fresh opaque `challenge_id`, a 32-byte
            nonce, and the expiry timestamp. Unknown identities receive the same
            success-shaped body as registered identities so callers cannot infer
            account existence from the response shape.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthChallengeResponse'
              examples:
                issuedChallenge:
                  summary: Challenge body is indistinguishable for known and unknown identities
                  value:
                    challenge_id: ch_4a7d9d
                    nonce: aaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaa
                    expires_at: '2026-04-06T12:30:00Z'
        '400':
          description: Invalid auth challenge request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiError'
              examples:
                identityInvalid:
                  summary: Identity id violates the runtime format rules
                  value:
                    code: identity_invalid
                    message: identity_id must be 3-64 chars using letters, numbers, _ or -
        '429':
          $ref: '#/components/responses/TooManyRequests'
        '500':
          $ref: '#/components/responses/InternalServerError'
  /v1/auth/verify:
    post:
      summary: Verify challenge signature and issue session cookies
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AuthVerifyRequest'
      responses:
        '200':
          description: >-
            Session issued via HttpOnly cookie. The body returns the canonical
            session metadata while `Set-Cookie` issues both the auth and CSRF
            cookies needed for subsequent cookie-auth requests.
          headers:
            Set-Cookie:
              description: |
                Returns `hexrelay_session` (HttpOnly auth cookie) and
                `hexrelay_csrf` (double-submit CSRF cookie).
              x-hexrelay-cookie-actions:
                - issue:hexrelay_session
                - issue:hexrelay_csrf
              schema:
                type: string
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthVerifyResponse'
              examples:
                issuedSession:
                  summary: Successful verify returns session metadata alongside issued cookies
                  value:
                    session_id: ses_9f3b12
                    expires_at: '2026-04-07T12:00:00Z'
        '400':
          description: Invalid auth verification request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiError'
              examples:
                identityInvalid:
                  summary: Identity id violates the runtime format rules
                  value:
                    code: identity_invalid
                    message: identity_id must be 3-64 chars using letters, numbers, _ or -
                nonceInvalid:
                  summary: Challenge id is missing from the verification payload
                  value:
                    code: nonce_invalid
                    message: challenge_id must not be empty
                signatureInvalid:
                  summary: Signature is missing from the verification payload
                  value:
                    code: signature_invalid
                    message: signature must not be empty
        '401':
          description: Verification failed against the stored challenge or identity key
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiError'
              examples:
                nonceInvalid:
                  summary: Challenge, signature, or registered key could not be verified
                  value:
                    code: nonce_invalid
                    message: auth verification failed
        '429':
          $ref: '#/components/responses/TooManyRequests'
        '500':
          $ref: '#/components/responses/InternalServerError'
  /v1/auth/sessions/revoke:
    post:
      summary: Revoke an active session
      security:
        - CookieAuth: []
        - BearerAuth: []
      parameters:
        - $ref: '#/components/parameters/CsrfTokenHeader'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SessionRevokeRequest'
      responses:
        '204':
          description: Session revoked
          headers:
            Set-Cookie:
              description: |
                Clears both `hexrelay_session` and `hexrelay_csrf` cookies when the
                active session is revoked.
              x-hexrelay-cookie-actions:
                - clear:hexrelay_session
                - clear:hexrelay_csrf
              schema:
                type: string
        '400':
          description: Invalid session revoke request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiError'
              examples:
                sessionInvalid:
                  summary: Session id is missing or does not resolve to an active stored session
                  value:
                    code: session_invalid
                    message: session_id must not be empty
        '401':
          description: Revocation payload does not match the authenticated session
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiError'
              examples:
                sessionInvalid:
                  summary: Caller attempted to revoke a different session id
                  value:
                    code: session_invalid
                    message: session_id does not match authenticated session
        '500':
          $ref: '#/components/responses/InternalServerError'
  /v1/auth/sessions/validate:
    get:
      summary: Validate active session
      security:
        - CookieAuth: []
        - BearerAuth: []
      responses:
        '200':
          description: >-
            Session is active and valid. Returns the authenticated session id,
            identity id, and current expiry as echoed from the verified runtime
            session state.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SessionValidateResponse'
              examples:
                activeSession:
                  summary: Validate returns the currently active authenticated session snapshot
                  value:
                    session_id: ses_9f3b12
                    identity_id: usr-nora-k
                    expires_at: '2026-04-07T12:00:00Z'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '500':
          $ref: '#/components/responses/InternalServerError'
  /v1/invites:
    post:
      summary: Create an invite token
      security:
        - CookieAuth: []
        - BearerAuth: []
      parameters:
        - $ref: '#/components/parameters/CsrfTokenHeader'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/InviteCreateRequest'
      responses:
        '201':
          description: >-
            Invite created. Returns the canonical persisted invite record plus
            the one-time visible token. `one_time` mode is normalized to
            `max_uses=1` even when omitted in the request.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/InviteCreateResponse'
              examples:
                multiUseInvite:
                  summary: Multi-use invite preserves explicit usage cap
                  value:
                    invite_id: inv_100
                    token: tok_live_100
                    mode: multi_use
                    expires_at: null
                    max_uses: 2
                    created_at: '2026-04-06T12:32:00Z'
                oneTimeNormalized:
                  summary: One-time invites normalize to a single allowed redemption
                  value:
                    invite_id: inv_101
                    token: tok_live_101
                    mode: one_time
                    expires_at: null
                    max_uses: 1
                    created_at: '2026-04-06T12:33:00Z'
        '400':
          description: Invalid invite creation request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiError'
              examples:
                inviteInvalid:
                  summary: Invite creation payload is invalid
                  value:
                    code: invite_invalid
                    message: mode must be one_time or multi_use
        '401':
          $ref: '#/components/responses/Unauthorized'
        '429':
          $ref: '#/components/responses/TooManyRequests'
        '500':
          $ref: '#/components/responses/InternalServerError'
  /v1/invites/redeem:
    post:
      summary: Redeem an invite token
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/InviteRedeemRequest'
      responses:
        '200':
          description: >-
            Invite redeemed. Success returns a simple acceptance ack; multi-use
            invites can continue redeeming until exhausted, while one-time or
            exhausted invites move to the documented `400` failure paths.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/InviteRedeemResponse'
              examples:
                acceptedInvite:
                  summary: Valid invite redemption returns a simple acceptance ack
                  value:
                    accepted: true
        '400':
          description: Invite token is invalid for the current redemption attempt
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiError'
              examples:
                inviteInvalid:
                  summary: Token does not resolve to a live invite
                  value:
                    code: invite_invalid
                    message: invite token is invalid
                fingerprintMismatch:
                  summary: Token is bound to another node fingerprint
                  value:
                    code: fingerprint_mismatch
                    message: invite node fingerprint mismatch
                inviteExpired:
                  summary: Token has expired
                  value:
                    code: invite_expired
                    message: invite token is expired
                inviteExhausted:
                  summary: Token has no remaining uses
                  value:
                    code: invite_exhausted
                    message: invite token is exhausted
        '429':
          $ref: '#/components/responses/TooManyRequests'
        '500':
          $ref: '#/components/responses/InternalServerError'
  /v1/contact-invites:
    post:
      summary: Create a contact invite token
      security:
        - CookieAuth: []
        - BearerAuth: []
      parameters:
        - $ref: '#/components/parameters/CsrfTokenHeader'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/InviteCreateRequest'
      responses:
        '201':
          description: >-
            Contact invite created. Returns the persisted invite metadata and the
            shareable token used to open or resume the pending friend-request
            handshake with another identity.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/InviteCreateResponse'
              examples:
                contactInvite:
                  summary: Contact invite exposes the shareable token and persisted limits
                  value:
                    invite_id: inv_200
                    token: tok_contact_200
                    mode: multi_use
                    expires_at: null
                    max_uses: 3
                    created_at: '2026-04-06T12:34:00Z'
        '400':
          description: Invalid contact invite creation request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiError'
              examples:
                inviteInvalid:
                  summary: Contact invite creation payload is invalid
                  value:
                    code: invite_invalid
                    message: mode must be one_time or multi_use
        '401':
          $ref: '#/components/responses/Unauthorized'
        '429':
          $ref: '#/components/responses/TooManyRequests'
        '500':
          $ref: '#/components/responses/InternalServerError'
  /v1/contact-invites/redeem:
    post:
      summary: Redeem a contact invite token and create friend request
      description: |
        Redemption fails when a block relationship exists between the authenticated
        redeemer and the invite creator.
      security:
        - CookieAuth: []
        - BearerAuth: []
      parameters:
        - $ref: '#/components/parameters/CsrfTokenHeader'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ContactInviteRedeemRequest'
      responses:
        '200':
          description: >-
            Pending friend request created or returned. Successful redemption is
            idempotent for a pending pair: the body may be either the newly
            created pending request or the already-existing pending request for
            the same redeemer/inviter pair.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/FriendRequestRecord'
              examples:
                createdPendingRequest:
                  summary: Redeeming a valid contact invite creates a pending friend request
                  value:
                    request_id: req-300
                    requester_identity_id: usr-target
                    target_identity_id: usr-invite
                    status: pending
                    created_at: '2026-04-06T12:20:00Z'
                existingPendingRequest:
                  summary: Re-redeeming the same invite returns the existing pending request
                  value:
                    request_id: req-300
                    requester_identity_id: usr-target
                    target_identity_id: usr-invite
                    status: pending
                    created_at: '2026-04-06T12:20:00Z'
        '400':
          description: Contact invite token is invalid for the current redemption attempt
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiError'
              examples:
                inviteInvalid:
                  summary: Token does not resolve to a valid contact invite
                  value:
                    code: invite_invalid
                    message: invite token is invalid
                inviteExpired:
                  summary: Token has expired
                  value:
                    code: invite_expired
                    message: invite token is expired
                inviteExhausted:
                  summary: Token has no remaining uses
                  value:
                    code: invite_exhausted
                    message: invite token is exhausted
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          description: Invite redemption blocked by policy
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiError'
              examples:
                contactInviteBlocked:
                  summary: Invite creator and redeemer are blocked
                  value:
                    code: blocked_user
                    message: blocked users cannot redeem contact invites
        '409':
          description: Contact invite redemption conflicts with existing relationship state
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiError'
              examples:
                inviteInvalid:
                  summary: Caller cannot redeem their own contact invite
                  value:
                    code: invite_invalid
                    message: cannot redeem a contact invite created by the same identity
                friendRequestExists:
                  summary: Pending friend request already exists
                  value:
                    code: friend_request_exists
                    message: pending friend request already exists
        '429':
          $ref: '#/components/responses/TooManyRequests'
        '500':
          $ref: '#/components/responses/InternalServerError'
  /v1/servers:
    get:
      summary: List servers for authenticated identity
      description: Returns identity-scoped server summaries from persisted server membership records with deterministic filter/search behavior. Joined-server membership authority now backs this surface, while richer guild/channel authz semantics remain future work.
      security:
        - CookieAuth: []
        - BearerAuth: []
      parameters:
        - in: query
          name: search
          schema:
            type: string
          x-hexrelay-query-semantics:
            - blank-means-omitted
            - case-insensitive
        - in: query
          name: favorites_only
          schema:
            type: boolean
        - in: query
          name: unread_only
          schema:
            type: boolean
        - in: query
          name: muted_only
          schema:
            type: boolean
      responses:
        '200':
          description: >-
            Identity-scoped server summaries after favorites/unread/muted/search
            filters are applied. Returned items are only the caller's joined
            servers.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ServerListResponse'
              examples:
                filteredServers:
                  summary: Filtered joined-server summaries for the authenticated identity
                  value:
                    items:
                      - id: srv-shared-lab
                        name: Shared Lab
                        unread: 3
                        favorite: true
                        muted: false
        '401':
          $ref: '#/components/responses/Unauthorized'
        '500':
          $ref: '#/components/responses/InternalServerError'
  /v1/servers/{server_id}:
    get:
      summary: Get a single joined server for authenticated identity
      description: Returns the requested server summary only when the authenticated identity has persisted membership for that server. Non-members receive deterministic `403 server_access_denied` without exposing extra membership state.
      security:
        - CookieAuth: []
        - BearerAuth: []
      parameters:
        - in: path
          name: server_id
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Server detail response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ServerDetailResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          description: Server membership required
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiError'
              examples:
                serverAccessDenied:
                  summary: Caller is not a server member
                  value:
                    code: server_access_denied
                    message: server membership required
        '500':
          $ref: '#/components/responses/InternalServerError'
  /v1/servers/{server_id}/channels:
    get:
      summary: List channels for an authorized server member
      description: Returns persisted channels for the requested server only when the authenticated identity has membership in that server. Results use stable creation order and expose the current `last_message_seq` cursor baseline for each channel.
      security:
        - CookieAuth: []
        - BearerAuth: []
      parameters:
        - in: path
          name: server_id
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Server channel list response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ServerChannelListResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          description: Server membership required
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiError'
              examples:
                serverAccessDenied:
                  summary: Caller is not a server member
                  value:
                    code: server_access_denied
                    message: server membership required
        '500':
          $ref: '#/components/responses/InternalServerError'
  /v1/servers/{server_id}/channels/{channel_id}/messages:
    get:
      summary: List server-channel messages for an authorized member
      description: Returns persisted server-channel messages only when the authenticated identity has membership in the requested server and the requested `channel_id` belongs to that same server. Requests for unknown channel ids return `404 channel_not_found`, while cross-server path mismatches fail with deterministic `403 server_access_denied`. Results are ordered by descending `channel_seq` and use the last returned `channel_seq` as a strictly exclusive string cursor.
      security:
        - CookieAuth: []
        - BearerAuth: []
      parameters:
        - in: path
          name: server_id
          required: true
          schema:
            type: string
        - in: path
          name: channel_id
          required: true
          schema:
            type: string
        - in: query
          name: cursor
          description: Current runtime uses the last returned message `channel_seq` encoded as a string cursor and returns only messages with `channel_seq` strictly less than that value.
          schema:
            type: string
        - in: query
          name: limit
          schema:
            type: integer
            minimum: 1
            maximum: 100
      responses:
        '200':
          description: >-
            Server-channel message history page. Deleted messages remain visible as
            tombstone records in `items`, and `next_cursor` is only present when
            older history still exists beyond the returned page.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ServerChannelMessagePage'
              examples:
                historyPageWithTombstone:
                  summary: History page keeps deleted messages visible as tombstones
                  value:
                    items:
                      - message_id: scm-3
                        channel_id: chn-general
                        author_id: usr-nora-k
                        channel_seq: 3
                        content: latest update
                        reply_to_message_id: null
                        mentions: []
                        created_at: '2026-04-06T12:03:00Z'
                        edited_at: null
                        deleted_at: null
                      - message_id: scm-2
                        channel_id: chn-general
                        author_id: usr-jules-p
                        channel_seq: 2
                        content: ''
                        reply_to_message_id: null
                        mentions: []
                        created_at: '2026-04-06T12:02:00Z'
                        edited_at: null
                        deleted_at: '2026-04-06T12:05:00Z'
                    next_cursor: '2'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          description: Server membership required
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiError'
              examples:
                serverAccessDenied:
                  summary: Caller is not a server member
                  value:
                    code: server_access_denied
                    message: server membership required
        '404':
          description: Channel not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiError'
              examples:
                channelNotFound:
                  summary: Channel does not exist
                  value:
                    code: channel_not_found
                    message: server channel was not found
        '500':
          $ref: '#/components/responses/InternalServerError'
    post:
      summary: Create a server-channel message for an authorized member
      description: >-
        Persists a new server-channel message for an authenticated server member
        when the requested `channel_id` belongs to the same server identified by
        the route, optionally linking a same-channel reply target and persisted
        mention identities. Cross-server path mismatches fail with deterministic
        `403 server_access_denied`. Successful writes best-effort fan out
        `channel.message.created` over realtime delivery to current server
        members, routed through the shared `NodeClientTransport` adapter path
        using borrowed request serialization on the API side. REST success is
        not transactional with downstream realtime delivery: dispatch happens
        after persistence, downstream failures are logged, and no durable retry
        is guaranteed by this endpoint. Cookie-authenticated requests require a
        matching CSRF header.
      security:
        - CookieAuth: []
        - BearerAuth: []
      parameters:
        - $ref: '#/components/parameters/CsrfTokenHeader'
        - in: path
          name: server_id
          required: true
          schema:
            type: string
        - in: path
          name: channel_id
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ServerChannelMessageCreateRequest'
      responses:
        '201':
          description: >-
            Message created. Returns the persisted canonical message record with an
            assigned `message_id`, monotonic `channel_seq`, normalized
            `reply_to_message_id`, and validated mention set. Persistence success
            is reported even when downstream realtime fanout later fails.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ServerChannelMessage'
              examples:
                createdMessage:
                  summary: Persisted canonical message record after create
                  value:
                    message_id: scm-3
                    channel_id: chn-general
                    author_id: usr-nora-k
                    channel_seq: 3
                    content: ship it
                    reply_to_message_id: scm-2
                    mentions: [usr-jules-p]
                    created_at: '2026-04-06T12:03:00Z'
                    edited_at: null
                    deleted_at: null
                blankReplyNormalized:
                  summary: Blank reply target is normalized to null before persistence
                  value:
                    message_id: scm-4
                    channel_id: chn-general
                    author_id: usr-nora-k
                    channel_seq: 4
                    content: blank reply target
                    reply_to_message_id: null
                    mentions: []
                    created_at: '2026-04-06T12:04:00Z'
                    edited_at: null
                    deleted_at: null
        '400':
          description: Invalid message payload
          content:
